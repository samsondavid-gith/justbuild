<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Just Build  /  Facilitator Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Inter:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  /* ========================================
     Just Build  /  Facilitator Platform
     Dark mode. Optimised for projection.
     ======================================== */

  :root {
    --bg:            #0A0A0A;
    --bg-elev-1:    #141414;
    --bg-elev-2:    #1C1C1C;
    --line:          rgba(255,255,255,0.08);
    --line-strong:   rgba(255,255,255,0.16);
    --text:          #FFFFFF;
    --text-soft:     #C8C8C8;
    --text-muted:    #8A8A8A;
    --text-faint:    #5A5A5A;
    --accent:        #C17D2A;
    --accent-soft:   rgba(193, 125, 42, 0.18);
    --accent-glow:   rgba(193, 125, 42, 0.35);
    --warning:       #E8B53A;
    --danger:        #D7553A;
    --serif:         'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --sans:          'Inter', system-ui, -apple-system, sans-serif;
    --mono:          'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ----- Top bar ----- */
  .topbar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 32px;
    padding: 10px 40px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    z-index: 5;
  }
  .topbar.hidden { display: none; }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: nowrap;
    min-width: 0;
    overflow: hidden;
  }
  .topbar-logo {
    width: 30px;
    height: 30px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .topbar-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .topbar-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .topbar-section {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 38ch;
    min-width: 0;
    flex: 0 1 auto;
  }

  .topbar-center {
    display: flex;
    justify-content: center;
  }

  .timer {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    padding: 6px 18px;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease;
    min-width: 130px;
    text-align: center;
  }
  .timer:hover { border-color: var(--accent); }
  .timer.paused { color: var(--text-muted); border-style: dashed; }
  .timer.warning { color: var(--warning); border-color: rgba(232, 181, 58, 0.4); }
  .timer.danger { color: var(--danger); border-color: rgba(215, 85, 58, 0.5); }
  .timer.expired { animation: pulse 2s ease-in-out infinite; color: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  .topbar-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.04em;
    min-width: 0;
  }
  .progress {
    flex: 0 1 auto;
    width: clamp(80px, 11vw, 160px);
    min-width: 44px;
    height: 4px;
    border-radius: 2px;
    background: var(--line-strong);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ----- Jump-to-session picker ----- */
  .jump-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .jump-btn {
    appearance: none;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .jump-btn:hover { color: var(--text); border-color: var(--line-strong); }
  .jump-btn svg { opacity: 0.6; transition: transform 0.2s ease; }
  .jump-wrap.open .jump-btn svg { transform: rotate(180deg); }

  .jump-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 380px;
    max-height: 70vh;
    overflow-y: auto;
    background: var(--bg-elev-1);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    padding: 8px;
    box-shadow: 0 18px 48px -12px rgba(0, 0, 0, 0.6);
    display: none;
    z-index: 50;
  }
  .jump-wrap.open .jump-menu { display: block; }
  .jump-group {
    padding: 12px 12px 6px;
  }
  .jump-group-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .jump-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 9px 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.4;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .jump-item:hover { background: var(--bg-elev-2); color: var(--text); }
  .jump-item.current { background: rgba(193, 125, 42, 0.12); color: var(--text); }
  .jump-item-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 36px;
    letter-spacing: 0.04em;
  }
  .jump-item.current .jump-item-num { color: var(--accent); }
  .jump-item-title {
    flex: 1;
  }
  .jump-item-time {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
  }

  /* ----- Office Hours screen ----- */
  .oh-screen {
    max-width: 900px;
    margin: 0 auto;
  }
  .oh-section {
    margin-top: 40px;
  }
  .oh-section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .oh-agenda {
    list-style: none;
    counter-reset: agenda;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .oh-agenda li {
    counter-increment: agenda;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    color: var(--text-soft);
    font-size: 18px;
    line-height: 1.5;
    padding-left: 0;
  }
  .oh-agenda li::before {
    content: counter(agenda, decimal-leading-zero);
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    padding-top: 4px;
    letter-spacing: 0.04em;
  }
  .oh-stuck-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .oh-stuck {
    padding: 20px 24px;
    background: var(--bg-elev-1);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .oh-stuck-title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
  }
  .oh-stuck-resolution {
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1.55;
  }
  .oh-prompts {
    list-style: none;
    counter-reset: oh-prompt;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .oh-prompt-item {
    counter-increment: oh-prompt;
    padding: 16px 18px 16px 48px;
    background: rgba(193,125,42,0.06);
    border: 1px solid var(--accent-soft);
    border-radius: 4px;
    position: relative;
  }
  .oh-prompt-item::before {
    content: counter(oh-prompt, decimal-leading-zero);
    position: absolute;
    left: 14px;
    top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--accent);
    font-weight: 500;
  }
  .oh-prompt-title {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--text);
    line-height: 1.4;
  }
  .oh-prompt-note {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }
  .oh-prompt-note strong {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 500;
  }
  @media (max-width: 800px) {
    .oh-prompts { grid-template-columns: 1fr; }
  }
  .oh-qa, .oh-homework {
    padding: 22px 26px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-soft);
    font-size: 17px;
    line-height: 1.55;
  }

  /* ----- Milestone screen indicator ----- */
  .milestone-banner {
    background: rgba(193, 125, 42, 0.08);
    border: 1px solid rgba(193, 125, 42, 0.25);
    padding: 14px 22px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
    font-weight: 500;
  }

  /* ----- Workshop-complete portfolio-contents panel ----- */
  .wc-contents {
    margin: 32px auto 40px;
    padding: 24px 28px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    max-width: 920px;
  }
  .wc-contents-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .wc-contents-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 24px;
  }
  .wc-contents-list li {
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.4;
  }
  .wc-contents-list li strong {
    display: inline-block;
    min-width: 28px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  @media (max-width: 880px) {
    .wc-contents-list { grid-template-columns: repeat(2, 1fr); }
  }

  /* ----- Stage / main area ----- */
  .stage {
    flex: 1 1 auto;
    display: flex;
    padding: 32px 60px 64px;
    overflow-y: auto;
    overflow-x: hidden;
    /* When content exceeds viewport, allow scroll instead of clipping the bottom */
    scrollbar-width: thin;
    scrollbar-color: var(--line-strong) transparent;
  }
  .stage::-webkit-scrollbar { width: 8px; }
  .stage::-webkit-scrollbar-track { background: transparent; }
  .stage::-webkit-scrollbar-thumb {
    background: var(--line-strong);
    border-radius: 4px;
  }
  .stage::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Viewport-locked variant: used for prompt screens and idea-cards so the bottom strip is always visible */
  .stage.fit-viewport { overflow: hidden; padding-top: clamp(20px, 3vh, 36px); padding-bottom: clamp(20px, 3vh, 36px); }
  .stage.fit-viewport .screen { height: 100%; display: flex; flex-direction: column; min-height: 0; }

  .screen {
    width: 100%;
    max-width: 1100px;
    margin: auto;
    animation: fadeUp 0.42s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
  }

  /* ----- Welcome / session-start / session-end ----- */
  .hero {
    text-align: center;
    padding: 8px 0;
  }
  .hero-logo {
    display: block;
    width: 100px;
    height: auto;
    margin: 0 auto 20px;
    opacity: 0.98;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 500;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(56px, 8vw, 120px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
  }
  .hero-title.brand {
    color: var(--accent);
    font-weight: 400;
  }
  .hero-sub {
    font-family: var(--serif);
    font-size: clamp(18px, 2.0vw, 28px);
    color: var(--text-soft);
    font-style: italic;
    font-weight: 300;
    letter-spacing: -0.005em;
    margin-bottom: 8px;
  }
  .hero-meta {
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.04em;
    margin-top: 6px;
  }
  .hero-rule {
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 24px auto;
    border: none;
  }
  .hero-rule.thin { width: 40px; opacity: 0.6; }

  .button-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  /* ----- Stage (set the stage) ----- */
  .stage-text {
    font-family: var(--serif);
    font-size: clamp(18px, 1.7vw, 24px);
    line-height: 1.45;
    color: var(--text);
    font-weight: 300;
    letter-spacing: -0.005em;
    max-width: 62ch;
  }
  .stage-text p {
    margin: 0 0 0.85em 0;
  }
  .stage-text p:last-child {
    margin-bottom: 0;
  }
  .facilitator-note {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    letter-spacing: 0.01em;
    max-width: 62ch;
  }

  /* ----- Step (build SOP, one per screen) ----- */
  .step-screen { max-width: 64ch; }
  .step-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .step-code {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #FFFFFF;
    background: var(--accent);
    padding: 4px 11px;
    border-radius: 6px;
  }
  .step-section-name {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .step-title {
    font-family: var(--serif);
    font-size: clamp(30px, 4vw, 50px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .step-lead {
    font-family: var(--serif);
    font-size: clamp(17px, 1.6vw, 22px);
    line-height: 1.45;
    color: var(--text-soft);
    font-weight: 300;
    max-width: 58ch;
    margin-bottom: 18px;
  }
  .step-tool {
    margin-bottom: 18px;
  }
  .step-tool a, .step-tool {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .step-tool a {
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent-soft);
    border-radius: 999px;
    padding: 6px 13px;
    background: rgba(193,125,42,0.06);
  }
  .step-tool a:hover { background: rgba(193,125,42,0.14); }
  .step-detail {
    list-style: none;
    margin: 0 0 4px 0;
    padding: 0;
    max-width: 60ch;
  }
  .step-detail li {
    display: flex;
    gap: 13px;
    align-items: flex-start;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: clamp(15px, 1.35vw, 18px);
    line-height: 1.5;
    color: var(--text);
  }
  .step-detail li:last-child { border-bottom: none; }
  .step-detail-num {
    flex: 0 0 auto;
    width: 22px;
    height: 22px;
    margin-top: 1px;
    border-radius: 50%;
    border: 1px solid var(--accent-soft);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-prompt {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 20px;
    padding: 14px 18px;
    border: 1px solid var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    background: rgba(193,125,42,0.06);
    max-width: 60ch;
  }
  .step-prompt-tag {
    flex: 0 0 auto;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #FFFFFF;
    background: var(--accent);
    padding: 5px 10px;
    border-radius: 5px;
  }
  .step-prompt-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .step-prompt-where {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.02em;
    color: var(--text-muted);
  }

  /* ----- Question ----- */
  .question-title {
    font-family: var(--serif);
    font-size: clamp(32px, 4.2vw, 56px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .question-body {
    font-size: clamp(15px, 1.3vw, 19px);
    color: var(--text-soft);
    line-height: 1.55;
    max-width: 62ch;
    margin-bottom: 20px;
  }

  /* ----- HMV ----- */
  .hmv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }
  .hmv-panel {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-top: 2px solid var(--accent);
    padding: 18px 18px;
    border-radius: 2px;
  }
  .hmv-name {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .hmv-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .hmv-list li {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
  }
  .hmv-list li::before {
    content: "/";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 500;
  }
  @media (max-width: 1000px) {
    .hmv-grid { grid-template-columns: 1fr; gap: 12px; }
  }

  /* ----- Prompt ----- */
  .prompt-title {
    font-family: var(--serif);
    font-size: clamp(24px, 2.8vw, 36px);
    font-weight: 400;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }
  .prompt-tool {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--bg);
    box-shadow: 0 0 0 3px rgba(193, 125, 42, 0.18);
  }
  .prompt-tool::before {
    content: "USE";
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--bg);
    font-weight: 700;
    padding-right: 10px;
    border-right: 1px solid rgba(10, 10, 10, 0.4);
    opacity: 0.85;
  }
  .prompt-tool strong {
    color: var(--bg);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.005em;
  }
  .prompt-box {
    background: #050505;
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-soft);
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 2px;
    margin-bottom: 12px;
    max-height: 40vh;
    overflow-y: auto;
  }
  .prompt-box::-webkit-scrollbar { width: 8px; }
  .prompt-box::-webkit-scrollbar-track { background: transparent; }
  .prompt-box::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    padding: 10px 22px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s ease;
  }
  .copy-btn:hover { background: #D08A33; transform: translateY(-1px); }
  .copy-btn.copied { background: #2C8A4F; pointer-events: none; }

  /* ----- Prompt screen (viewport-locked, URL strip always visible) ----- */
  .prompt-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    padding: 8px 0;
  }
  .prompt-screen-header { flex: 0 0 auto; margin-bottom: clamp(8px, 1.2vh, 14px); }
  .prompt-screen-title {
    font-size: clamp(20px, 2.6vh, 28px) !important;
    margin: clamp(4px, 0.8vh, 10px) 0 clamp(4px, 0.6vh, 8px) !important;
  }
  .prompt-screen-box {
    flex: 1 1 auto !important;
    min-height: 0 !important;
    max-height: none !important;
    margin-bottom: 0 !important;
    font-size: clamp(13px, 1.65vh, 16px) !important;
    line-height: 1.6 !important;
    color: var(--text) !important;
    padding: 18px 24px !important;
  }
  .prompt-screen-footer {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.2vh, 14px);
    margin-top: clamp(10px, 1.5vh, 16px);
  }
  .prompt-laptop-line {
    padding: clamp(10px, 1.5vh, 14px) 22px;
    background: rgba(193,125,42,0.08);
    border: 1px solid var(--accent-soft);
    border-radius: 6px;
    text-align: center;
  }
  .prompt-laptop-eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .prompt-laptop-url {
    font-family: var(--mono);
    font-size: clamp(14px, 1.9vh, 20px);
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  /* ----- Build ----- */
  .build-list {
    list-style: none;
    counter-reset: build;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 16px;
  }
  .build-item {
    counter-increment: build;
    display: grid;
    grid-template-columns: 42px 1fr;
    gap: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .build-item:last-child { border-bottom: none; padding-bottom: 0; }
  .build-item::before {
    content: counter(build, decimal-leading-zero);
    font-family: var(--serif);
    font-size: 22px;
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
    padding-top: 3px;
  }
  .build-item h3 {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .build-item p {
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
  }

  /* For sessions with many build steps (6+), use two-column grid */
  .build-list.compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 28px;
  }
  .build-list.compact .build-item {
    padding-bottom: 8px;
    grid-template-columns: 32px 1fr;
    gap: 10px;
  }
  .build-list.compact .build-item::before {
    font-size: 18px;
  }
  .build-list.compact .build-item h3 {
    font-size: 15px;
  }
  .build-list.compact .build-item p {
    font-size: 12px;
    line-height: 1.45;
  }

  /* ----- Test Output ----- */
  .test-intro {
    color: var(--text-soft);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .test-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .test-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .test-item:hover { border-color: var(--line-strong); }
  .test-item.checked {
    background: rgba(193, 125, 42, 0.08);
    border-color: var(--accent);
  }
  .checkbox {
    flex: 0 0 20px;
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--text-muted);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.2s ease;
  }
  .test-item.checked .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox svg {
    width: 12px;
    height: 12px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .test-item.checked .checkbox svg { opacity: 1; }
  .test-content h4 {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 3px;
    color: var(--text);
  }
  .test-content p {
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
  }

  .all-checked-banner {
    display: none;
    text-align: center;
    padding: 28px;
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 2px;
    animation: fadeUp 0.4s ease;
  }
  .all-checked-banner.show { display: block; }

  /* ----- Break ----- */
  .break {
    text-align: center;
  }
  .break-timer {
    font-family: var(--mono);
    font-size: clamp(120px, 22vw, 280px);
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
  }
  .break-label {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    color: var(--text-soft);
    font-style: italic;
  }
  .break-next {
    color: var(--text-muted);
    margin-top: 16px;
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .break-over {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 96px);
    font-weight: 400;
  }

  /* ----- Buttons ----- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 36px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    border: none;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #FFFFFF;
  }
  .btn-primary:hover { background: #D08A33; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ----- Bottom bar ----- */
  .bottombar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    padding: 16px 40px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .bottombar.hidden { display: none; }

  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-prev { justify-self: start; }
  .nav-next { justify-self: end; }

  .hmv-reminder {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--serif);
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
  }
  .hmv-reminder .letter {
    color: var(--accent);
    font-weight: 500;
    font-style: normal;
    font-family: var(--sans);
    letter-spacing: 0.32em;
  }
  .hmv-reminder .full {
    color: var(--text-muted);
    transition: opacity 0.2s ease;
  }
  .hmv-reminder.collapsed .full { display: none; }

  .keyboard-hint {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    margin-top: 4px;
    text-align: center;
  }
  .keyboard-hint kbd {
    font-family: var(--mono);
    background: var(--bg-elev-1);
    padding: 1px 6px;
    border-radius: 2px;
    border: 1px solid var(--line);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ----- Loading / error ----- */
  .loading, .error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }
  .loading p, .error p {
    color: var(--text-muted);
    font-style: italic;
    font-family: var(--serif);
    font-size: 18px;
  }
  .error h2 {
    font-family: var(--serif);
    color: var(--danger);
    margin-bottom: 16px;
    font-weight: 400;
    font-size: 28px;
  }
  .error code {
    font-family: var(--mono);
    background: var(--bg-elev-1);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 13px;
    color: var(--accent);
  }

  /* ----- Responsive ----- */
  @media (max-width: 800px) {
    .topbar, .bottombar { padding: 14px 20px; }
    .stage { padding: 32px 24px; }
    .topbar { grid-template-columns: 1fr auto; gap: 16px; }
    .topbar-right { display: none; }
    .keyboard-hint { display: none; }
  }

  /* Subtle grain to add atmosphere on projection */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 1;
  }

  /* ========================================
     Login Gate
     ======================================== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-overlay.hidden { display: none; }

  .login-card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .login-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .login-title {
    font-family: var(--font-display);
    font-size: 56px;
    line-height: 0.95;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }
  .login-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 160ms ease, background 160ms ease;
  }
  .login-input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255,255,255,0.06);
  }
  .login-input::placeholder { color: rgba(255,255,255,0.3); }

  .login-logo {
    display: block;
    width: 96px;
    height: auto;
    margin: 0 auto 24px;
    opacity: 0.95;
  }

  .login-submit {
    margin-top: 8px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 14px 20px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 160ms ease, transform 160ms ease;
  }
  .login-submit:hover { opacity: 0.9; }
  .login-submit:active { transform: scale(0.98); }
  .login-submit:disabled { opacity: 0.5; cursor: wait; }

  .login-error {
    color: #E07B6E;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
    opacity: 0;
    transition: opacity 160ms ease;
  }
  .login-error.show { opacity: 1; }

  @keyframes login-shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .login-card.shake { animation: login-shake 320ms ease; }

  /* ============================================
     WELCOME LAYER (two-doors, journey-map, tools-landscape)
     ============================================ */
  .wl-screen {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 8px;
    text-align: center;
  }
  .wl-eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .wl-title {
    font-family: var(--serif);
    font-size: clamp(32px, 3.8vw, 48px);
    font-weight: 300;
    line-height: 1.02;
    letter-spacing: -0.025em;
    margin-bottom: 10px;
  }
  .wl-sub {
    font-family: var(--serif);
    font-size: clamp(14px, 1.2vw, 17px);
    color: var(--text-soft);
    font-style: italic;
    font-weight: 300;
    line-height: 1.45;
    max-width: 68ch;
    margin: 0 auto 18px;
  }
  .wl-footer {
    font-family: var(--serif);
    font-size: clamp(14px, 1.3vw, 17px);
    font-weight: 500;
    color: var(--text);
    margin-top: 14px;
    letter-spacing: -0.005em;
    padding-left: 12px;
    border-left: 3px solid var(--accent);
    display: inline-block;
    text-align: left;
  }

  /* ----- Two Doors ----- */
  .doors-grid {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 18px;
    margin: 0;
    text-align: left;
    align-items: stretch;
  }
  .door {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px 24px 24px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .door-primary {
    border: 1px solid var(--accent);
    box-shadow: 0 0 0 4px rgba(193, 125, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .door-primary::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--accent);
  }
  .door-secondary::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--line-strong);
  }
  .door-tag {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
    margin-top: 4px;
  }
  .door-secondary .door-tag { color: var(--text-muted); }
  .door-dot { color: var(--text-faint); margin: 0 4px; }
  .door-title {
    font-family: var(--serif);
    font-size: clamp(22px, 2.0vw, 28px);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    color: var(--text);
  }
  .door-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-soft);
    margin-bottom: 16px;
  }
  .door-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .door-list li {
    position: relative;
    padding: 6px 0 6px 20px;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.45;
    border-bottom: 1px solid var(--line);
  }
  .door-list li:last-child { border-bottom: none; }
  .door-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 13px;
    width: 8px;
    height: 2px;
    background: var(--accent);
  }
  .door-secondary .door-list li::before { background: var(--text-muted); }

  /* ----- Journey Map ----- */
  .journey-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    text-align: left;
    max-width: 860px;
    margin: 0 auto;
  }
  .journey-col {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 20px;
  }
  .journey-day {
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .journey-list { list-style: none; margin: 0; padding: 0; }
  .journey-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid var(--line);
  }
  .journey-item:last-child { border-bottom: none; }
  .journey-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    flex-shrink: 0;
    width: 22px;
  }
  .journey-body { display: flex; flex-direction: column; gap: 1px; }
  .journey-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .journey-note {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.35;
  }
  .journey-outcome {
    margin-top: 18px;
    text-align: center;
  }
  .journey-arrow {
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }
  .journey-outcome-label {
    font-family: var(--serif);
    font-size: clamp(18px, 1.9vw, 24px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.015em;
    margin-bottom: 4px;
  }
  .journey-outcome-url {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }


  /* ----- Journey Cover (dark metamorphosis slide, matches the deck) ----- */
  .journey-cover {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px 8px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .journey-cover-eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .journey-cover-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(34px, 6vw, 76px);
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: var(--text);
    margin: 0 0 14px;
  }
  .journey-cover-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(15px, 1.9vw, 22px);
    color: var(--text-soft);
    margin: 0 0 6px;
  }
  .journey-cover-art {
    display: block;
    width: 100%;
    max-width: 1180px;
    max-height: 56vh;
    object-fit: contain;
    margin: 8px auto 6px;
  }
  .journey-cover-fallback {
    width: 100%;
    max-width: 760px;
    min-height: 200px;
    margin: 18px auto;
    border: 2px dashed var(--line-strong);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
  }
  .journey-cover-footer {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(14px, 1.5vw, 19px);
    color: var(--text-soft);
    max-width: 980px;
    margin: 8px auto 0;
    line-height: 1.45;
  }

  /* ----- Tools Landscape ----- */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: left;
  }
  .cat-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
  }
  .cat-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 2px;
  }
  .cat-use {
    font-size: 11px;

    margin-bottom: 8px;

  }
  @media (max-width: 580px) {
    .cat-grid { grid-template-columns: 1fr; }
  }

  /* ============================================
     INTERLUDES (cohort, photo, checkin, feedback, portfolio)
     ============================================ */
  .interlude-narrow { max-width: 760px; }

  .wl-quiet {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 18px;
    font-style: italic;
  }

  /* ----- Housekeeping ----- */
  .hk-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    text-align: left;
  }
  .hk-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
  }
  .hk-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hk-list {
    list-style: none;
    margin: 0;
    padding: 0;
    flex: 1;
  }
  .hk-list li {
    position: relative;
    padding: 6px 0 6px 14px;
    color: var(--text-soft);

    line-height: 1.45;

    content: "·";

    top: 5px;

    font-size: 14px;
  }

  .hk-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .hk-tool {
    display: inline-block;
    padding: 4px 9px;
    font-size: 11px;

    border-radius: 12px;
    font-weight: 500;
  }
  .hk-note {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
    font-style: italic;
    margin-top: auto;
  }
  @media (max-width: 900px) {
    .hk-grid { grid-template-columns: 1fr; }
  }

  /* ----- Outcomes (new Two Doors structure: 3 sections) ----- */
  .outcomes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
    text-align: left;
  }
  .outcome {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .outcome-primary {
    border: 1px solid var(--accent);
    box-shadow: 0 0 0 4px rgba(193, 125, 42, 0.08);
    grid-column: 1;
    grid-row: 1;
  }
  .outcome-primary::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--accent);
  }
  .outcome-secondary {
    grid-column: 2;
    grid-row: 1;
  }
  .outcome-secondary::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--line-strong);
  }
  .outcome-shared {
    grid-column: 1 / -1;
    grid-row: 2;
    border-color: var(--line-strong);
  }
  .outcome-shared::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--text-muted);
  }
  .outcome-tag {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    margin-top: 4px;
  }
  .outcome-secondary .outcome-tag,
  .outcome-shared .outcome-tag { color: var(--text-muted); }
  .outcome-title {
    font-family: var(--serif);
    font-size: clamp(20px, 1.9vw, 26px);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    color: var(--text);
  }
  .outcome-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-soft);
  }
  .outcome-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .outcome-list li {
    position: relative;
    padding: 6px 0 6px 20px;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.45;
    border-bottom: 1px solid var(--line);
  }
  .outcome-list li:last-child { border-bottom: none; }
  .outcome-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 13px;
    width: 8px;
    height: 2px;
    background: var(--accent);
  }
  .shared-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .shared-item {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text-soft);
  }
  @media (max-width: 900px) {
    .outcomes-grid {
      grid-template-columns: 1fr;
    }
    .outcome-primary, .outcome-secondary, .outcome-shared {
      grid-column: 1;
      grid-row: auto;
    }
  }

  /* ----- Timeline (new Workshop Complete structure) ----- */
  .timeline {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: left;
  }
  .timeline-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 24px;
    align-items: start;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 18px 22px;
  }
  .timeline-when {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    padding-top: 2px;
  }
  .timeline-title {
    font-family: var(--serif);
    font-size: clamp(17px, 1.7vw, 22px);

    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .timeline-detail {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.55;
  }
  @media (max-width: 700px) {
    .timeline-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }

  /* ----- Day 1 Photo ----- */
  .photo-icon {
    margin: 8px auto 24px;
    width: 110px;
  }

  .d2-recap {
    display: grid;

    align-items: stretch;
    max-width: 640px;
    margin: 0 auto;
    text-align: left;
  }
  .d2-recap-half {
    padding: 0;
  }
  .d2-recap-ahead {
    padding-left: 8px;
  }
  .d2-recap-divider {
    width: 1px;
    background: var(--line);
  }
  .d2-recap-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .d2-recap-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .d2-recap-list li {
    padding: 6px 0 6px 18px;
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.4;
    position: relative;
  }
  .d2-recap-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 14px;
    width: 8px;
    height: 2px;
    background: var(--accent);
  }
  .d2-recap-half:not(.d2-recap-ahead) .d2-recap-list li {
    color: var(--text-muted);
  }
  .d2-recap-half:not(.d2-recap-ahead) .d2-recap-list li::before {
    background: var(--text-faint);
  }

  /* ----- Feedback Prompt (group activity, no inputs) ----- */
  .feedback-question {
    max-width: 640px;
    margin: 0 auto;
    background: var(--bg-elev-1);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 26px 32px;
    text-align: center;
  }
  .feedback-question-text {
    font-family: var(--serif);
    font-size: clamp(20px, 2.2vw, 28px);
    font-weight: 400;
    color: var(--text);
    line-height: 1.35;
    letter-spacing: -0.01em;
  }

  /* ----- Portfolio Reveal ----- */
  .portfolio-screen { max-width: 1100px; }

  .portfolio-hero {
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 24px 28px 22px;
    margin-bottom: 28px;
    background: linear-gradient(180deg, rgba(193,125,42,0.05), rgba(193,125,42,0.01));
    position: relative;
    overflow: hidden;
  }
  .portfolio-hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--accent);
  }
  .portfolio-hero-label {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    margin-top: 4px;
  }
  .portfolio-hero-url {
    font-family: var(--mono);
    font-size: clamp(15px, 1.8vw, 22px);
    color: var(--text);
    font-weight: 500;
    word-break: break-all;
    margin-bottom: 14px;
    line-height: 1.35;
    letter-spacing: -0.005em;
  }
  .portfolio-hero-slot {
    color: var(--accent);
    font-style: normal;
  }
  .portfolio-hero-note {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.55;
    max-width: 70ch;
    margin: 0 auto;
    font-style: italic;
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 8px;
    text-align: left;
  }
  .portfolio-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 160ms ease;
  }
  .portfolio-card:hover { border-color: var(--line-strong); }
  .portfolio-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 3px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .portfolio-body { flex: 1; min-width: 0; }
  .portfolio-label {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }
  .portfolio-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .portfolio-placeholder {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    word-break: break-all;
    line-height: 1.4;
  }

  /* ----- Output Capture ----- */
  .capture-screen {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .capture-title {
    font-family: var(--serif);
    font-size: clamp(28px, 3.2vw, 40px);
    font-weight: 400;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }
  .capture-arrow {
    color: var(--accent);
    font-weight: 300;
    margin: 0 6px;
  }
  .capture-ask {
    font-family: var(--serif);
    font-size: 17px;
    font-style: italic;
    color: var(--text-soft);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .capture-instruction {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 18px 22px;
    margin-bottom: 16px;
  }
  .capture-instruction-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 8px 0;
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.5;
    border-bottom: 1px solid var(--line);
  }
  .capture-instruction-step:last-child { border-bottom: none; }
  .capture-instruction-num {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    margin-top: 1px;

  .capture-guidance {
    background: var(--bg-elev-1);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    border-radius: 0 4px 4px 0;
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.55;
    font-style: italic;
  }

  /* ============================================
     IDEA CARDS (24 ideas across 3 pages, 8 per page, 4×2 grid)
     ============================================ */
  .ideas-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    padding: 8px 0;
  }
  .ideas-screen-header {
    flex: 0 0 auto;
    margin-bottom: clamp(10px, 1.6vh, 18px);
  }
  .ideas-screen-eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: clamp(8px, 1.2vh, 14px);
  }
  .ideas-screen-title {
    font-family: var(--serif);
    font-size: clamp(22px, 3.4vh, 36px);
    font-weight: 300;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin-bottom: clamp(6px, 1vh, 12px);
    max-width: 32ch;
  }
  .ideas-screen-title em {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
  }
  .ideas-screen-sub {
    font-family: var(--serif);
    font-size: clamp(12px, 1.5vh, 15px);
    font-style: italic;
    line-height: 1.4;
    color: var(--text-soft);
    font-weight: 300;
    max-width: 60ch;
  }
  .idea-set-switcher {
    display: flex;
    gap: 8px;
    margin-top: clamp(10px, 1.4vh, 16px);
    flex-wrap: wrap;
  }
  .idea-set-pill {
    background: var(--bg-elev-1);
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
    padding: 7px 16px;
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .idea-set-pill:hover {
    color: var(--accent);
    border-color: var(--accent-soft);
    background: rgba(193,125,42,0.04);
  }
  .idea-set-pill.active {
    background: var(--accent);
    color: #FFFFFF;
    border-color: var(--accent);
  }
  .idea-set-pill.active:hover {
    background: #A86A24;
    border-color: #A86A24;
    color: #FFFFFF;
  }
  .idea-set-pill-count {
    font-family: var(--mono);
    font-size: 10.5px;
    opacity: 0.7;
    letter-spacing: 0.04em;
  }
  .ideas-grid {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: clamp(8px, 1vh, 12px);
    margin: 0;
    overflow: hidden;
  }
  .idea-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: clamp(10px, 1.5vh, 14px) clamp(10px, 1.4vh, 14px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .idea-card:hover { border-color: var(--accent-soft); }
  .idea-card-num {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    color: var(--accent);
    margin-bottom: 3px;
    flex-shrink: 0;
  }
  .idea-card-name {
    font-family: var(--serif);
    font-size: clamp(14px, 2vh, 18px);
    font-weight: 500;
    color: var(--text);
    margin-bottom: clamp(6px, 1vh, 10px);
    letter-spacing: -0.01em;
    line-height: 1.1;
    flex-shrink: 0;
  }
  .idea-card-row { margin-bottom: clamp(5px, 0.8vh, 8px); }
  .idea-card-row:last-child { margin-bottom: 0; }
  .idea-card-label {
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 1px;
  }
  .idea-card-value {
    font-size: clamp(10.5px, 1.25vh, 12px);
    line-height: 1.4;
    color: var(--text-soft);

  @media (max-width: 1100px) {
    .ideas-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); }
  }
  @media (max-width: 600px) {
    .ideas-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
  }

  /* ============================================
     CLOSING / INSPIRATIONAL
     ============================================ */
  .closing-screen {
    text-align: center;
    padding: 24px 24px 48px;
    max-width: 760px;
    margin: 0 auto;
  }
  .closing-logo {
    display: block;
    width: clamp(160px, 22vw, 280px);
    height: auto;
    margin: 0 auto 36px;

  .closing-eyebrow {
    font-size: 12px;

    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
    font-weight: 500;
  }
  .closing-title {
    font-family: var(--serif);
    font-size: clamp(52px, 7vw, 92px);
    font-weight: 300;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 24px;
  }
  .closing-sub {
    font-family: var(--serif);
    font-size: clamp(17px, 1.6vw, 22px);
    color: var(--text-soft);
    font-style: italic;
    font-weight: 300;
    line-height: 1.5;
    max-width: 60ch;

  .fit-viewport .concept-slide { height:100%; justify-content:center; overflow:hidden; max-width:78ch; }

  .fit-viewport .concept-headline { font-size: clamp(26px, 2.1vw + 1.5vh, 46px) !important; margin-bottom: min(14px,1.9vh) !important; }
  .fit-viewport .concept-lens-tag { margin-bottom: min(12px,1.7vh) !important; }
  .fit-viewport .concept-lead { font-size: clamp(15px, 0.7vw + 0.85vh, 20px) !important; margin-bottom: min(12px,1.6vh) !important; }

<script>
