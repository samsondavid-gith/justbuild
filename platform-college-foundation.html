let WORKSHOP = null;          // sessions-college-foundation.json workshop block
let SESSIONS = [];            // sessions array
let IDEAS = [];               // ideas array (top-level of sessions-college-foundation.json)

// ---- Concept modules: HMV teaching slides inserted before a stage's sessions ----
const CONCEPT_PROPS = {
  glass: '<svg width="44" height="44" viewBox="0 0 46 46"><circle cx="19" cy="19" r="12" fill="none" stroke="#E8B53A" stroke-width="3"/><line x1="28" y1="28" x2="40" y2="40" stroke="#E8B53A" stroke-width="4" stroke-linecap="round"/></svg>',
  hat:   '<svg width="48" height="38" viewBox="0 0 50 40"><path d="M6 30 Q25 6 44 30 Z" fill="#C17D2A"/><rect x="2" y="30" width="46" height="6" rx="3" fill="#9c641f"/><rect x="22" y="9" width="6" height="14" rx="3" fill="#9c641f"/></svg>',
  coin:  '<svg width="44" height="44" viewBox="0 0 46 46"><ellipse cx="23" cy="34" rx="15" ry="6" fill="#6FBF8B"/><ellipse cx="23" cy="24" rx="15" ry="6" fill="#7fd49b"/><ellipse cx="23" cy="14" rx="15" ry="6" fill="#8fe0aa"/><text x="23" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#0A0A0A" font-weight="700">&#8377;</text></svg>'
};

const CONCEPT_MODULES = {
  "agents": {
    "before_session": "1", "stage_number": "01", "stage_name": "Agents",
    "slides": [
      {"lens":"opener","headline":"An agent is not magic. It is a *worker you can describe.*","sub":"This first hour is the practitioner's view: what agents really are, where they help, where they break, and how to trust them. No code yet, just clear sight.","chips":["*What* it is","*Where* it helps and breaks","The *risks* and the guardrails","*How* to trust it"]},
      {"kicker":"WHAT IT IS","headline":"A worker that *reads, decides, and acts.*","lead":"Give it an input, it thinks, it produces an output. Then it does the same for the next one, and the next. That quiet loop is the whole idea.","artifact":"one line: what your agent reads, decides, and produces.","bubble":"Reads. Decides. Acts. <b>On repeat.</b>"},
      {"kicker":"NOT A CHATBOT","headline":"You *talk* to a chatbot. An agent *works* for you.","lead":"A chatbot waits for your next message. An agent takes a whole pile of work and gets through it on its own, the same way every time.","wrong":"A chat that answers when you ask it something.","right":"A worker that takes 25 resumes and returns the top 5, with reasons.","bubble":"One waits. <b>One works.</b>"},
      {"kicker":"THE SHAPE","headline":"Every agent is the same shape: *in, think, out.*","lead":"Once you see it, you see it everywhere. A resume goes in, the model pulls the facts, clean data comes out. Then repeat, 25 times.","artifact":"your task drawn as in, to think, to out.","bubble":"In. Think. <b>Out.</b>"},
      {"kicker":"WHERE IT HELPS","headline":"Agents shine on *many similar things,* judged the same way.","lead":"A stack of documents, the same question asked of each, a ranked answer out. If your work looks like that, an agent fits it beautifully.","wrong":"'Build me an agent for... everything.'","right":"'Sort 200 tickets a day by urgency, the same way each time.'","bubble":"Many similar things. <b>Same judgement.</b>"},
      {"kicker":"THE PAYOFF","headline":"One person, doing the work of a *small team.*","lead":"Screening, triage, first drafts, sorting: the work that used to eat a whole morning now takes about as long as a coffee. That is the real prize.","artifact":"the hours a week this could give back to someone.","bubble":"A morning's work. <b>Now minutes.</b>"},
      {"kicker":"WHERE IT BREAKS","headline":"It sounds confident even when it is *wrong.*","lead":"A model will state a wrong fact with a perfectly straight face. This is the one thing you design around, not the thing you wish away.","wrong":"'It sounded right, so I shipped it.'","right":"'It sounds right AND shows the line it came from.'","bubble":"Confident is <b>not</b> correct."},
      {"kicker":"THE RISKS","headline":"The real danger is the *quiet* mistake.","lead":"Not a robot uprising. A fact pulled wrong, a ranking quietly biased, a note sent to the wrong person. Small, silent, and expensive.","artifact":"the worst thing yours could get wrong, written down.","bubble":"The quiet mistake is <b>the risk.</b>"},
      {"kicker":"GUARDRAIL ONE","headline":"Let AI *judge.* Let code *enforce.*","lead":"The soft call, is this a good fit, goes to the model. The hard rule, anything over a lakh needs a human, goes to plain code that never forgets.","wrong":"'Trust the AI to remember the rule.'","right":"'The AI ranks; one line of code flags what a human must see.'","bubble":"AI judges. <b>Code guards.</b>"},
      {"kicker":"GUARDRAIL TWO","headline":"The agent *recommends.* A person *decides.*","lead":"When the output touches people, money, or a name, the last click stays human. The agent drafts the note; you are the one who sends it.","wrong":"It emails the hiring manager all by itself.","right":"It drafts the note; you read it and press send.","bubble":"Agent drafts. <b>Human sends.</b>"},
      {"kicker":"HOW TO TRUST IT","headline":"You only trust what you can *check.*","lead":"Do the job by hand once. That answer is your yardstick. If the agent's picks match yours, you trust it; where they differ, you learn something.","wrong":"'It picked 5, so it must be right.'","right":"'It matches my 5 on 4. Now I know exactly where it differs.'","artifact":"your by-hand answer, saved as the test it must pass.","bubble":"Check it against <b>your own hand.</b>"},
      {"lens":"opener","mascot":"butterfly","headline":"Describe it. Guard it. *Check it.*","sub":"That is the practitioner's whole view. A worker you can describe, guarded where it matters, and checked against your own hand. Now let us go build one.","bubble":"Describe. Guard. <b>Check.</b>"}
    ]
  },
  "humanics": {
    "before_session": "2", "stage_number": "02", "stage_name": "Humanics",
    "slides": [
      {"lens":"opener","headline":"Before the tool, the *thinking.*","sub":"You cannot automate what you cannot think through. This is the clear-thinking layer, and it is where the real skill lives. Master these habits and every agent you ever build gets easier.","chips":["Break it to *atoms*","See the *whole system*","Define *good*, measurably","Weigh the *trade-offs*","Plan for the *mess*"]},
      {"kicker":"FIRST PRINCIPLES","headline":"Break the job down to its *atoms.*","lead":"'Shortlist resumes' is too big to build. 'Read, pull six facts, score against four criteria, rank' is a set of atoms you can hand straight to a machine.","wrong":"'Automate recruiting.' (too big to build)","right":"'Read, extract six facts, score, rank.' (atoms)","bubble":"Break it to <b>atoms.</b>"},
      {"kicker":"FIRST PRINCIPLES","headline":"Keep asking *why* until it stops.","lead":"Why shortlist? To interview fewer, better people. Why these criteria? Because they predict the job. Dig until you hit the real reason, then build for that, not the surface request.","bubble":"Dig to the <b>real why.</b>"},
      {"kicker":"SYSTEMS THINKING","headline":"See the *whole pipe,* not one clever step.","lead":"Each step feeds the next. A brilliant judging step fed by a sloppy extract still fails. Design the chain, not the one clever trick in the middle.","wrong":"'My judging prompt is genius.' (but fed junk)","right":"'Every stage hands clean data to the next.'","bubble":"Garbage in. <b>Garbage ranked.</b>"},
      {"kicker":"SYSTEMS THINKING","headline":"Every choice has a *ripple.*","lead":"Weight experience too hard and you quietly reject brilliant fresh talent. Think one step past the obvious: what does this rule do to the cases I am not even looking at?","bubble":"Mind the <b>ripple.</b>"},
      {"kicker":"PROBLEM FRAMING","headline":"A sharp *question* beats a clever answer.","lead":"Frame it as 'which 5 of these 25, and why' and the build becomes obvious. A vague goal only ever builds a vague thing.","wrong":"'Make hiring better with AI.'","right":"'From 25 resumes and one JD, return the top 5, with evidence.'","bubble":"Frame it sharp. <b>Build it easy.</b>"},
      {"kicker":"DEFINE GOOD","headline":"Decide what *good* looks like, first.","lead":"If you cannot say what a strong shortlist is, no agent can make one for you. Name the bar before you build the thing meant to clear it.","wrong":"'I will know a good hire when I see it.'","right":"'Good = three years hands-on, a real tool, proof of impact.'","bubble":"Name 'good' <b>first.</b>"},
      {"kicker":"DEFINE GOOD","headline":"Make 'good' something you can *measure.*","lead":"'A strong candidate' is a feeling. 'Scores seven or more on hands-on skill, with a cited example' is a test. Turn your judgement into something checkable.","bubble":"Feelings don't scale. <b>Tests do.</b>"},
      {"kicker":"TRADE-OFFS","headline":"Every agent trades *one mistake for another.*","lead":"Cast a wide net and you interview some weak ones. Cast a tight net and you miss some strong ones. There is no perfect line, only the one you choose on purpose.","wrong":"'It should just be right.'","right":"'I would rather over-include; a missed star costs more than a wasted interview.'","bubble":"Pick your <b>mistake.</b>"},
      {"kicker":"EDGE CASES","headline":"Trust is won on the *weird 10%.*","lead":"Any agent handles the clean, ordinary case. The blank resume, the career-changer, the odd format: how it behaves there is what decides whether you can actually rely on it.","bubble":"The weird case <b>is the test.</b>"},
      {"kicker":"COST OF WRONG","headline":"Weigh what each mistake *actually costs.*","lead":"A wrong shortlist wastes an hour. A wrong medical flag or a wrong payment is a different universe. Match your guardrails to the cost of being wrong, not just to how likely it is.","bubble":"Big cost? <b>Big guardrail.</b>"},
      {"kicker":"INPUTS AND OUTPUTS","headline":"Think in *something in, something out.*","lead":"Every step is one thing in and one thing out. Write each step that way and the design very nearly draws itself.","artifact":"each step written as in, to out.","bubble":"In. Out. <b>That's a step.</b>"},
      {"kicker":"PLAN FOR THE SLIP","headline":"Run a *premortem* before you build.","lead":"Imagine it is next month and the agent embarrassed you. What went wrong? Ask for evidence on every claim, try the messy inputs on purpose, and design for the bad day, not the good one.","wrong":"'It will probably be fine.'","right":"'What happens on the messy one, and how do I catch it?'","bubble":"Assume the <b>bad day.</b>"},
      {"kicker":"ITERATE","headline":"Your first design is a *guess,* not gospel.","lead":"Build it, watch it fail somewhere, fix that one thing, and repeat. Clear thinking gets you a strong first guess; honest iteration turns it into a good agent.","bubble":"First try is a <b>hypothesis.</b>"},
      {"lens":"opener","mascot":"butterfly","headline":"Think clearly, and the *code writes itself.*","sub":"Atoms, the whole system, a measurable bar, the trade-offs, the edge cases, and a plan for the mess. Do this thinking well and building becomes the easy part.","bubble":"Clear thinking. <b>Clean agent.</b>"}
    ]
  },
  "mechanics": {
    "before_session": "3", "stage_number": "03", "stage_name": "Mechanics",
    "slides": [
      {"lens":"opener","headline":"Under the hood, it is *simpler than you fear.*","sub":"Four plain ideas and one move. A model, a prompt, neat output, a key, and the trick of splitting a big job into small agents.","chips":["The *model* and the *prompt*","*Neat* output, the *key*","The *anatomy*: in, brain, out","*Split* into three agents"]},
      {"kicker":"THE MODEL","headline":"A model is a *text-in, text-out* engine.","lead":"Words in, words out. A very good guesser, not a mind. That is the whole brain you are working with, and it is enough.","bubble":"Text in. <b>Text out.</b>"},
      {"kicker":"THE PROMPT","headline":"The prompt is you *instructing* the worker.","lead":"Clear instructions, clear work. Most of an agent's quality lives in how well you ask for what you want.","wrong":"'Rank these.'","right":"'Return name, years, skills as JSON, then score each 0 to 10 and cite the line.'","bubble":"Good prompt. <b>Good worker.</b>"},
      {"kicker":"NEAT OUTPUT","headline":"Ask for *data,* not a paragraph.","lead":"'Give it back as JSON with these fields' turns a chatty reply into something the next step can actually use.","wrong":"'Tell me about this candidate.'","right":"'Return name, years, and skills as neat fields.'","bubble":"Neat data <b>beats prose.</b>"},
      {"kicker":"THE KEY","headline":"The key is just a *password.*","lead":"It tells the service it is you. Get one free, paste it once, and you are done. That is the entire mystery.","wrong":"'API keys are scary and technical.'","right":"'Copy, paste, run.'","bubble":"It's just a <b>password.</b>"},
      {"kicker":"THE ANATOMY","headline":"Every agent is *input, brain, output.*","lead":"Take something in, call the model, write something out. That is the atom. Everything else is repeating it and joining the pieces up.","artifact":"your task as in, to brain, to out.","bubble":"In, brain, <b>out.</b>"},
      {"kicker":"THE MOVE","headline":"One big prompt *guesses.* Small agents *reason.*","lead":"Split the job. One agent extracts, one judges, one communicates. Each is small, each is testable, each is easy to fix on its own.","wrong":"'Read 25 and email the best 5.' (one big leap)","right":"'Extract. Judge. Draft. Three small steps.'","bubble":"Split it. <b>Then it reasons.</b>"},
      {"kicker":"THE THREE AGENTS","headline":"Ingest, then *judge,* then communicate.","lead":"Agent 1 turns resumes into facts. Agent 2 scores those facts against the JD and ranks. Agent 3 drafts the note for a human to send.","artifact":"the three agents, and what each takes and returns.","bubble":"Extract. Judge. <b>Communicate.</b>"},
      {"kicker":"THE CONTRACT","headline":"Agent 1's output is Agent 2's *input.*","lead":"The clean facts are the handshake between them. Agree the fields once, and the whole pipeline holds together without surprises.","wrong":"'Each agent just does its own thing.'","right":"'They share one agreed shape of data.'","bubble":"One shape. <b>One contract.</b>"},
      {"lens":"opener","mascot":"butterfly","headline":"Four ideas, three agents, *one pipeline.*","sub":"Model, prompt, neat output, key. Split the work into extract, judge, communicate. That is genuinely everything you need to build a real agent.","bubble":"Simple parts. <b>Real agent.</b>"}
    ]
  },
  "design": {
    "before_session": "5", "stage_number": "04", "stage_name": "Design",
    "slides": [
      {"lens":"opener","headline":"Design the Agent's *Logic.*","sub":"Before any code, we design the thinking. We'll build all three agents on the board, step by step: what goes in, what happens inside, and what must never break.","chips":["The *whole* pipeline","Agent 1: *extract*","Agent 2: *judge*","Agent 3: *communicate*"]},
      {"kicker":"THE WHOLE PIPELINE","diagram":"pipeline","headline":"Three small workers, *in a line.*","lead":"Resumes become facts, facts become a ranked five, the five become a drafted note a human sends. Each box does exactly one job.","bubble":"Three workers. <b>One line.</b>"},
      {"kicker":"THE SHARED RULE","headline":"Each agent does *one* job, and hands off *clean.*","lead":"The secret to a pipeline that holds: every agent has a single purpose and passes tidy, agreed data to the next. One job in, one clean thing out.","bubble":"One job. <b>Clean handoff.</b>"},

      {"kicker":"AGENT 1 · THE SHAPE","diagram":"agent1","headline":"Agent 1 turns *messy files* into *clean facts.*","lead":"It takes the raw resumes and returns the same tidy set of facts for every candidate. Messy in, tidy out.","bubble":"Messy in. <b>Tidy out.</b>"},
      {"kicker":"AGENT 1 · THE STEPS","diagram":"agent1steps","headline":"Inside Agent 1: *three* small steps.","lead":"Open each file, pull the fields you decided matter, and return them in one fixed shape, the same fields every time.","bubble":"Same fields, <b>every time.</b>"},
      {"kicker":"AGENT 1 · THE WHY","headline":"Why extract *before* judging?","lead":"A judge needs facts, not paragraphs. Turning every resume into the same tidy shape first is what makes fair, repeatable scoring even possible.","bubble":"Facts first. <b>Then judge.</b>"},
      {"kicker":"AGENT 1 · WATCH OUT","headline":"Watch out: the *missing* field.","lead":"Some resumes will not have what you asked for. Decide now what happens then.","wrong":"Silently leave it blank and let the score wobble.","right":"Mark it 'not found' so the judge, and you, can see the gap.","bubble":"Name the <b>gap.</b>"},

      {"kicker":"AGENT 2 · THE SHAPE","diagram":"agent2","headline":"Agent 2 turns *facts* into a *ranking.*","lead":"It takes the clean facts and returns a ranked top five, each with the evidence behind its score.","bubble":"Facts in. <b>Ranking out.</b>"},
      {"kicker":"AGENT 2 · THE STEPS","diagram":"agent2steps","headline":"Inside Agent 2: *four* small steps.","lead":"Turn the JD into a rubric, score each candidate against it with a cited reason, apply any hard rule, then rank and keep the top five.","bubble":"Score. Rule. <b>Rank.</b>"},
      {"kicker":"AGENT 2 · THE WHY","headline":"Why *evidence* with every score?","lead":"A number alone you cannot trust or defend. A score with the line it came from is checkable, arguable, and fair. Evidence turns a guess into a judgement.","bubble":"No evidence, <b>no trust.</b>"},
      {"kicker":"AGENT 2 · WATCH OUT","headline":"Watch out: *bias* hiding in the rubric.","lead":"Your criteria quietly decide who rises. Choose them on purpose.","wrong":"'Top college' as a criterion, quietly ranking privilege.","right":"'Evidence of real impact', which anyone can show.","bubble":"Check the <b>criteria.</b>"},
      {"kicker":"AGENT 2 · THE HARD RULE","headline":"Some calls belong to *code,* not the model.","lead":"Anything that must never bend, a mandatory certification, a firm cutoff, goes in a line of code, not a prompt. The model judges; code enforces.","bubble":"AI judges. <b>Code enforces.</b>"},

      {"kicker":"AGENT 3 · THE SHAPE","diagram":"agent3","headline":"Agent 3 turns a *shortlist* into a *draft.*","lead":"It takes the top five and drafts a clear note to the hiring manager. Then it stops. A human reads and sends.","bubble":"It drafts. <b>You send.</b>"},
      {"kicker":"AGENT 3 · THE WHY","headline":"Why draft, and then *stop*?","lead":"The moment an agent sends on its own, a small mistake becomes a real one in someone's inbox. Drafting keeps all the speed and removes the danger.","bubble":"Speed, minus the <b>danger.</b>"},
      {"kicker":"AGENT 3 · WATCH OUT","headline":"Watch out: the *auto-send.*","lead":"It is tempting to let it fire the email itself. Don't.","wrong":"Agent emails the manager the instant it finishes.","right":"Agent drafts; the note waits for your one click.","bubble":"Never <b>auto-send.</b>"},

      {"kicker":"THE HANDSHAKE","diagram":"contract","headline":"What makes three agents *one* pipeline.","lead":"Agent 1's output shape is exactly Agent 2's input shape. Agree the fields once, and the whole thing clicks together.","bubble":"One shape. <b>One contract.</b>"},
      {"kicker":"THE PAYOFF","diagram":"pipelinefull","headline":"You can now draw the *whole agent.*","lead":"Three agents, the data flowing between them, and a human at the end. When we open Colab next, the code is just this picture, typed out.","artifact":"your three-agent design on one page, before any code.","bubble":"Draw it first. <b>Then build.</b>"},
      {"lens":"opener","mascot":"butterfly","headline":"Design first. *Then* the code is easy.","sub":"You just designed a real agent with nothing but a marker and clear thinking. The notebook next is only this design, made to run.","bubble":"Design it. <b>Then run it.</b>"}
    ]
  },
  "notebook": {
    "before_session": "6", "stage_number": "05", "stage_name": "Build",
    "slides": [
      {"lens":"opener","headline":"Before we open the notebook, know *what you're looking at.*","sub":"We're about to run the three-agent design live in a Colab notebook. Two minutes of orientation so nothing on the screen is a mystery, and nothing can derail us.","chips":["What a *notebook* is","The *API key*","*Free* vs *paid*","The *OC Brain* resilience layer"]},
      {"kicker":"THE NOTEBOOK","headline":"A notebook is *code you run one block at a time.*","lead":"Google Colab runs Python in your browser, nothing to install. It is a stack of labelled cells. Press play on a cell, it runs, and the result appears right underneath. We go top to bottom.","bubble":"Read it. Run it. <b>Watch it.</b>"},
      {"kicker":"YOUR JOB IN THE NOTEBOOK","headline":"You *run* and *read.* You don't write from a blank page.","lead":"The design you just drew on the board is already typed out. You will change a few clearly marked lines, press play, and read what comes back. That is the entire loop.","wrong":"'I must understand every line to use it.'","right":"'I run the blocks in order and read the output.'","bubble":"Run, read, <b>repeat.</b>"},
      {"kicker":"THE API KEY","headline":"An API key is *your password to the AI.*","lead":"The notebook does not contain the model. It phones Google's Gemini over the internet. The key proves the call is yours, and Google counts your usage against it. No key, no answers.","bubble":"It's a key. <b>Treat it like one.</b>"},
      {"kicker":"THE API KEY · CARE","headline":"Keep the key *private.*","lead":"A key is like a house key: fine in your pocket, dangerous on a noticeboard. Never paste it into a chat, a screenshot, or a shared doc.","wrong":"Paste your key into a message or a slide.","right":"Keep it private; if it ever leaks, revoke it and generate a new one.","bubble":"Private. <b>Always.</b>"},
      {"kicker":"FREE VS PAID","headline":"The *free* key works, until everyone leans on it.","lead":"A free Gemini key has tight limits: only so many calls a minute, and it shares capacity with the whole world. A paid, billing-enabled key raises those limits and gives you priority. Same model, steadier access.","bubble":"Same brain. <b>Steadier line.</b>"},
      {"kicker":"WHEN IT'S THE SERVER","headline":"A *5xx* code means Google's side, not yours.","lead":"These appear when Google's shared servers are busy. Nothing in your code is wrong. You wait a moment, or you let the OC Brain carry on.","rows":[{"code":"503","means":"*Overloaded.* The model is temporarily busy right now.","act":"Wait a few seconds and run the cell again."},{"code":"500","means":"*Internal error.* A hiccup on Google's servers.","act":"Same fix: pause, then retry."}],"bubble":"5xx? <b>Wait it out.</b>"},
      {"kicker":"WHEN IT'S YOUR SIDE","headline":"A *4xx* code means your key, quota, or model name.","lead":"These are about your account and your request, not Google being busy. Once you know which one it is, most are quick to handle.","rows":[{"code":"429","means":"*Free tier spent.* Too many calls a minute, or the day's free allowance is used up (Google tightened the free tier in Dec 2025).","act":"Wait for the daily reset, or switch to a paid key. Retrying at once won't help once the day's quota is gone."},{"code":"404","means":"*Model renamed.* The model name was retired or changed.","act":"Point the notebook at the current model name."},{"code":"400","means":"*Key or billing.* Key missing or invalid, or billing not enabled for your region.","act":"Re-paste the key; enable billing if your region needs it."}]},
      {"kicker":"THE OC BRAIN","headline":"When the network wobbles, *the OC Brain holds the line.*","lead":"Live AI leans on a busy, shared server that will sometimes make you wait. The OC Brain is the layer we built so that never becomes your problem: one quiet switch, and the room keeps moving at full pace, on the very same 25 resumes.","bubble":"It just <b>keeps going.</b>"},
      {"kicker":"UNDER THE OC BRAIN","headline":"Real when it can be. *Ready when it can't.*","lead":"When Gemini answers, you see the live model, exactly as built. When it stalls, the OC Brain carries the very same result through, in the identical shape, so the thread never breaks. Same output, none of the waiting.","wrong":"A second, cleverer AI that quietly never fails.","right":"A resilience layer, prepared in advance, so the room never stalls.","bubble":"Seamless by <b>design.</b>"},
      {"kicker":"WHAT YOU'LL SEE","diagram":"pipeline","headline":"Messy files becoming a *clean, ranked answer.*","lead":"Watch for three moments: raw resumes turning into a tidy table (Agent 1), a ranked top five each with a reason (Agent 2), and a drafted recommendation you approve or reject (Agent 3).","bubble":"Watch the <b>three moments.</b>"},
      {"kicker":"YOUR PART","headline":"Follow the *flow,* not every character.","lead":"I will run the cells. You track the story: what went in, what each agent decided, and where the human stays in control. If an error pops up, we flip the OC Brain and keep the thread.","bubble":"Follow the <b>flow.</b>"},
      {"lens":"opener","mascot":"butterfly","headline":"Now we open the *notebook.*","sub":"Screens down, eyes up. I'll share the Colab link and drive. Watch the three agents work on the exact 25 resumes you just ranked by hand.","bubble":"Here we go. <b>Let's build.</b>"}

const fmt = (s) => {
  const sign = s < 0 ? "-" : "";
  s = Math.abs(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${sign}${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
};

/* ----- Load sessions.json ----- */
async function loadSessions() {
  try {
    const res = await fetch("./sessions-college-foundation.json", { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    WORKSHOP = data.workshop;
    SESSIONS = data.sessions;
    IDEAS = data.ideas || [];
    buildScreenSequence();
    renderCurrent();
  } catch (err) {
    $("#stage").innerHTML = `
      <div class="error">
        <h2>Could not load sessions-college-foundation.json</h2>
        <p>Make sure <code>sessions-college-foundation.json</code> sits next to <code>platform-college-foundation.html</code>.</p>
        <p style="margin-top:16px; font-size:14px;">If you opened this file directly with a double-click, your browser blocks local fetches. Run a local server with <code>python3 -m http.server</code> in the same folder, then open <code>http://localhost:8000/platform-college-foundation.html</code>.</p>
        <p style="margin-top:24px; opacity:0.5; font-size:12px;">${err.message}</p>
      </div>`;
  }
}

/* ----- Build the flat screen sequence ----- */
function buildScreenSequence() {
  SCREENS = [];

  // Welcome layer
  SCREENS.push({ type: "welcome" });
  SCREENS.push({ type: "founder-welcome" });
  SCREENS.push({ type: "housekeeping" });
  SCREENS.push({ type: "tools-landscape" });
  SCREENS.push({ type: "two-doors" });

  // Track phase transitions so we can insert interludes between them
  let prevPhase = null;
  let prevDay = null;

  SESSIONS.forEach((session, idx) => {
    const phase = session.phase;
    const day = String(session.day);

    // Day 2 morning welcome, first session of Day 2 of the weekend
    if (phase === "weekend" && day === "2" && prevDay !== "2") {
      SCREENS.push({ type: "day2-checkin" });
    }

    // Office-hours phase opener, appears once, before the first week of office hours
    if (phase === "office_hours" && prevPhase !== "office_hours") {
      SCREENS.push({ type: "phase-break", to: "office_hours" });
    }

    // Demo Day opener, appears once, before the Demo Day session
    if (phase === "demo_day" && prevPhase !== "demo_day") {
      SCREENS.push({ type: "phase-break", to: "demo_day" });
    }

    SCREENS.push({ type: "session-start", session });

    // Concept module (HMV teaching slides): the first slides INSIDE the stage's first
    // session, so the session clock runs and the chrome shows. `before_session` names
    // that first session of the stage.
    Object.keys(CONCEPT_MODULES).forEach((stageKey) => {
      const mod = CONCEPT_MODULES[stageKey];
      if (mod && mod.before_session === session.id) {
        mod.slides.forEach((slide, sIdx) => {
          SCREENS.push({
            type: "concept",
            session,
            slide: slide,
            stageNumber: mod.stage_number,
            stageName: mod.stage_name,
            conceptIndex: sIdx,
            conceptTotal: mod.slides.length
          });
        });
      }
    });

    SCREENS.push({ type: "stage", session });

    // Idea cards screen, appears once, inside Session 1 (Pick your idea), right after the
    // stage-setting, mirroring the school flow. Shows 8 ideas from the active set; the
    // founder picks one and personalises it in this same session.
    if (session.id === "7") {
      SCREENS.push({ type: "idea-cards" });
    }

    // Office hours screen is dedicated and replaces the standard question/prompt/build/test flow
    if (session.session_type === "office_hours") {
      SCREENS.push({ type: "office-hours", session });
      // If this office-hours session defines a step-by-step procedure (like the chatbot),
      // walk its steps after the support screen, just like a build session. Otherwise give
      // each prompt its own screen (like Session 10 pitch deck).
      if (session.procedure && session.procedure.sections) {
        session.procedure.sections.forEach((section, secIdx) => {
          (section.steps || []).forEach((stp, stIdx) => {
            SCREENS.push({
              type: "step",
              session,
              section,
              step: stp,
              sectionIndex: secIdx,
              stepIndex: stIdx,
              code: section.id + String(stIdx + 1)
            });
          });
        });
      } else {
        const ohPrompts = session.prompts || [];
        ohPrompts.forEach((prompt, pIdx) => {
          SCREENS.push({
            type: "prompt",
            session,
            prompt,
            promptIndex: pIdx,
            promptTotal: ohPrompts.length
          });
        });
      }
      // Test output (the "homework leaves the room" check) still applies if present
      if (session.test_output && session.test_output.length) {
        SCREENS.push({ type: "test-output", session });
      }
      if (session.output_capture) {
        SCREENS.push({ type: "output-capture", session });
      }
      SCREENS.push({ type: "session-end", session });
      prevPhase = phase;
      prevDay = day;
      return;
    }

    // Step-by-step procedure (the build SOP): one screen per step, grouped into
    // sections. Replaces the standard question/hmv/prompt/build/test flow for any
    // session that defines a `procedure`. The full prompts live on the prompts page;
    // a step that uses one points the room there.
    if (session.procedure && session.procedure.sections) {
      session.procedure.sections.forEach((section, secIdx) => {
        (section.steps || []).forEach((stp, stIdx) => {
          SCREENS.push({
            type: "step",
            session,
            section,
            step: stp,
            sectionIndex: secIdx,
            stepIndex: stIdx,
            code: section.id + String(stIdx + 1)
          });
        });
      });
      if (session.output_capture) {
        SCREENS.push({ type: "output-capture", session });
      }
      SCREENS.push({ type: "session-end", session });
      prevPhase = phase;
      prevDay = day;
      return;
    }

    // Standard flow for all other session types (kickoff, build, milestone, interim_demo,
    // planning, demo_day, close)
    (session.questions || []).forEach((q, qIdx) => {
      SCREENS.push({
        type: "question",
        session,
        question: q,
        questionIndex: qIdx,
        questionTotal: session.questions.length,
      });
    });

    if (session.hmv && session.hmv.length) {
      SCREENS.push({ type: "hmv", session });
    }

    (session.prompts || []).forEach((p, pIdx) => {
      SCREENS.push({
        type: "prompt",
        session,
        prompt: p,
        promptIndex: pIdx,
        promptTotal: session.prompts.length,
      });
    });

    if (session.build && session.build.length) {
      SCREENS.push({ type: "build", session });
    }

    if (session.test_output && session.test_output.length) {
      SCREENS.push({ type: "test-output", session });
    }

    // Output capture happens after test-output, before session-end (for build sessions)
    if (session.output_capture) {
      SCREENS.push({ type: "output-capture", session });
    }

    SCREENS.push({ type: "session-end", session });

    // End-of-Day-1 interlude, fires after the last session of Day 1 in the weekend phase
    const nextSession = SESSIONS[idx + 1];
    const isLastOfDay1 = phase === "weekend" && day === "1"
      && (!nextSession || String(nextSession.day) !== "1" || nextSession.phase !== "weekend");
    if (isLastOfDay1) {
      SCREENS.push({ type: "day1-photo" });
    }

    // After Demo Day: SWISH retake (scoring tallied in parallel), then awards
    if (session.session_type === "demo_day") {
      SCREENS.push({ type: "swish-retake" });
      SCREENS.push({ type: "awards" });
    }

    if (session.break_after) {
      SCREENS.push({
        type: "break",
        afterSession: session,
        nextSession: SESSIONS[idx + 1] || null,
      });
    }

    prevPhase = phase;
    prevDay = day;
  });

  // What you built first, then the final inspirational slide (closing is the last screen)
  SCREENS.push({ type: "workshop-complete" });
  SCREENS.push({ type: "closing" });
}

/* ----- Navigation ----- */
function next() {
  if (currentScreenIdx < SCREENS.length - 1) {
    currentScreenIdx++;
    renderCurrent();
  }
}
function prev() {
  if (currentScreenIdx > 0) {
    currentScreenIdx--;
    renderCurrent();
  }
}

/* ----- Render current screen ----- */
function renderCurrent() {
  const screen = SCREENS[currentScreenIdx];
  const stage = $("#stage");
  const topbar = $("#topbar");
  const bottombar = $("#bottombar");

  // Stop break timer if leaving break
  if (screen.type !== "break" && breakTimer.intervalId) {
    clearInterval(breakTimer.intervalId);
    breakTimer.intervalId = null;
  }

  // Top/bottom bars hidden on welcome-layer screens, break, complete, and interlude moments
  const isWelcomeLayer = screen.type === "welcome" || screen.type === "founder-welcome" || screen.type === "housekeeping"
                       || screen.type === "two-doors" || screen.type === "journey-map"
                       || screen.type === "tools-landscape";
  const isInterlude = screen.type === "day1-photo"
                    || screen.type === "day2-checkin"
                    || screen.type === "phase-break"
                    || screen.type === "portfolio-reveal" || screen.type === "swish-retake" || screen.type === "awards" || screen.type === "closing";
  const noChrome = isWelcomeLayer || isInterlude || screen.type === "workshop-complete" || screen.type === "break";
  topbar.classList.toggle("hidden", noChrome);
  bottombar.classList.toggle("hidden", screen.type === "welcome");
  renderBuildbar(screen);

  // Concept caterpillar buddy, shown only on concept slides
  const cat = document.getElementById("concept-cat");
  if (cat) {
    if (screen.type === "concept") {
      const sl = screen.slide || {};
      document.getElementById("concept-cat-prop").innerHTML = "";
      const bub = document.getElementById("concept-cat-bubble");
      if (sl.bubble) { bub.innerHTML = sl.bubble; bub.style.display = ""; } else { bub.style.display = "none"; }
      const cimg = document.getElementById("concept-cat-img");
      if (cimg) cimg.src = (sl.mascot === "butterfly") ? "butterfly.png" : "funny-caterpillar.png";
      cat.style.display = (sl.qr || sl.qrs || sl.nbgrid) ? "none" : "block";
    } else {
      cat.style.display = "none";
    }
  }

  // Update topbar context
  if (screen.session) {
    $("#topbar-eyebrow").textContent = topbarEyebrow(screen.session);
    $("#topbar-title").textContent = screen.session.title;
    $("#topbar-section").textContent = "";  // section counter removed (redundant, crowded the title)
    updateProgress();
  } else if (screen.type === "idea-cards") {
    const defaultPage = (WORKSHOP && WORKSHOP.cohort_idea_page) || 1;
    const activePage = Number(window.__ideaSetActive || defaultPage);
    $("#topbar-eyebrow").textContent = "IDEATE";
    $("#topbar-title").textContent = "Build your own agent";
    $("#topbar-section").textContent = `${(IDEAS||[]).length} enterprise AI agents`;
    updateProgress();
  }

  // Reset/start timer for sessions
  if (screen.session && screen.type === "session-start") {
    setupTimer(screen.session);
  } else if (isWelcomeLayer || isInterlude || screen.type === "workshop-complete") {
    stopTimer();
  }

  // Render content
  let html = "";
  switch (screen.type) {
    case "welcome":            html = renderWelcome(); break;
    case "founder-welcome":    html = renderFounderWelcome(); break;
    case "housekeeping":       html = renderHousekeeping(); break;
    case "two-doors":          html = renderTwoDoors(); break;
    case "journey-map":        html = renderJourneyMap(); break;
    case "tools-landscape":    html = renderToolsLandscape(); break;
    case "idea-cards":         html = renderIdeaCards(); break;
    case "concept":            html = renderConcept(screen); break;
    case "day1-photo":         html = renderDay1Photo(); break;
    case "day2-checkin":       html = renderDay2Checkin(); break;
    case "phase-break":        html = renderPhaseBreak(screen); break;
    case "portfolio-reveal":   html = renderPortfolioReveal(); break;
    case "swish-retake":       html = renderSwishRetake(); break;
    case "awards":             html = renderAwards(); break;
    case "closing":            html = renderClosing(); break;
    case "session-start":      html = renderSessionStart(screen.session); break;
    case "stage":              html = renderStage(screen.session); break;
    case "step":               html = renderStep(screen); break;
    case "question":           html = renderQuestion(screen); break;
    case "hmv":                html = renderHMV(screen.session); break;
    case "prompt":             html = renderPrompt(screen); break;
    case "build":              html = renderBuild(screen.session); break;
    case "test-output":        html = renderTestOutput(screen.session); break;
    case "office-hours":       html = renderOfficeHours(screen.session); break;
    case "output-capture":     html = renderOutputCapture(screen.session); break;
    case "session-end":        html = renderSessionEnd(screen); break;
    case "break":              html = renderBreak(screen); break;
    case "workshop-complete":  html = renderWorkshopComplete(); break;
  }
  stage.innerHTML = `<div class="screen">${html}</div>`;

  // Lock viewport for screens that need the bottom strip always visible
  stage.classList.toggle("fit-viewport", screen.type === "prompt" || screen.type === "idea-cards" || screen.type === "step" || screen.type === "awards" || screen.type === "concept" || screen.type === "build");

  // Wire up dynamic handlers per screen
  attachHandlers(screen);

  // Refresh the jump-to-session menu state
  refreshJumpMenu();

  // Prev/next state
  $("#prev-btn").disabled = currentScreenIdx === 0;
  $("#next-btn").disabled = currentScreenIdx >= SCREENS.length - 1;
}

function topbarEyebrow(session) {
  // Show stage as the primary label when available; the session number/role appears in the subtitle/title.
  // For the Kickoff session, the stage is just "Kickoff" itself (not a venture stage).
  if (session.stage) {
    return session.stage.toUpperCase();
  }
  // Fallback for sessions without stage (should not happen in v3)
  if (session.session_type === "office_hours") return `${session.day} · Office Hours`;
  if (session.session_type === "demo_day") return "Demo Day";
  if (session.session_type === "close") return "Close";
  if (session.session_type === "kickoff") return "Kickoff";
  if (session.session_type === "milestone") return "Milestone";
  if (session.session_type === "interim_demo") return "Interim Demo Day";
  if (session.session_type === "planning") return "Planning";
  return `Session ${session.number}`;
}

function sectionLabel(screen) {
  switch (screen.type) {
    case "session-start":  return "Begin";
    case "stage":          return "Set the Stage";
    case "step":           return screen.section ? screen.section.name : "Build";
    case "question":       return `Question ${screen.questionIndex + 1} of ${screen.questionTotal}`;
    case "hmv":            return "HMV Techniques";
    case "prompt":         return screen.promptTotal > 1
                            ? `Prompt ${screen.promptIndex + 1} of ${screen.promptTotal}`
                            : "The Prompt";
    case "build":          return "Build";
    case "test-output":    return "Test Output";
    case "office-hours":   return "Office Hours";
    case "output-capture": return "Save your work";
    case "session-end":    return "Complete";
    case "concept":        return `Concept ${screen.conceptIndex + 1} of ${screen.conceptTotal}`;
    default:               return "";
  }
}

function buildbarState(screen) {
  const t = screen.type;
  if (t==="welcome"||t==="founder-welcome"||t==="housekeeping"||t==="two-doors"||t==="journey-map"||t==="tools-landscape") return null;
  if (screen.session) {
    const n = Number(screen.session.number);
    if (n >= 1 && n <= 7) return { done: n-1, current: n-1 };
    return { done: 7, current: -1 };
  }
  if (t === "idea-cards") return { done: 0, current: 0 };
  if (t === "break") {
    const nn = screen.nextSession ? Number(screen.nextSession.number) : 0;
    if (nn >= 1 && nn <= 7) return { done: nn-1, current: -1 };
    return { done: 7, current: -1 };
  }
  if (t === "day1-photo" || t === "day2-checkin") return { done: 4, current: -1 };
  return { done: 7, current: -1 };
}

function renderBuildbar(screen) {
  const bar = document.getElementById("buildbar");
  if (!bar) return;
  const st = buildbarState(screen);
  if (!st) { bar.classList.add("hidden"); return; }
  const stages = (WORKSHOP && WORKSHOP.steps) ? WORKSHOP.steps : ((WORKSHOP && WORKSHOP.stages) ? WORKSHOP.stages : []);
  const curStage = screen.session ? (screen.session.nav || screen.session.stage) : null;
  const curIdx = stages.indexOf(curStage);
  let html = '<span class="bb-title">BUILD PROGRESS</span><div class="bb-track">';
  stages.forEach(function (name, idx) {
    let cls = "bb-item bb-clickable";
    if (curIdx > -1 && idx < curIdx) cls += " done";
    else if (idx === curIdx) cls += " current";
    const mark = (curIdx > -1 && idx < curIdx) ? "\u2713" : "";
    if (idx > 0) html += '<span class="bb-sep"></span>';
    html += '<span class="' + cls + '" data-stage="' + name.replace(/"/g, "") + '"><span class="bb-dot">' + mark + '</span>' + name + '</span>';
  });
  html += '</div>';
  bar.innerHTML = html;
  bar.classList.remove("hidden");
  bar.querySelectorAll(".bb-item[data-stage]").forEach(function (elm) {
    elm.onclick = function () {
      const stg = elm.getAttribute("data-stage");
      const targetIdx = SCREENS.findIndex(function (s) { return s.session && (s.session.nav || s.session.stage) === stg; });
      if (targetIdx > -1) jumpToScreen(targetIdx);
    };
  });
}
function updateProgress() {
  const screen = SCREENS[currentScreenIdx];
  if (!screen.session) return;
  const sessionId = screen.session.id;
  const sessionScreens = SCREENS.filter(s => s.session && s.session.id === sessionId);
  const indices = SCREENS
    .map((s, i) => (s.session && s.session.id === sessionId) ? i : -1)
    .filter(i => i !== -1);
  const localIdx = indices.indexOf(currentScreenIdx);
  const total = sessionScreens.length;

  const pct = total <= 1 ? 100 : Math.round((localIdx / (total - 1)) * 100);
  $("#progress").innerHTML = `<div class="progress-fill" style="width:${pct}%"></div>`;
}

function renderConcept(screen) {
  const sl = screen.slide || {};
  if (sl.lens === "opener") {
    const chips = (sl.chips || []).map(function(c){
      return '<div class="concept-t"><span class="concept-td" style="background:var(--accent)"></span> ' + conceptEm(c) + '</div>';
    }).join("");
    return `
      <div class="concept-slide concept-opener">
        <div class="concept-stage-num">${screen.stageNumber ? `STAGE ${escapeHtml(screen.stageNumber)} &middot; ` : ""}${escapeHtml((screen.stageName || "").toUpperCase())}</div>
        <h1 class="concept-opener-title">${conceptEm(sl.headline)}</h1>
        <div class="concept-opener-sub">${conceptEm(sl.sub || "")}</div>
        ${chips ? `<div class="concept-three">${chips}</div>` : ""}
      </div>`;
  }
  let body = "";
  if (sl.lead) body += `<p class="concept-lead">${conceptEm(sl.lead)}</p>`;
  const _w = sl.wrong || sl.bad, _g = sl.right || sl.good;
  if (_w || _g) {
    body += `<div class="concept-ba">`;
    if (_w) body += `<div class="concept-ba-card concept-bad"><div class="concept-ba-label">The wrong way</div><p>${_w}</p></div>`;
    if (_g) body += `<div class="concept-ba-card concept-good"><div class="concept-ba-label">The right way</div><p>${_g}</p></div>`;
    body += `</div>`;
  }
  (sl.paras || []).forEach(function(p){ body += `<p>${conceptEm(p)}</p>`; });
  if (sl.rows) {
    body += '<div class="concept-errs">' + sl.rows.map(function(r){
      return '<div class="concept-err"><span class="concept-err-code">' + escapeHtml(r.code) + '</span><div class="concept-err-txt"><div class="concept-err-m">' + conceptEm(r.means) + '</div><div class="concept-err-a">' + conceptEm(r.act) + '</div></div></div>';
    }).join('') + '</div>';
  }
  if (sl.steps) {
    body += '<ol class="concept-steps">' + sl.steps.map(function(s){
      var t = (typeof s === 'string') ? s : (s.title || '');
      var d = (typeof s === 'object' && s.detail) ? '<span class="concept-step-d">' + conceptEm(s.detail) + '</span>' : '';
      return '<li class="concept-step"><span class="concept-step-t">' + conceptEm(t) + '</span>' + d + '</li>';
    }).join('') + '</ol>';
  }
  if (sl.qrs) {
    body += '<div class="concept-qrs">' + sl.qrs.map(function(q){
      return '<div class="concept-qr-card"><div class="concept-qr-box">' + q.svg + '</div><div class="concept-qr-label">' + conceptEm(q.label) + '</div><div class="concept-qr-url">' + escapeHtml(q.url) + '</div></div>';
    }).join('') + '</div>';
  }
  if (sl.nbgrid) {
    body += '<div class="concept-nbgrid">' + sl.nbgrid.map(function(q){
      return '<div class="concept-nb-card"><div class="concept-nb-box">' + q.svg + '</div><div class="concept-nb-text"><div class="concept-nb-name">' + conceptEm(q.label) + '</div><div class="concept-nb-url">' + escapeHtml(q.url) + '</div></div></div>';
    }).join('') + '</div>';
  }
  if (sl.diagram) body = '<div class="concept-diagram">' + renderDiagram(sl.diagram) + '</div>' + body;
  const kicker = sl.kicker || sl.practice || "";

function parseStepTool(t) {
  if (!t) return null;
  const m = String(t).match(/^(.*?)\s*\(([^)]+)\)\s*$/);
  if (m) {
    const domain = m[2].trim().replace(/^https?:\/\//, "").replace(/\/+$/, "");
    return { name: m[1].trim(), url: "https://" + domain };
  }
  return { name: String(t).trim(), url: null };
}

function renderStep(screen) {
  const st = screen.step || {};
  const section = screen.section || {};
  const code = screen.code || "";
  const tool = st.tool ? parseStepTool(st.tool) : null;
  const detail = (st.detail || []).map((line, i) =>
    `<li><span class="step-detail-num">${i + 1}</span><span>${escapeHtml(line)}</span></li>`
  ).join("");

  let promptCallout = "";
  if (st.prompt_ref) {
    const p = (screen.session.prompts || []).find(x => x.number === st.prompt_ref);
    const ptitle = p ? p.title : ("Prompt " + st.prompt_ref);
    promptCallout = `
      <div class="step-prompt">
        <span class="step-prompt-tag">Prompt ${st.prompt_ref}</span>
        <div class="step-prompt-body">
          <div class="step-prompt-title">${escapeHtml(ptitle)}</div>
          <div class="step-prompt-where">Copy it on your laptop &middot; justbuild.orangecaterpillar.com/prompts-college</div>
        </div>
      </div>`;
  }

  const toolLine = tool
    ? `<div class="step-tool">${tool.url
        ? `<a href="${escapeHtml(tool.url)}" target="_blank" rel="noopener">${escapeHtml(tool.name)} &#8599;</a>`
        : escapeHtml(tool.name)}</div>`
    : "";

  return `
    <div class="step-screen">
      <div class="step-head">
        <span class="step-code">${escapeHtml(code)}</span>
        <span class="step-section-name">${escapeHtml(section.name || "")}</span>
      </div>
      <h2 class="step-title">${escapeHtml(st.title || "")}</h2>
      ${st.body ? `<p class="step-lead">${escapeHtml(st.body)}</p>` : ""}
      ${toolLine}
      ${detail ? `<ol class="step-detail">${detail}</ol>` : ""}
      ${promptCallout}
    </div>
  `;
}

function renderTestOutput(s) {
  const sessionId = s.id;
  if (!testsChecked[sessionId]) {
    testsChecked[sessionId] = (s.test_output || []).map(() => false);
  }
  const items = (s.test_output || []).map((t, i) => {
    const checked = testsChecked[sessionId][i];
    return `
      <li class="test-item ${checked ? "checked" : ""}" data-idx="${i}" data-session="${sessionId}">
        <div class="checkbox">
          <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,8 7,12 13,4"></polyline>
          </svg>

        <div class="test-content">
          <h4>${escapeHtml(t.title)}</h4>
          <p>${escapeHtml(t.description)}</p>
        </div>
      </li>
    `;
  }).join("");
  const allChecked = testsChecked[sessionId].every(Boolean);
  const testCount = (s.test_output || []).length;
  const numWord = testCount === 1 ? "One question" : `${testCount} questions`;
  const allWord = testCount === 1 ? "It must" : "All must";
  return `
    <div class="label">Test Output</div>
    <p class="test-intro">${numWord}. ${allWord} be yes before moving to the next session.</p>
    <ul class="test-list">${items}</ul>
    <div class="all-checked-banner ${allChecked ? "show" : ""}" id="all-checked">

function attachHandlers(screen) {

    next();
  };

  // Continue from session-end
  const continueBtn = $("#continue-btn");
  if (continueBtn) continueBtn.onclick = next;

  // Copy prompt
  const copyBtn = $("#copy-btn");
  if (copyBtn) copyBtn.onclick = async () => {
    const text = decodeURIComponent(copyBtn.dataset.prompt);
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied ✓";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = "Copy Prompt";
        copyBtn.classList.remove("copied");
      }, 2000);
    } catch (err) {
      // Fallback: select the prompt box
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents($("#prompt-box"));
      sel.removeAllRanges();
      sel.addRange(range);
      copyBtn.textContent = "Selected. Press Cmd/Ctrl+C";
      setTimeout(() => { copyBtn.textContent = "Copy Prompt"; }, 3000);
    }
  };

  // Test output checkboxes
  document.querySelectorAll(".test-item").forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx, 10);
      const sid = el.dataset.session; // session ids may be non-numeric strings ("milestone", "interim-demo")
      testsChecked[sid][idx] = !testsChecked[sid][idx];
      el.classList.toggle("checked", testsChecked[sid][idx]);
      const allDone = testsChecked[sid].every(Boolean);
      const banner = $("#all-checked");
      if (banner) banner.classList.toggle("show", allDone);
    };
  });
  const advanceBtn = $("#advance-btn");
  if (advanceBtn) advanceBtn.onclick = next;

  if (screen && screen.type === "break" && breakTimer.finished) {
    document.body.onclick = (e) => {
      if (e.target.closest(".bottombar")) return;
      breakTimer.finished = false;
      document.body.onclick = null;
      next();
    };
  } else {
    document.body.onclick = null;
  }
}

/* ============================================
   TIMER
   ============================================ */

function setupTimer(session) {
  stopTimer();
  timer.totalSeconds = session.duration_minutes * 60;
  timer.remainingSeconds = timer.totalSeconds;
  timer.sessionId = session.id;
  timer.running = false;
  timer.paused = false;
  updateTimerDisplay();
}

function startTimer() {
  if (timer.running) return;
  timer.running = true;
  timer.paused = false;
  timer.intervalId = setInterval(tickTimer, 1000);
  updateTimerDisplay();
}

function pauseTimer() {
  if (!timer.running) return;
  timer.paused = !timer.paused;
  updateTimerDisplay();
}

function stopTimer() {
  if (timer.intervalId) clearInterval(timer.intervalId);
  timer.intervalId = null;
  timer.running = false;
  timer.paused = false;
  $("#timer").textContent = "--:--";
  $("#timer").className = "timer";
}

function tickTimer() {
  if (timer.paused) return;
  timer.remainingSeconds--;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = $("#timer");
  if (!timer.running && !timer.totalSeconds) {
    el.textContent = "--:--";
    el.className = "timer";
    return;
  }
  el.textContent = fmt(timer.remainingSeconds);
  el.className = "timer";
  if (timer.paused) el.classList.add("paused");
  if (timer.remainingSeconds <= 0) el.classList.add("expired");
  else if (timer.remainingSeconds <= 5 * 60) el.classList.add("danger");
  else if (timer.remainingSeconds <= 10 * 60) el.classList.add("warning");
}

/* ----- Break timer ----- */
function startBreakTimer() {
  if (breakTimer.intervalId) clearInterval(breakTimer.intervalId);
  breakTimer.intervalId = setInterval(() => {
    breakTimer.remainingSeconds--;
    const display = $("#break-display");
    if (display) {
      const m = Math.floor(breakTimer.remainingSeconds / 60);
      const s = breakTimer.remainingSeconds % 60;
      display.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }
    if (breakTimer.remainingSeconds <= 0) {
      clearInterval(breakTimer.intervalId);
      breakTimer.intervalId = null;
      breakTimer.finished = true;
      playChime();
      renderCurrent();
    }
  }, 1000);
}

function playChime() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const playTone = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "sine";
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    playTone(880, 0, 0.6);    // A5
    playTone(1318, 0.18, 0.7); // E6
    setTimeout(() => ctx.close(), 1500);
  } catch (e) { /* silent */ }
}

function refreshJumpMenu() {
  const menu = $("#jump-menu");
  const btnLabel = $("#jump-btn-label");
  if (!menu) return;

  // Friendly label for a single screen (one section)
  const typeLabel = (scr) => {
    switch (scr.type) {
      case "welcome": return "Welcome";
      case "housekeeping": return "Housekeeping";
      case "two-doors": return "Two doors";
      case "journey-map": return "Journey map";
      case "tools-landscape": return "Tools landscape";
      case "concept":
        return scr.slide && scr.slide.lens === "opener"
          ? "Overview"
          : (scr.slide ? (scr.slide.kicker || scr.slide.practice || "Concept") : "Concept");
      case "session-start": return "Begin";
      case "stage": return "Set the stage";
      case "step": return `${scr.code || ""} ${scr.step ? scr.step.title : ""}`.trim();
      case "idea-cards": return "Idea cards";
      case "question": return "Question";
      case "hmv": return "HMV check";
      case "prompt": return scr.promptTotal > 1 ? `Prompt ${(scr.promptIndex || 0) + 1}` : "Prompt";
      case "build": return "Build";
      case "test-output": return "Test the output";
      case "office-hours": return "Office hours";
      case "output-capture": return "Save the work";
      case "session-end": return "Wrap up";
      case "phase-break": return "Transition";
      case "break": return "Break";
      case "portfolio-reveal": return "Portfolio reveal";
      case "swish-retake": return "SWISH retake";
      case "awards": return "Awards";
      case "closing": return "Closing";
      case "workshop-complete": return "Complete";
      default: return scr.type.replace(/-/g, " ").replace(/^./, c => c.toUpperCase());
    }
  };

  // Group every screen, in flow order, so the facilitator can jump to any section
  const intro = ["welcome", "housekeeping", "two-doors", "journey-map", "tools-landscape"];
  const groupsOrder = [];
  const groups = {};
  let lastSessionGroup = null;

  SCREENS.forEach((scr, i) => {
    let g;
    if (intro.includes(scr.type)) {
      g = "Intro";
    } else if (scr.session) {
      const num = scr.session.number || scr.session.id;
      g = `${num}. ${scr.session.title}`;
      lastSessionGroup = g;
    } else if (scr.type === "idea-cards") {
      g = lastSessionGroup || "Pick your idea";
    } else if (scr.type === "phase-break" || scr.type === "break") {
      g = "Transitions";
    } else if (scr.type === "portfolio-reveal" || scr.type === "closing" || scr.type === "workshop-complete") {
      g = "Wrap up";
    } else {
      g = lastSessionGroup || "More";
    }
    if (!groups[g]) { groups[g] = []; groupsOrder.push(g); }
    groups[g].push({ scr, i });
  });

  let html = "";
  groupsOrder.forEach(g => {
    html += `<div class="jump-group"><div class="jump-group-label">${escapeHtml(g)}</div>`;
    groups[g].forEach(({ scr, i }) => {
      const isCurrent = i === currentScreenIdx;
      html += `<div class="jump-item ${isCurrent ? "current" : ""}" data-idx="${i}">
        <span class="jump-item-num">${String(i + 1).padStart(2, "0")}</span>
        <span class="jump-item-title">${escapeHtml(typeLabel(scr))}</span>
      </div>`;
    });
    html += `</div>`;
  });
  menu.innerHTML = html;

  // Button label: current stage (concept or session), else Jump
  if (btnLabel) {
    const cur = SCREENS[currentScreenIdx];
    let lbl = "Jump";
    if (cur) {
      if (cur.type === "concept") lbl = cur.stageName || "Jump";
      else if (cur.session) lbl = cur.session.stage || cur.session.number || "Jump";
    }
    btnLabel.textContent = lbl;
  }

  // Click handlers: jump straight to that screen index
  menu.querySelectorAll(".jump-item").forEach(el => {
    el.onclick = () => jumpToScreen(parseInt(el.dataset.idx, 10));
  });
}

function jumpToScreen(idx) {
  if (idx >= 0 && idx < SCREENS.length) {
    currentScreenIdx = idx;
    renderCurrent();
  }
  closeJumpMenu();
}

function toggleJumpMenu() {
  const wrap = $("#jump-wrap");
  if (!wrap) return;
  const willOpen = !wrap.classList.contains("open");
  wrap.classList.toggle("open");
  if (willOpen) {
    const cur = wrap.querySelector(".jump-item.current");
    if (cur) cur.scrollIntoView({ block: "center" });
  }
}

function closeJumpMenu() {
  const wrap = $("#jump-wrap");
  if (wrap) wrap.classList.remove("open");
}

document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("jump-btn");
  if (btn) btn.addEventListener("click", (e) => { e.stopPropagation(); toggleJumpMenu(); });
  // Click outside closes
  document.addEventListener("click", (e) => {
    const wrap = document.getElementById("jump-wrap");
    if (wrap && !wrap.contains(e.target)) closeJumpMenu();
  });
});

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
function escapeAttr(str) { return escapeHtml(str); }

/* ============================================
   AUTH GATE
   ============================================ */
/*
  Hardcoded credentials are stored as SHA-256 hashes below.
  This is a soft gate. The JS file is publicly readable, so a
  determined visitor can still extract the hashes and brute-force.
  For real security, move to Render-level Basic Auth.

  TO SET CREDENTIALS:
  1. Open a browser console anywhere and run:
       crypto.subtle.digest("SHA-256", new TextEncoder().encode("YOUR_VALUE"))
         .then(b => console.log(Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,"0")).join("")));
  2. Paste the resulting hex string into AUTH_ID_HASH or AUTH_PW_HASH.

  Defaults below are for "admin" / "change-me". REPLACE BEFORE DEPLOY.
*/
const AUTH_ID_HASH = "9f32a6796682f1c784d46ca60d38aab39a4862523b4043814c2793c7b9382520";
const AUTH_PW_HASH = "f181008ea04c7c3d9734a4b9d87e48df67970972a43641bb0608b0e1e91c6c1b";
const AUTH_SESSION_KEY = "jb-platform-auth";

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function dismissLogin() {
  $("#login-overlay").classList.add("hidden");
  loadSessions();
}

async function tryLogin(id, pw) {
  // ID is case-insensitive (matches school and women platforms); password stays case-sensitive
  const normalizedId = (id || "").trim().toLowerCase();
  const [idHash, pwHash] = await Promise.all([sha256Hex(normalizedId), sha256Hex(pw)]);
  return idHash === AUTH_ID_HASH && pwHash === AUTH_PW_HASH;
}

function initAuth() {
  // Already authenticated this session?
  try {
    if (sessionStorage.getItem(AUTH_SESSION_KEY) === "1") {
      dismissLogin();
      return;
    }
  } catch (_) { /* sessionStorage may be unavailable; fall through to form */ }

  const form = $("#login-form");
  const errEl = $("#login-error");
  const card = $("#login-card");
  const submit = $("#login-submit");
  const idInput = $("#login-id");
  const pwInput = $("#login-pw");

  // Focus the ID field on load
  setTimeout(() => idInput.focus(), 50);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = idInput.value.trim();
    const pw = pwInput.value;
    if (!id || !pw) return;

    submit.disabled = true;
    errEl.classList.remove("show");

    const ok = await tryLogin(id, pw);
    submit.disabled = false;

    if (ok) {
      try { sessionStorage.setItem(AUTH_SESSION_KEY, "1"); } catch (_) {}
      dismissLogin();
    } else {
      errEl.classList.add("show");
      card.classList.remove("shake");
      // Force reflow so the animation re-triggers
      void card.offsetWidth;
      card.classList.add("shake");
