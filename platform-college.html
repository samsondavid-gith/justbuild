<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Just Build  /  Facilitator Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Inter:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  /* ========================================
     Just Build  /  Facilitator Platform
     Dark mode. Optimised for projection.
     ======================================== */

  :root {
    --bg:            #0A0A0A;
    --bg-elev-1:    #141414;
    --bg-elev-2:    #1C1C1C;
    --line:          rgba(255,255,255,0.08);
    --line-strong:   rgba(255,255,255,0.16);
    --text:          #FFFFFF;
    --text-soft:     #C8C8C8;
    --text-muted:    #8A8A8A;
    --text-faint:    #5A5A5A;
    --accent:        #C17D2A;
    --accent-soft:   rgba(193, 125, 42, 0.18);
    --accent-glow:   rgba(193, 125, 42, 0.35);
    --warning:       #E8B53A;
    --danger:        #D7553A;
    --serif:         'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --sans:          'Inter', system-ui, -apple-system, sans-serif;
    --mono:          'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ----- Top bar ----- */
  .topbar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    z-index: 5;
  }
  .topbar.hidden { display: none; }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .topbar-logo {
    width: 30px;
    height: 30px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .topbar-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .topbar-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .topbar-section {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .topbar-center {
    display: flex;
    justify-content: center;
  }

  .timer {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    padding: 6px 18px;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease;
    min-width: 130px;
    text-align: center;
  }
  .timer:hover { border-color: var(--accent); }
  .timer.paused { color: var(--text-muted); border-style: dashed; }
  .timer.warning { color: var(--warning); border-color: rgba(232, 181, 58, 0.4); }
  .timer.danger { color: var(--danger); border-color: rgba(215, 85, 58, 0.5); }
  .timer.expired { animation: pulse 2s ease-in-out infinite; color: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  .topbar-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .progress {
    display: flex;
    gap: 4px;
  }
  .progress-dot {
    width: 18px;
    height: 3px;
    background: var(--line-strong);
    border-radius: 1px;
    transition: background 0.3s ease;
  }
  .progress-dot.done { background: var(--text-faint); }
  .progress-dot.active { background: var(--accent); }

  /* ----- Jump-to-session picker ----- */
  .jump-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
  }
  .jump-btn {
    appearance: none;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .jump-btn:hover { color: var(--text); border-color: var(--line-strong); }
  .jump-btn svg { opacity: 0.6; transition: transform 0.2s ease; }
  .jump-wrap.open .jump-btn svg { transform: rotate(180deg); }

  .jump-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 380px;
    max-height: 70vh;
    overflow-y: auto;
    background: var(--bg-elev-1);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    padding: 8px;
    box-shadow: 0 18px 48px -12px rgba(0, 0, 0, 0.6);
    display: none;
    z-index: 50;
  }
  .jump-wrap.open .jump-menu { display: block; }
  .jump-group {
    padding: 12px 12px 6px;
  }
  .jump-group-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .jump-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 9px 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.4;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .jump-item:hover { background: var(--bg-elev-2); color: var(--text); }
  .jump-item.current { background: rgba(193, 125, 42, 0.12); color: var(--text); }
  .jump-item-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 36px;
    letter-spacing: 0.04em;
  }
  .jump-item.current .jump-item-num { color: var(--accent); }
  .jump-item-title {
    flex: 1;
  }
  .jump-item-time {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
  }

  /* ----- Office Hours screen ----- */
  .oh-screen {
    max-width: 900px;
    margin: 0 auto;
  }
  .oh-section {
    margin-top: 40px;
  }
  .oh-section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .oh-agenda {
    list-style: none;
    counter-reset: agenda;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .oh-agenda li {
    counter-increment: agenda;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    color: var(--text-soft);
    font-size: 18px;
    line-height: 1.5;
    padding-left: 0;
  }
  .oh-agenda li::before {
    content: counter(agenda, decimal-leading-zero);
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    padding-top: 4px;
    letter-spacing: 0.04em;
  }
  .oh-stuck-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .oh-stuck {
    padding: 20px 24px;
    background: var(--bg-elev-1);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .oh-stuck-title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
  }
  .oh-stuck-resolution {
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1.55;
  }
  .oh-prompts {
    list-style: none;
    counter-reset: oh-prompt;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .oh-prompt-item {
    counter-increment: oh-prompt;
    padding: 16px 18px 16px 48px;
    background: rgba(193,125,42,0.06);
    border: 1px solid var(--accent-soft);
    border-radius: 4px;
    position: relative;
  }
  .oh-prompt-item::before {
    content: counter(oh-prompt, decimal-leading-zero);
    position: absolute;
    left: 14px;
    top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--accent);
    font-weight: 500;
  }
  .oh-prompt-title {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--text);
    line-height: 1.4;
  }
  .oh-prompt-note {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }
  .oh-prompt-note strong {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 500;
  }
  @media (max-width: 800px) {
    .oh-prompts { grid-template-columns: 1fr; }
  }
  .oh-qa, .oh-homework {
    padding: 22px 26px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-soft);
    font-size: 17px;
    line-height: 1.55;
  }

  /* ----- Milestone screen indicator ----- */
  .milestone-banner {
    background: rgba(193, 125, 42, 0.08);
    border: 1px solid rgba(193, 125, 42, 0.25);
    padding: 14px 22px;
    border-radius: 4px;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
    font-weight: 500;
  }

  /* ----- Workshop-complete portfolio-contents panel ----- */
  .wc-contents {
    margin: 32px auto 40px;
    padding: 24px 28px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    max-width: 920px;
  }
  .wc-contents-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .wc-contents-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 24px;
  }
  .wc-contents-list li {
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.4;
  }
  .wc-contents-list li strong {
    display: inline-block;
    min-width: 28px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  @media (max-width: 880px) {
    .wc-contents-list { grid-template-columns: repeat(2, 1fr); }
  }

  /* ----- Stage / main area ----- */
  .stage {
    flex: 1 1 auto;
    display: flex;
    padding: 32px 60px 64px;
    overflow-y: auto;
    overflow-x: hidden;
    /* When content exceeds viewport, allow scroll instead of clipping the bottom */
    scrollbar-width: thin;
    scrollbar-color: var(--line-strong) transparent;
  }
  .stage::-webkit-scrollbar { width: 8px; }
  .stage::-webkit-scrollbar-track { background: transparent; }
  .stage::-webkit-scrollbar-thumb {
    background: var(--line-strong);
    border-radius: 4px;
  }
  .stage::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Viewport-locked variant: used for prompt screens and idea-cards so the bottom strip is always visible */
  .stage.fit-viewport { overflow: hidden; padding-top: clamp(20px, 3vh, 36px); padding-bottom: clamp(20px, 3vh, 36px); }
  .stage.fit-viewport .screen { height: 100%; display: flex; flex-direction: column; min-height: 0; }

  .screen {
    width: 100%;
    max-width: 1100px;
    margin: auto;
    animation: fadeUp 0.42s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
  }

  /* ----- Welcome / session-start / session-end ----- */
  .hero {
    text-align: center;
    padding: 8px 0;
  }
  .hero-logo {
    display: block;
    width: 100px;
    height: auto;
    margin: 0 auto 20px;
    opacity: 0.98;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 500;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(56px, 8vw, 120px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
  }
  .hero-title.brand {
    color: var(--accent);
    font-weight: 400;
  }
  .hero-sub {
    font-family: var(--serif);
    font-size: clamp(18px, 2.0vw, 28px);
    color: var(--text-soft);
    font-style: italic;
    font-weight: 300;
    letter-spacing: -0.005em;
    margin-bottom: 8px;
  }
  .hero-meta {
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.04em;
    margin-top: 6px;
  }
  .hero-rule {
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 24px auto;
    border: none;
  }
  .hero-rule.thin { width: 40px; opacity: 0.6; }

  .button-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  /* ----- Stage (set the stage) ----- */
  .stage-text {
    font-family: var(--serif);
    font-size: clamp(18px, 1.7vw, 24px);
    line-height: 1.45;
    color: var(--text);
    font-weight: 300;
    letter-spacing: -0.005em;
    max-width: 62ch;
  }
  .stage-text p {
    margin: 0 0 0.85em 0;
  }
  .stage-text p:last-child {
    margin-bottom: 0;
  }
  .facilitator-note {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    letter-spacing: 0.01em;
    max-width: 62ch;
  }

  /* ----- Question ----- */
  .question-title {
    font-family: var(--serif);
    font-size: clamp(32px, 4.2vw, 56px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .question-body {
    font-size: clamp(15px, 1.3vw, 19px);
    color: var(--text-soft);
    line-height: 1.55;
    max-width: 62ch;
    margin-bottom: 20px;
  }

  /* ----- HMV ----- */
  .hmv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }
  .hmv-panel {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-top: 2px solid var(--accent);
    padding: 18px 18px;
    border-radius: 2px;
  }
  .hmv-name {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .hmv-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .hmv-list li {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
  }
  .hmv-list li::before {
    content: "/";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 500;
  }
  @media (max-width: 1000px) {
    .hmv-grid { grid-template-columns: 1fr; gap: 12px; }
  }

  /* ----- Prompt ----- */
  .prompt-title {
    font-family: var(--serif);
    font-size: clamp(24px, 2.8vw, 36px);
    font-weight: 400;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }
  .prompt-tool {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--bg);
    box-shadow: 0 0 0 3px rgba(193, 125, 42, 0.18);
  }
  .prompt-tool::before {
    content: "USE";
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--bg);
    font-weight: 700;
    padding-right: 10px;
    border-right: 1px solid rgba(10, 10, 10, 0.4);
    opacity: 0.85;
  }
  .prompt-tool strong {
    color: var(--bg);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.005em;
  }
  .prompt-box {
    background: #050505;
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-soft);
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 2px;
    margin-bottom: 12px;
    max-height: 40vh;
    overflow-y: auto;
  }
  .prompt-box::-webkit-scrollbar { width: 8px; }
  .prompt-box::-webkit-scrollbar-track { background: transparent; }
  .prompt-box::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    padding: 10px 22px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s ease;
  }
  .copy-btn:hover { background: #D08A33; transform: translateY(-1px); }
  .copy-btn.copied { background: #2C8A4F; pointer-events: none; }

  /* ----- Prompt screen (viewport-locked, URL strip always visible) ----- */
  .prompt-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    padding: 8px 0;
  }
  .prompt-screen-header { flex: 0 0 auto; margin-bottom: clamp(8px, 1.2vh, 14px); }
  .prompt-screen-title {
    font-size: clamp(20px, 2.6vh, 28px) !important;
    margin: clamp(4px, 0.8vh, 10px) 0 clamp(4px, 0.6vh, 8px) !important;
  }
  .prompt-screen-box {
    flex: 1 1 auto !important;
    min-height: 0 !important;
    max-height: none !important;
    margin-bottom: 0 !important;
    font-size: clamp(13px, 1.65vh, 16px) !important;
    line-height: 1.6 !important;
    color: var(--text) !important;
    padding: 18px 24px !important;
  }
  .prompt-screen-footer {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.2vh, 14px);
    margin-top: clamp(10px, 1.5vh, 16px);
  }
  .prompt-laptop-line {
    padding: clamp(10px, 1.5vh, 14px) 22px;
    background: rgba(193,125,42,0.08);
    border: 1px solid var(--accent-soft);
    border-radius: 6px;
    text-align: center;
  }
  .prompt-laptop-eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .prompt-laptop-url {
    font-family: var(--mono);
    font-size: clamp(14px, 1.9vh, 20px);
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  /* ----- Build ----- */
  .build-list {
    list-style: none;
    counter-reset: build;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 16px;
  }
  .build-item {
    counter-increment: build;
    display: grid;
    grid-template-columns: 42px 1fr;
    gap: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .build-item:last-child { border-bottom: none; padding-bottom: 0; }
  .build-item::before {
    content: counter(build, decimal-leading-zero);
    font-family: var(--serif);
    font-size: 22px;
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
    padding-top: 3px;
  }
  .build-item h3 {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .build-item p {
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
  }

  /* For sessions with many build steps (6+), use two-column grid */
  .build-list.compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 28px;
  }
  .build-list.compact .build-item {
    padding-bottom: 8px;
    grid-template-columns: 32px 1fr;
    gap: 10px;
  }
  .build-list.compact .build-item::before {
    font-size: 18px;
  }
  .build-list.compact .build-item h3 {
    font-size: 15px;
  }
  .build-list.compact .build-item p {
    font-size: 12px;
    line-height: 1.45;
  }

  /* ----- Test Output ----- */
  .test-intro {
    color: var(--text-soft);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .test-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .test-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .test-item:hover { border-color: var(--line-strong); }
  .test-item.checked {
    background: rgba(193, 125, 42, 0.08);
    border-color: var(--accent);
  }
  .checkbox {
    flex: 0 0 20px;
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--text-muted);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.2s ease;
  }
  .test-item.checked .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox svg {
    width: 12px;
    height: 12px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .test-item.checked .checkbox svg { opacity: 1; }
  .test-content h4 {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 3px;
    color: var(--text);
  }
  .test-content p {
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
  }

  .all-checked-banner {
    display: none;
    text-align: center;
    padding: 28px;
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 2px;
    animation: fadeUp 0.4s ease;
  }
  .all-checked-banner.show { display: block; }

  /* ----- Break ----- */
  .break {
    text-align: center;
  }
  .break-timer {
    font-family: var(--mono);
    font-size: clamp(120px, 22vw, 280px);
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
  }
  .break-label {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    color: var(--text-soft);
    font-style: italic;
  }
  .break-next {
    color: var(--text-muted);
    margin-top: 16px;
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .break-over {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 96px);
    font-weight: 400;
  }

  /* ----- Buttons ----- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 36px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    border: none;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #FFFFFF;
  }
  .btn-primary:hover { background: #D08A33; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ----- Bottom bar ----- */
  .bottombar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    padding: 16px 40px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .bottombar.hidden { display: none; }

  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-prev { justify-self: start; }
  .nav-next { justify-self: end; }

  .hmv-reminder {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--serif);
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
  }
  .hmv-reminder .letter {
    color: var(--accent);
    font-weight: 500;
    font-style: normal;
    font-family: var(--sans);
    letter-spacing: 0.32em;
  }
  .hmv-reminder .full {
    color: var(--text-muted);
    transition: opacity 0.2s ease;
  }
  .hmv-reminder.collapsed .full { display: none; }

  .keyboard-hint {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    margin-top: 4px;
    text-align: center;
  }
  .keyboard-hint kbd {
    font-family: var(--mono);
    background: var(--bg-elev-1);
    padding: 1px 6px;
    border-radius: 2px;
    border: 1px solid var(--line);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ----- Loading / error ----- */
  .loading, .error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }
  .loading p, .error p {
    color: var(--text-muted);
    font-style: italic;
    font-family: var(--serif);
    font-size: 18px;
  }
  .error h2 {
    font-family: var(--serif);
    color: var(--danger);
    margin-bottom: 16px;
    font-weight: 400;
    font-size: 28px;
  }
  .error code {
    font-family: var(--mono);
    background: var(--bg-elev-1);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 13px;
    color: var(--accent);
  }

  /* ----- Responsive ----- */
  @media (max-width: 800px) {
    .topbar, .bottombar { padding: 14px 20px; }
    .stage { padding: 32px 24px; }
    .topbar { grid-template-columns: 1fr auto; gap: 16px; }
    .topbar-right { display: none; }
    .keyboard-hint { display: none; }
  }

  /* Subtle grain to add atmosphere on projection */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 1;
  }

  /* ========================================
     Login Gate
     ======================================== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-overlay.hidden { display: none; }

  .login-card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .login-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .login-title {
    font-family: var(--font-display);
    font-size: 56px;
    line-height: 0.95;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }
  .login-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 160ms ease, background 160ms ease;
  }
  .login-input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255,255,255,0.06);
  }
  .login-input::placeholder { color: rgba(255,255,255,0.3); }

  .login-logo {
    display: block;
    width: 96px;
    height: auto;
    margin: 0 auto 24px;
    opacity: 0.95;
  }

  .login-submit {
    margin-top: 8px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 14px 20px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 160ms ease, transform 160ms ease;
  }
  .login-submit:hover { opacity: 0.9; }
  .login-submit:active { transform: scale(0.98); }
  .login-submit:disabled { opacity: 0.5; cursor: wait; }

  .login-error {
    color: #E07B6E;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
    opacity: 0;
    transition: opacity 160ms ease;
  }
  .login-error.show { opacity: 1; }

  @keyframes login-shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .login-card.shake { animation: login-shake 320ms ease; }

  /* ============================================
     WELCOME LAYER (two-doors, journey-map, tools-landscape)
     ============================================ */
  .wl-screen {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 8px;
    text-align: center;
  }
  .wl-eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .wl-title {
    font-family: var(--serif);
    font-size: clamp(32px, 3.8vw, 48px);
    font-weight: 300;
    line-height: 1.02;
    letter-spacing: -0.025em;
    margin-bottom: 10px;
  }
  .wl-sub {
    font-family: var(--serif);
    font-size: clamp(14px, 1.2vw, 17px);
    color: var(--text-soft);
    font-style: italic;
    font-weight: 300;
    line-height: 1.45;
    max-width: 68ch;
    margin: 0 auto 18px;
  }
  .wl-footer {
    font-family: var(--serif);
    font-size: clamp(14px, 1.3vw, 17px);
    font-weight: 500;
    color: var(--text);
    margin-top: 14px;
    letter-spacing: -0.005em;
    padding-left: 12px;
    border-left: 3px solid var(--accent);
    display: inline-block;
    text-align: left;
  }

  /* ----- Two Doors ----- */
  .doors-grid {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 18px;
    margin: 0;
    text-align: left;
    align-items: stretch;
  }
  .door {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px 24px 24px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .door-primary {
    border: 1px solid var(--accent);
    box-shadow: 0 0 0 4px rgba(193, 125, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .door-primary::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--accent);
  }
  .door-secondary::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--line-strong);
  }
  .door-tag {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
    margin-top: 4px;
  }
  .door-secondary .door-tag { color: var(--text-muted); }
  .door-dot { color: var(--text-faint); margin: 0 4px; }
  .door-title {
    font-family: var(--serif);
    font-size: clamp(22px, 2.0vw, 28px);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    color: var(--text);
  }
  .door-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-soft);
    margin-bottom: 16px;
  }
  .door-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .door-list li {
    position: relative;
    padding: 6px 0 6px 20px;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.45;
    border-bottom: 1px solid var(--line);
  }
  .door-list li:last-child { border-bottom: none; }
  .door-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 13px;
    width: 8px;
    height: 2px;
    background: var(--accent);
  }
  .door-secondary .door-list li::before { background: var(--text-muted); }

  /* ----- Journey Map ----- */
  .journey-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    text-align: left;
    max-width: 860px;
    margin: 0 auto;
  }
  .journey-col {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 20px;
  }
  .journey-day {
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .journey-list { list-style: none; margin: 0; padding: 0; }
  .journey-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid var(--line);
  }
  .journey-item:last-child { border-bottom: none; }
  .journey-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    flex-shrink: 0;
    width: 22px;
  }
  .journey-body { display: flex; flex-direction: column; gap: 1px; }
  .journey-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .journey-note {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.35;
  }
  .journey-outcome {
    margin-top: 18px;
    text-align: center;
  }
  .journey-arrow {
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }
  .journey-outcome-label {
    font-family: var(--serif);
    font-size: clamp(18px, 1.9vw, 24px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.015em;
    margin-bottom: 4px;
  }
  .journey-outcome-url {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  /* ----- Journey Wave (new five-stage visualization) ----- */
  .journey-wave-screen {
    max-width: 1280px;
    margin: 0 auto;
    text-align: center;
  }
  .journey-wave-title {
    font-size: clamp(28px, 4vw, 48px) !important;
    line-height: 1.05 !important;
    margin-bottom: 8px !important;
  }
  .journey-wave-title em {
    font-style: italic;
    color: var(--text);
    font-weight: 300;
  }
  .journey-wave-sub {
    margin-bottom: 12px !important;
    font-style: italic;
    color: var(--text-soft);
    font-size: clamp(14px, 1.3vw, 17px) !important;
  }
  .journey-wave-wrap {
    width: 100%;
    margin: 4px auto 12px;
    padding: 4px 4px 8px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .journey-wave-svg {
    display: block;
    width: 100%;
    max-width: 1180px;
    max-height: 60vh;  /* prevent the wave from eating the whole screen */
    margin: 0 auto;
    height: auto;
  }
  /* SVG text classes — applied via class attribute on <text> */
  .journey-label-main {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    fill: var(--text);
    letter-spacing: -0.01em;
  }
  .journey-label-sub {
    font-family: var(--sans);
    font-size: 15px;
    fill: var(--text-soft);
    letter-spacing: 0.005em;
  }
  .journey-bookend-label {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    fill: var(--text);
    letter-spacing: -0.005em;
  }
  /* Subtle pulse on nodes — purely cosmetic */
  .journey-node {
    transform-origin: center;
    animation: nodePulse 3.6s ease-in-out infinite;
  }
  .journey-node:nth-child(2) { animation-delay: 0s; }
  .journey-node:nth-child(4) { animation-delay: 0.7s; }
  .journey-node:nth-child(6) { animation-delay: 1.4s; }
  .journey-node:nth-child(8) { animation-delay: 2.1s; }
  .journey-node:nth-child(10) { animation-delay: 2.8s; }
  @keyframes nodePulse {
    0%, 100% { opacity: 0.95; }
    50% { opacity: 1; }
  }
  .journey-wave-rule {
    width: 80px;
    height: 1px;
    background: var(--accent);
    border: none;
    margin: 4px auto 10px;
  }
  .journey-wave-footer {
    font-family: var(--serif);
    font-size: clamp(13px, 1.2vw, 16px);
    color: var(--text-soft);
    font-style: italic;
    max-width: 900px;
    margin: 0 auto;
    line-height: 1.45;
  }

  @media (max-width: 880px) {
    .journey-label-main { font-size: 22px; }
    .journey-label-sub { font-size: 13px; }
    .journey-bookend-label { font-size: 18px; }
  }

  /* ----- Tools Landscape ----- */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: left;
  }
  .cat-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
  }
  .cat-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 2px;
  }
  .cat-use {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
    margin-bottom: 8px;
    font-style: italic;
  }
  .cat-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tool-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 10px;
    border: 1px solid var(--line);
    color: var(--text-muted);
    background: transparent;
    line-height: 1.2;
    white-space: nowrap;
  }
  .tool-chip.tool-pick {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--text);
    font-weight: 500;
  }
  .tool-star {
    color: var(--accent);
    font-size: 9px;
    line-height: 1;
  }

  @media (max-width: 860px) {
    .doors-grid, .journey-grid { grid-template-columns: 1fr; }
    .cat-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 580px) {
    .cat-grid { grid-template-columns: 1fr; }
  }

  /* ============================================
     INTERLUDES (cohort, photo, checkin, feedback, portfolio)
     ============================================ */
  .interlude-narrow { max-width: 760px; }

  .wl-quiet {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 18px;
    font-style: italic;
  }

  /* ----- Housekeeping ----- */
  .hk-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    text-align: left;
  }
  .hk-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
  }
  .hk-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hk-list {
    list-style: none;
    margin: 0;
    padding: 0;
    flex: 1;
  }
  .hk-list li {
    position: relative;
    padding: 6px 0 6px 14px;
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.45;
    border-bottom: 1px solid var(--line);
  }

const fmt = (s) => {
  const sign = s < 0 ? "-" : "";
  s = Math.abs(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${sign}${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
};

/* ----- Load sessions.json ----- */
async function loadSessions() {
  try {
    const res = await fetch("./sessions-college.json", { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    WORKSHOP = data.workshop;
    SESSIONS = data.sessions;
    IDEAS = data.ideas || [];
    buildScreenSequence();
    renderCurrent();
  } catch (err) {
    $("#stage").innerHTML = `
      <div class="error">
        <h2>Could not load sessions-college.json</h2>
        <p>Make sure <code>sessions-college.json</code> sits next to <code>platform-college.html</code>.</p>
        <p style="margin-top:16px; font-size:14px;">If you opened this file directly with a double-click, your browser blocks local fetches. Run a local server with <code>python3 -m http.server</code> in the same folder, then open <code>http://localhost:8000/platform-college.html</code>.</p>
        <p style="margin-top:24px; opacity:0.5; font-size:12px;">${err.message}</p>
      </div>`;
  }
}

/* ----- Build the flat screen sequence ----- */
function buildScreenSequence() {
  SCREENS = [];

  // Welcome layer
  SCREENS.push({ type: "welcome" });
  SCREENS.push({ type: "housekeeping" });
  SCREENS.push({ type: "two-doors" });
  SCREENS.push({ type: "journey-map" });
  SCREENS.push({ type: "tools-landscape" });

  // Track phase transitions so we can insert interludes between them
  let prevPhase = null;
  let prevDay = null;

  SESSIONS.forEach((session, idx) => {
    const phase = session.phase;
    const day = String(session.day);

    // Day 2 morning welcome — first session of Day 2 of the weekend
    if (phase === "weekend" && day === "2" && prevDay !== "2") {
      SCREENS.push({ type: "day2-checkin" });
    }

    // Office-hours phase opener — appears once, before the first week of office hours
    if (phase === "office_hours" && prevPhase !== "office_hours") {
      SCREENS.push({ type: "phase-break", to: "office_hours" });
    }

    // Demo Day opener — appears once, before the Demo Day session
    if (phase === "demo_day" && prevPhase !== "demo_day") {
      SCREENS.push({ type: "phase-break", to: "demo_day" });
    }

    SCREENS.push({ type: "session-start", session });

    // Concept module (HMV teaching slides): the first slides INSIDE the stage's first
    // session, so the session clock runs and the chrome shows. `before_session` names
    // that first session of the stage.
    Object.keys(CONCEPT_MODULES).forEach((stageKey) => {
      const mod = CONCEPT_MODULES[stageKey];
      if (mod && mod.before_session === session.id) {
        mod.slides.forEach((slide, sIdx) => {
          SCREENS.push({
            type: "concept",
            session,
            slide: slide,
            stageNumber: mod.stage_number,
            stageName: mod.stage_name,
            conceptIndex: sIdx,
            conceptTotal: mod.slides.length
          });
        });
      }
    });

    SCREENS.push({ type: "stage", session });

    // Idea cards screen — appears once, inside Session 1 (Pick your idea), right after the
    // stage-setting, mirroring the school flow. Shows 8 ideas from the active set; the
    // founder picks one and personalises it in this same session.
    if (session.id === "1") {
      SCREENS.push({ type: "idea-cards" });
    }

    // Office hours screen is dedicated and replaces the standard question/prompt/build/test flow
    if (session.session_type === "office_hours") {
      SCREENS.push({ type: "office-hours", session });
      // If office hours has prompts (like Session 10 pitch deck), give each prompt its own screen
      const ohPrompts = session.prompts || [];
      ohPrompts.forEach((prompt, pIdx) => {
        SCREENS.push({
          type: "prompt",
          session,
          prompt,
          promptIndex: pIdx,
          promptTotal: ohPrompts.length
        });
      });
      // Test output (the "homework leaves the room" check) still applies if present
      if (session.test_output && session.test_output.length) {
        SCREENS.push({ type: "test-output", session });
      }
      if (session.output_capture) {
        SCREENS.push({ type: "output-capture", session });
      }
      SCREENS.push({ type: "session-end", session });
      prevPhase = phase;
      prevDay = day;
      return;
    }

    // Standard flow for all other session types (kickoff, build, milestone, interim_demo,
    // planning, demo_day, close)
    (session.questions || []).forEach((q, qIdx) => {
      SCREENS.push({
        type: "question",
        session,
        question: q,
        questionIndex: qIdx,
        questionTotal: session.questions.length,
      });
    });

    if (session.hmv && session.hmv.length) {
      SCREENS.push({ type: "hmv", session });
    }

    (session.prompts || []).forEach((p, pIdx) => {
      SCREENS.push({
        type: "prompt",
        session,
        prompt: p,
        promptIndex: pIdx,
        promptTotal: session.prompts.length,
      });
    });

    if (session.build && session.build.length) {
      SCREENS.push({ type: "build", session });
    }

    if (session.test_output && session.test_output.length) {
      SCREENS.push({ type: "test-output", session });
    }

    // Output capture happens after test-output, before session-end (for build sessions)
    if (session.output_capture) {
      SCREENS.push({ type: "output-capture", session });
    }

    SCREENS.push({ type: "session-end", session });

    // End-of-Day-1 interlude — fires after the last session of Day 1 in the weekend phase
    const nextSession = SESSIONS[idx + 1];
    const isLastOfDay1 = phase === "weekend" && day === "1"
      && (!nextSession || String(nextSession.day) !== "1" || nextSession.phase !== "weekend");
    if (isLastOfDay1) {
      SCREENS.push({ type: "day1-photo" });
    }

    // Portfolio reveal — after Demo Day session ends
    if (session.session_type === "demo_day") {
      SCREENS.push({ type: "portfolio-reveal" });
    }

    if (session.break_after) {
      SCREENS.push({
        type: "break",
        afterSession: session,
        nextSession: SESSIONS[idx + 1] || null,
      });
    }

    prevPhase = phase;
    prevDay = day;
  });

  // Closing inspirational slide
  SCREENS.push({ type: "closing" });

  // Workshop complete (now "what comes next" — after Demo Day)
  SCREENS.push({ type: "workshop-complete" });
}

/* ----- Navigation ----- */
function next() {
  if (currentScreenIdx < SCREENS.length - 1) {
    currentScreenIdx++;
    renderCurrent();
  }
}
function prev() {
  if (currentScreenIdx > 0) {
    currentScreenIdx--;
    renderCurrent();
  }
}

/* ----- Render current screen ----- */
function renderCurrent() {
  const screen = SCREENS[currentScreenIdx];
  const stage = $("#stage");
  const topbar = $("#topbar");
  const bottombar = $("#bottombar");

  // Stop break timer if leaving break
  if (screen.type !== "break" && breakTimer.intervalId) {
    clearInterval(breakTimer.intervalId);
    breakTimer.intervalId = null;
  }

  // Top/bottom bars hidden on welcome-layer screens, break, complete, and interlude moments
  const isWelcomeLayer = screen.type === "welcome" || screen.type === "housekeeping"
                       || screen.type === "two-doors" || screen.type === "journey-map"
                       || screen.type === "tools-landscape";
  const isInterlude = screen.type === "day1-photo"
                    || screen.type === "day2-checkin"
                    || screen.type === "phase-break"
                    || screen.type === "portfolio-reveal" || screen.type === "closing";
  const noChrome = isWelcomeLayer || isInterlude || screen.type === "workshop-complete" || screen.type === "break";
  topbar.classList.toggle("hidden", noChrome);
  bottombar.classList.toggle("hidden", screen.type === "welcome");

  // Concept caterpillar buddy, shown only on concept slides
  const cat = document.getElementById("concept-cat");
  if (cat) {
    if (screen.type === "concept") {
      const sl = screen.slide || {};
      document.getElementById("concept-cat-prop").innerHTML = sl.prop ? (CONCEPT_PROPS[sl.prop] || "") : "";
      const bub = document.getElementById("concept-cat-bubble");
      if (sl.bubble) { bub.innerHTML = sl.bubble; bub.style.display = ""; } else { bub.style.display = "none"; }
      const cimg = document.getElementById("concept-cat-img");
      if (cimg) cimg.src = (sl.mascot === "butterfly") ? "butterfly.png" : "funny-caterpillar.png";
      cat.style.display = "block";
    } else {
      cat.style.display = "none";
    }
  }

  // Update topbar context
  if (screen.session) {
    $("#topbar-eyebrow").textContent = topbarEyebrow(screen.session);
    $("#topbar-title").textContent = screen.session.title;
    $("#topbar-section").textContent = sectionLabel(screen);
    updateProgress();
  } else if (screen.type === "idea-cards") {
    const defaultPage = (WORKSHOP && WORKSHOP.cohort_idea_page) || 1;
    const activePage = Number(window.__ideaSetActive || defaultPage);
    $("#topbar-eyebrow").textContent = "IDEATE";
    $("#topbar-title").textContent = "Pick your micro-venture";
    $("#topbar-section").textContent = `8 idea cards · Set ${activePage} of 3`;
    updateProgress();
  }

  // Reset/start timer for sessions
  if (screen.session && screen.type === "session-start") {
    setupTimer(screen.session);
  } else if (isWelcomeLayer || isInterlude || screen.type === "workshop-complete") {
    stopTimer();
  }

  // Render content
  let html = "";
  switch (screen.type) {
    case "welcome":            html = renderWelcome(); break;
    case "housekeeping":       html = renderHousekeeping(); break;
    case "two-doors":          html = renderTwoDoors(); break;
    case "journey-map":        html = renderJourneyMap(); break;
    case "tools-landscape":    html = renderToolsLandscape(); break;
    case "idea-cards":         html = renderIdeaCards(); break;
    case "concept":            html = renderConcept(screen); break;
    case "day1-photo":         html = renderDay1Photo(); break;
    case "day2-checkin":       html = renderDay2Checkin(); break;
    case "phase-break":        html = renderPhaseBreak(screen); break;
    case "portfolio-reveal":   html = renderPortfolioReveal(); break;
    case "closing":            html = renderClosing(); break;
    case "session-start":      html = renderSessionStart(screen.session); break;
    case "stage":              html = renderStage(screen.session); break;
    case "question":           html = renderQuestion(screen); break;
    case "hmv":                html = renderHMV(screen.session); break;
    case "prompt":             html = renderPrompt(screen); break;
    case "build":              html = renderBuild(screen.session); break;
    case "test-output":        html = renderTestOutput(screen.session); break;
    case "office-hours":       html = renderOfficeHours(screen.session); break;
    case "output-capture":     html = renderOutputCapture(screen.session); break;
    case "session-end":        html = renderSessionEnd(screen); break;
    case "break":              html = renderBreak(screen); break;
    case "workshop-complete":  html = renderWorkshopComplete(); break;
  }
  stage.innerHTML = `<div class="screen">${html}</div>`;

  // Lock viewport for screens that need the bottom strip always visible
  stage.classList.toggle("fit-viewport", screen.type === "prompt" || screen.type === "idea-cards");

  // Wire up dynamic handlers per screen
  attachHandlers(screen);

  // Refresh the jump-to-session menu state
  refreshJumpMenu();

  // Prev/next state
  $("#prev-btn").disabled = currentScreenIdx === 0;
  $("#next-btn").disabled = currentScreenIdx >= SCREENS.length - 1;
}

function topbarEyebrow(session) {
  // Show stage as the primary label when available; the session number/role appears in the subtitle/title.
  // For the Kickoff session, the stage is just "Kickoff" itself (not a venture stage).
  if (session.stage) {
    return session.stage.toUpperCase();
  }
  // Fallback for sessions without stage (should not happen in v3)
  if (session.session_type === "office_hours") return `${session.day} · Office Hours`;
  if (session.session_type === "demo_day") return "Demo Day";
  if (session.session_type === "close") return "Close";
  if (session.session_type === "kickoff") return "Kickoff";
  if (session.session_type === "milestone") return "Milestone";
  if (session.session_type === "interim_demo") return "Interim Demo Day";
  if (session.session_type === "planning") return "Planning";
  return `Session ${session.number}`;
}

function sectionLabel(screen) {
  switch (screen.type) {
    case "session-start":  return "Begin";
    case "stage":          return "Set the Stage";
    case "question":       return `Question ${screen.questionIndex + 1} of ${screen.questionTotal}`;
    case "hmv":            return "HMV Techniques";
    case "prompt":         return screen.promptTotal > 1
                            ? `Prompt ${screen.promptIndex + 1} of ${screen.promptTotal}`
                            : "The Prompt";
    case "build":          return "Build";
    case "test-output":    return "Test Output";
    case "office-hours":   return "Office Hours";
    case "output-capture": return "Save your work";
    case "session-end":    return "Complete";
    case "concept":        return `Concept ${screen.conceptIndex + 1} of ${screen.conceptTotal}`;
    default:               return "";
  }
}

function updateProgress() {
  const screen = SCREENS[currentScreenIdx];
  if (!screen.session) return;
  const sessionId = screen.session.id;
  const sessionScreens = SCREENS.filter(s => s.session && s.session.id === sessionId);
  const indices = SCREENS
    .map((s, i) => (s.session && s.session.id === sessionId) ? i : -1)
    .filter(i => i !== -1);
  const localIdx = indices.indexOf(currentScreenIdx);
  const total = sessionScreens.length;

  let dotsHtml = "";
  for (let i = 0; i < total; i++) {
    const cls = i < localIdx ? "done" : (i === localIdx ? "active" : "");
    dotsHtml += `<div class="progress-dot ${cls}"></div>`;
  }
  $("#progress").innerHTML = dotsHtml;
}

function conceptEm(s) {
  return String(s || "").replace(/\*([^*]+)\*/g, "<em>$1</em>");
}

function renderConcept(screen) {
  const sl = screen.slide || {};
  if (sl.lens === "opener") {
    return `
      <div class="concept-slide concept-opener">
        <div class="concept-stage-num">STAGE ${escapeHtml(screen.stageNumber || "")} &middot; ${escapeHtml((screen.stageName || "").toUpperCase())}</div>
        <h1 class="concept-opener-title">${conceptEm(sl.headline)}</h1>
        <div class="concept-opener-sub">${conceptEm(sl.sub)}</div>
        <div class="concept-three">
          <div class="concept-t"><span class="concept-td" style="background:#E8B53A"></span> <b>Humanics</b> the person</div>
          <div class="concept-t"><span class="concept-td" style="background:#C17D2A"></span> <b>Mechanics</b> the build</div>
          <div class="concept-t"><span class="concept-td" style="background:#6FBF8B"></span> <b>Valuenomics</b> the money</div>
        </div>
      </div>`;
  }
  const lensMap = {
    humanics:    { name: "Humanics, the person", cls: "lens-h" },
    mechanics:   { name: "Mechanics, the build", cls: "lens-m" },
    valuenomics: { name: "Valuenomics, the money", cls: "lens-v" }
  };
  const L = lensMap[sl.lens] || lensMap.humanics;
  let body = "";
  if (sl.lead) body += `<p class="concept-lead">${conceptEm(sl.lead)}</p>`;
  if (sl.bad || sl.good) {
    body += `<div class="concept-ba">`;
    if (sl.bad)  body += `<div class="concept-ba-card concept-bad"><div class="concept-ba-label">Don't ask</div><p>${sl.bad}</p></div>`;
    if (sl.good) body += `<div class="concept-ba-card concept-good"><div class="concept-ba-label">Ask</div><p>${sl.good}</p></div>`;
    body += `</div>`;
  }
  if (sl.example) body += `<div class="concept-example"><p>${sl.example}</p></div>`;
  (sl.paras || []).forEach((p) => { body += `<p>${conceptEm(p)}</p>`; });
  return `
    <div class="concept-slide ${L.cls}">
      <div class="concept-lens-tag">
        <span class="concept-lens-dot"></span>
        <span class="concept-lens-name">${escapeHtml(L.name)}</span>
        ${sl.practice ? `<span class="concept-practice">[ ${escapeHtml(sl.practice)} ]</span>` : ""}
      </div>
      <h1 class="concept-headline">${conceptEm(sl.headline)}</h1>
      <div class="concept-body">${body}</div>
      ${sl.artifact ? `<div class="concept-artifact"><span class="concept-a-label">You walk out with</span><span class="concept-a-text">${sl.artifact}</span></div>` : ""}
    </div>`;
}

function renderIdeaCards() {
  const all = IDEAS || [];
  const defaultPage = (WORKSHOP && WORKSHOP.cohort_idea_page) || 1;
  const activePage = Number(window.__ideaSetActive || defaultPage);
  const ideas = all.filter(i => Number(i.page) === activePage);
  if (ideas.length === 0) {
    return `
      <div class="wl-screen">
        <div class="wl-eyebrow">Ideas</div>
        <h1 class="wl-title">No ideas configured for set ${activePage}.</h1>
      </div>
    `;
  }
  // Build set-switcher pills
  const switcher = [1, 2, 3].map(p => {
    const count = all.filter(i => Number(i.page) === p).length;
    const isActive = p === activePage;
    return `<button class="idea-set-pill ${isActive ? 'active' : ''}" data-set="${p}">Set ${p} <span class="idea-set-pill-count">${count}</span></button>`;
  }).join("");
  return `
    <div class="ideas-screen">
      <div class="ideas-screen-header">
        <div class="ideas-screen-eyebrow">Pick one &middot; Set ${activePage} of 3</div>
        <h1 class="ideas-screen-title">Eight micro-ventures. <em>Pick the one that pulls you.</em></h1>
        <p class="ideas-screen-sub">Each one is a real venture you could run yourself, with a family member, or alongside someone you know. Pick one and make it yours.</p>
        <div class="idea-set-switcher">${switcher}</div>
      </div>
      <div class="ideas-grid">
        ${ideas.map((idea, idx) => `
          <div class="idea-card">
            <div class="idea-card-num">Idea ${String(idx + 1).padStart(2, '0')}</div>
            <div class="idea-card-name">${escapeHtml(idea.name)}</div>
            <div class="idea-card-row">
              <div class="idea-card-label">For whom</div>
              <div class="idea-card-value">${escapeHtml(idea.for_whom)}</div>
            </div>
            <div class="idea-card-row">
              <div class="idea-card-label">Problem</div>
              <div class="idea-card-value">${escapeHtml(idea.problem)}</div>
            </div>
            <div class="idea-card-row">
              <div class="idea-card-label">What the app does</div>
              <div class="idea-card-value">${escapeHtml(idea.what_app_does)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderSessionStart(s) {
  // Day label format depends on session phase. Weekend = "Day 1/2", office hours = "Week 1", etc.
  let dayPart;
  if (typeof s.day === "number" || /^\d+$/.test(String(s.day))) {
    dayPart = `Day ${s.day}`;
  } else {
    dayPart = String(s.day);
  }
  const dayLabel = `${dayPart} &middot; ${s.start_time} to ${s.end_time} &middot; ${s.duration_minutes} minutes`;
  const sessionLabel = s.session_type === "office_hours"
    ? "Office Hours"
    : `Session ${String(s.number).padStart(2, "0")}`;
  return `
    <div class="hero">
      <div class="hero-eyebrow">${sessionLabel}</div>
      <h1 class="hero-title">${escapeHtml(s.title)}</h1>

  `;
}

function renderTestOutput(s) {
  const sessionId = s.id;
  if (!testsChecked[sessionId]) {
    testsChecked[sessionId] = (s.test_output || []).map(() => false);
  }
  const items = (s.test_output || []).map((t, i) => {
    const checked = testsChecked[sessionId][i];
    return `
      <li class="test-item ${checked ? "checked" : ""}" data-idx="${i}" data-session="${sessionId}">
        <div class="checkbox">
          <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,8 7,12 13,4"></polyline>
          </svg>
        </div>
        <div class="test-content">
          <h4>${escapeHtml(t.title)}</h4>
          <p>${escapeHtml(t.description)}</p>
        </div>
      </li>
    `;
  }).join("");
  const allChecked = testsChecked[sessionId].every(Boolean);
  const testCount = (s.test_output || []).length;
  const numWord = testCount === 1 ? "One question" : `${testCount} questions`;
  const allWord = testCount === 1 ? "It must" : "All must";
  return `
    <div class="label">Test Output</div>
    <p class="test-intro">${numWord}. ${allWord} be yes before moving to the next session.</p>
    <ul class="test-list">${items}</ul>
    <div class="all-checked-banner ${allChecked ? "show" : ""}" id="all-checked">
      <button class="btn btn-primary" id="advance-btn">Move to next session →</button>
    </div>
  `;
}

function renderBreak(screen) {
  const after = screen.afterSession;
  const next = screen.nextSession;
  const duration = after.break_duration_minutes;
  const label = after.break_label || "Break";
  // Initialise break timer on first render
  if (breakTimer.intervalId === null && !breakTimer.finished) {
    breakTimer.remainingSeconds = duration * 60;
    breakTimer.finished = false;
    startBreakTimer();
  }
  const minsRemaining = Math.floor(breakTimer.remainingSeconds / 60);
  const secsRemaining = breakTimer.remainingSeconds % 60;

  if (breakTimer.finished) {
    return `
      <div class="break">
        <h1 class="break-over">Break over.</h1>
        <p class="break-next" style="margin-top: 32px;">Click anywhere or press Next to continue${next ? ` to <strong style="color: var(--accent);">${escapeHtml(next.title)}</strong>` : ""}.</p>
      </div>
    `;
  }
  // Default wellness prompt depending on break duration
  let wellnessPrompt = "";
  if (duration >= 45) {
    wellnessPrompt = "Long break. Eat. Walk outside if you can. Talk to one person in this room you have not talked to yet.";
  } else if (duration >= 30) {
    wellnessPrompt = "Real break. Step away from the screen. Stretch. Drink water. Look at something more than ten metres away.";
  } else {
    wellnessPrompt = "Short break. Stand up. Stretch. Drink water. Look at something more than ten metres away.";
  }
  const breakNote = after.break_note ? escapeHtml(after.break_note) : wellnessPrompt;

  return `
    <div class="break">
      <p class="hero-eyebrow" style="margin-bottom: 24px;">${escapeHtml(label)}</p>
      <div class="break-timer" id="break-display">${String(minsRemaining).padStart(2, "0")}:${String(secsRemaining).padStart(2, "0")}</div>
      <p class="break-label">${escapeHtml(label)} time</p>
      <p class="break-next" style="margin-top: 28px; font-style: italic; max-width: 60ch; margin-left: auto; margin-right: auto;">${breakNote}</p>
      ${next ? `<p class="break-next" style="margin-top: 24px;">When the timer ends, then <strong style="color: var(--accent);">${escapeHtml(next.title)}</strong></p>` : ""}
    </div>
  `;
}

/* ============================================
   HANDLERS
   ============================================ */

function attachHandlers(screen) {
  // Welcome
  const startBtn = $("#start-btn");
  if (startBtn) startBtn.onclick = next;

  // Idea set switcher pills — let facilitator (or anyone) flip between Set 1/2/3
  document.querySelectorAll(".idea-set-pill").forEach(pill => {
    pill.onclick = () => {
      const set = parseInt(pill.dataset.set, 10);
      window.__ideaSetActive = set;
      renderCurrent();
    };
  });

  // Session start
  const beginBtn = $("#begin-btn");
  if (beginBtn) beginBtn.onclick = () => {
    startTimer();
    next();
  };

  // Continue from session-end
  const continueBtn = $("#continue-btn");
  if (continueBtn) continueBtn.onclick = next;

  // Copy prompt
  const copyBtn = $("#copy-btn");
  if (copyBtn) copyBtn.onclick = async () => {
    const text = decodeURIComponent(copyBtn.dataset.prompt);
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied ✓";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = "Copy Prompt";
        copyBtn.classList.remove("copied");
      }, 2000);
    } catch (err) {
      // Fallback: select the prompt box
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents($("#prompt-box"));
      sel.removeAllRanges();
      sel.addRange(range);
      copyBtn.textContent = "Selected. Press Cmd/Ctrl+C";
      setTimeout(() => { copyBtn.textContent = "Copy Prompt"; }, 3000);
    }
  };

  // Test output checkboxes
  document.querySelectorAll(".test-item").forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx, 10);
      const sid = el.dataset.session; // session ids may be non-numeric strings ("milestone", "interim-demo")
      testsChecked[sid][idx] = !testsChecked[sid][idx];
      el.classList.toggle("checked", testsChecked[sid][idx]);
      const allDone = testsChecked[sid].every(Boolean);
      const banner = $("#all-checked");
      if (banner) banner.classList.toggle("show", allDone);
    };
  });
  const advanceBtn = $("#advance-btn");
  if (advanceBtn) advanceBtn.onclick = next;

  // Break. Click anywhere when over.
  if (screen && screen.type === "break" && breakTimer.finished) {
    document.body.onclick = (e) => {
      if (e.target.closest(".bottombar")) return;
      breakTimer.finished = false;
      document.body.onclick = null;
      next();
    };
  } else {
    document.body.onclick = null;
  }
}

/* ============================================
   TIMER
   ============================================ */

function setupTimer(session) {
  stopTimer();
  timer.totalSeconds = session.duration_minutes * 60;
  timer.remainingSeconds = timer.totalSeconds;
  timer.sessionId = session.id;
  timer.running = false;
  timer.paused = false;
  updateTimerDisplay();
}

function startTimer() {
  if (timer.running) return;
  timer.running = true;
  timer.paused = false;
  timer.intervalId = setInterval(tickTimer, 1000);
  updateTimerDisplay();
}

function pauseTimer() {
  if (!timer.running) return;
  timer.paused = !timer.paused;
  updateTimerDisplay();
}

function stopTimer() {
  if (timer.intervalId) clearInterval(timer.intervalId);
  timer.intervalId = null;
  timer.running = false;
  timer.paused = false;
  $("#timer").textContent = "--:--";
  $("#timer").className = "timer";
}

function tickTimer() {
  if (timer.paused) return;
  timer.remainingSeconds--;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = $("#timer");
  if (!timer.running && !timer.totalSeconds) {
    el.textContent = "--:--";
    el.className = "timer";
    return;
  }
  el.textContent = fmt(timer.remainingSeconds);
  el.className = "timer";
  if (timer.paused) el.classList.add("paused");
  if (timer.remainingSeconds <= 0) el.classList.add("expired");
  else if (timer.remainingSeconds <= 5 * 60) el.classList.add("danger");
  else if (timer.remainingSeconds <= 10 * 60) el.classList.add("warning");
}

/* ----- Break timer ----- */
function startBreakTimer() {
  if (breakTimer.intervalId) clearInterval(breakTimer.intervalId);
  breakTimer.intervalId = setInterval(() => {
    breakTimer.remainingSeconds--;
    const display = $("#break-display");
    if (display) {
      const m = Math.floor(breakTimer.remainingSeconds / 60);
      const s = breakTimer.remainingSeconds % 60;
      display.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }
    if (breakTimer.remainingSeconds <= 0) {
      clearInterval(breakTimer.intervalId);
      breakTimer.intervalId = null;
      breakTimer.finished = true;
      playChime();
      renderCurrent();
    }
  }, 1000);
}

function playChime() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const playTone = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "sine";
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    playTone(880, 0, 0.6);    // A5
    playTone(1318, 0.18, 0.7); // E6
    setTimeout(() => ctx.close(), 1500);
  } catch (e) { /* silent */ }
}

/* ============================================
   JUMP-TO-SESSION MENU
   ============================================ */

function refreshJumpMenu() {
  const menu = $("#jump-menu");
  const btnLabel = $("#jump-btn-label");
  if (!menu) return;

  // Friendly label for a single screen (one section)
  const typeLabel = (scr) => {
    switch (scr.type) {
      case "welcome": return "Welcome";
      case "housekeeping": return "Housekeeping";
      case "two-doors": return "Two doors";
      case "journey-map": return "Journey map";
      case "tools-landscape": return "Tools landscape";
      case "concept":
        return scr.slide && scr.slide.lens === "opener"
          ? "Overview"
          : (scr.slide ? scr.slide.lens.charAt(0).toUpperCase() + scr.slide.lens.slice(1) : "Concept");
      case "session-start": return "Begin";
      case "stage": return "Set the stage";
      case "idea-cards": return "Idea cards";
      case "question": return "Question";
      case "hmv": return "HMV check";
      case "prompt": return scr.promptTotal > 1 ? `Prompt ${(scr.promptIndex || 0) + 1}` : "Prompt";
      case "build": return "Build";
      case "test-output": return "Test the output";
      case "office-hours": return "Office hours";
      case "output-capture": return "Save the work";
      case "session-end": return "Wrap up";
      case "phase-break": return "Transition";
      case "break": return "Break";
      case "portfolio-reveal": return "Portfolio reveal";
      case "closing": return "Closing";
      case "workshop-complete": return "Complete";
      default: return scr.type.replace(/-/g, " ").replace(/^./, c => c.toUpperCase());
    }
  };

  // Group every screen, in flow order, so the facilitator can jump to any section
  const intro = ["welcome", "housekeeping", "two-doors", "journey-map", "tools-landscape"];
  const groupsOrder = [];
  const groups = {};
  let lastSessionGroup = null;

  SCREENS.forEach((scr, i) => {
    let g;
    if (intro.includes(scr.type)) {
      g = "Intro";
    } else if (scr.session) {
      const num = scr.session.number || scr.session.id;
      g = `${num}. ${scr.session.title}`;
      lastSessionGroup = g;
    } else if (scr.type === "idea-cards") {
      g = lastSessionGroup || "Pick your idea";
    } else if (scr.type === "phase-break" || scr.type === "break") {
      g = "Transitions";
    } else if (scr.type === "portfolio-reveal" || scr.type === "closing" || scr.type === "workshop-complete") {
      g = "Wrap up";
    } else {
      g = lastSessionGroup || "More";
    }
    if (!groups[g]) { groups[g] = []; groupsOrder.push(g); }
    groups[g].push({ scr, i });
  });

  let html = "";
  groupsOrder.forEach(g => {
    html += `<div class="jump-group"><div class="jump-group-label">${escapeHtml(g)}</div>`;
    groups[g].forEach(({ scr, i }) => {
      const isCurrent = i === currentScreenIdx;
      html += `<div class="jump-item ${isCurrent ? "current" : ""}" data-idx="${i}">
        <span class="jump-item-num">${String(i + 1).padStart(2, "0")}</span>
        <span class="jump-item-title">${escapeHtml(typeLabel(scr))}</span>
      </div>`;
    });
    html += `</div>`;
  });
  menu.innerHTML = html;

  // Button label: current stage (concept or session), else Jump
  if (btnLabel) {
    const cur = SCREENS[currentScreenIdx];
    let lbl = "Jump";
    if (cur) {
      if (cur.type === "concept") lbl = cur.stageName || "Jump";
      else if (cur.session) lbl = cur.session.stage || cur.session.number || "Jump";
    }
    btnLabel.textContent = lbl;
  }

  // Click handlers: jump straight to that screen index
  menu.querySelectorAll(".jump-item").forEach(el => {
    el.onclick = () => jumpToScreen(parseInt(el.dataset.idx, 10));
  });
}

function jumpToScreen(idx) {
  if (idx >= 0 && idx < SCREENS.length) {
    currentScreenIdx = idx;
    renderCurrent();
  }
  closeJumpMenu();
}

function toggleJumpMenu() {
  const wrap = $("#jump-wrap");
  if (!wrap) return;
  const willOpen = !wrap.classList.contains("open");
  wrap.classList.toggle("open");
  if (willOpen) {
    const cur = wrap.querySelector(".jump-item.current");
    if (cur) cur.scrollIntoView({ block: "center" });
  }
}

function closeJumpMenu() {
  const wrap = $("#jump-wrap");
  if (wrap) wrap.classList.remove("open");
}

document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("jump-btn");
  if (btn) btn.addEventListener("click", (e) => { e.stopPropagation(); toggleJumpMenu(); });
  // Click outside closes
  document.addEventListener("click", (e) => {
    const wrap = document.getElementById("jump-wrap");
    if (wrap && !wrap.contains(e.target)) closeJumpMenu();
  });
});

/* ============================================
   KEYBOARD SHORTCUTS
   ============================================ */

document.addEventListener("keydown", (e) => {
  // Don't intercept when typing in inputs
  if (e.target.matches("input, textarea, [contenteditable]")) return;

  switch (e.key) {
    case "ArrowRight":
    case " ":
      e.preventDefault();
      next();
      break;
    case "ArrowLeft":
      e.preventDefault();
      prev();
      break;
    case "t": case "T":
      e.preventDefault();
      pauseTimer();
      break;
    case "f": case "F":
      e.preventDefault();
      toggleFullscreen();
      break;
    case "h": case "H":
      e.preventDefault();
      toggleHMV();
      break;
    case "j": case "J":
      e.preventDefault();
      toggleJumpMenu();
      break;
  }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

function toggleHMV() {
  hmvCollapsed = !hmvCollapsed;
  $("#hmv-reminder").classList.toggle("collapsed", hmvCollapsed);
}

$("#hmv-reminder").addEventListener("click", toggleHMV);

/* Timer click to pause/resume */
$("#timer").addEventListener("click", pauseTimer);

/* Prev/Next buttons */
$("#prev-btn").addEventListener("click", prev);
$("#next-btn").addEventListener("click", next);

/* ============================================
   UTILS
   ============================================ */

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
function escapeAttr(str) { return escapeHtml(str); }

/* ============================================
   AUTH GATE
   ============================================ */
/*
  Hardcoded credentials are stored as SHA-256 hashes below.
  This is a soft gate. The JS file is publicly readable, so a
  determined visitor can still extract the hashes and brute-force.
  For real security, move to Render-level Basic Auth.

  TO SET CREDENTIALS:
  1. Open a browser console anywhere and run:
       crypto.subtle.digest("SHA-256", new TextEncoder().encode("YOUR_VALUE"))
         .then(b => console.log(Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,"0")).join("")));
  2. Paste the resulting hex string into AUTH_ID_HASH or AUTH_PW_HASH.

  Defaults below are for "admin" / "change-me". REPLACE BEFORE DEPLOY.
*/
const AUTH_ID_HASH = "9f32a6796682f1c784d46ca60d38aab39a4862523b4043814c2793c7b9382520";
const AUTH_PW_HASH = "f181008ea04c7c3d9734a4b9d87e48df67970972a43641bb0608b0e1e91c6c1b";
const AUTH_SESSION_KEY = "jb-platform-auth";

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function dismissLogin() {
  $("#login-overlay").classList.add("hidden");
  loadSessions();
}

async function tryLogin(id, pw) {
  // ID is case-insensitive (matches school and women platforms); password stays case-sensitive
  const normalizedId = (id || "").trim().toLowerCase();
  const [idHash, pwHash] = await Promise.all([sha256Hex(normalizedId), sha256Hex(pw)]);
  return idHash === AUTH_ID_HASH && pwHash === AUTH_PW_HASH;
}

function initAuth() {
  // Already authenticated this session?
  try {
    if (sessionStorage.getItem(AUTH_SESSION_KEY) === "1") {
      dismissLogin();
      return;
    }
  } catch (_) { /* sessionStorage may be unavailable; fall through to form */ }

  const form = $("#login-form");
  const errEl = $("#login-error");
  const card = $("#login-card");
  const submit = $("#login-submit");
  const idInput = $("#login-id");
  const pwInput = $("#login-pw");

  // Focus the ID field on load
  setTimeout(() => idInput.focus(), 50);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = idInput.value.trim();
    const pw = pwInput.value;
    if (!id || !pw) return;

    submit.disabled = true;
    errEl.classList.remove("show");

    const ok = await tryLogin(id, pw);
    submit.disabled = false;

    if (ok) {
      try { sessionStorage.setItem(AUTH_SESSION_KEY, "1"); } catch (_) {}
      dismissLogin();
    } else {
      errEl.classList.add("show");
      card.classList.remove("shake");
      // Force reflow so the animation re-triggers
      void card.offsetWidth;
      card.classList.add("shake");
      pwInput.value = "";
      pwInput.focus();
    }
  });
}

initAuth();
