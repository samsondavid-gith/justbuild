<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>First Build  /  Facilitator Platform</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Inter:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  /* ========================================
     First Build  /  Facilitator Platform
     Dark mode. Optimised for projection.
     ======================================== */

  :root {
    --bg:            #0A0A0A;
    --bg-elev-1:    #141414;
    --bg-elev-2:    #1C1C1C;
    --line:          rgba(255,255,255,0.08);
    --line-strong:   rgba(255,255,255,0.16);
    --text:          #FFFFFF;
    --text-soft:     #C8C8C8;
    --text-muted:    #8A8A8A;
    --text-faint:    #5A5A5A;
    --accent:        #C17D2A;
    --accent-soft:   rgba(193, 125, 42, 0.18);
    --accent-glow:   rgba(193, 125, 42, 0.35);
    --warning:       #E8B53A;
    --danger:        #D7553A;
    --serif:         'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --sans:          'Inter', system-ui, -apple-system, sans-serif;
    --mono:          'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ----- Top bar ----- */
  .topbar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    z-index: 5;
  }
  .topbar.hidden { display: none; }
  .topbar-left {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .topbar-logo { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
  .topbar-eyebrow {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); font-weight: 500;
  }
  .topbar-title {
    font-family: var(--serif); font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
  }
  .topbar-section {
    font-size: 13px; color: var(--text-muted); letter-spacing: 0.04em;
  }
  .topbar-center { display: flex; justify-content: center; }
  .timer {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent);
    padding: 4px 18px;
    border: 1px solid var(--accent-soft);
    border-radius: 4px;
    background: rgba(193,125,42,0.04);
    cursor: pointer;
    user-select: none;
    min-width: 110px;
    text-align: center;
  }
  .timer.paused { color: var(--warning); border-color: rgba(232,181,58,0.3); }
  .timer.overrun { color: var(--danger); border-color: rgba(215,85,58,0.4); animation: pulse-warn 2s infinite; }
  @keyframes pulse-warn { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .topbar-right { display: flex; justify-content: flex-end; align-items: center; gap: 18px; }

  .jump-wrap { position: relative; }
  .jump-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: var(--text-soft);
    border: 1px solid var(--line-strong);
    padding: 6px 14px; border-radius: 4px;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em; cursor: pointer;
  }
  .jump-btn:hover { color: var(--accent); border-color: var(--accent-soft); }
  .jump-btn svg { stroke: currentColor; }

  .jump-menu {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--bg-elev-1);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    min-width: 320px;
    max-height: 70vh; overflow-y: auto;
    box-shadow: 0 12px 36px rgba(0,0,0,0.45);
    padding: 8px 0;
    display: none; z-index: 50;
  }
  .jump-menu.open { display: block; }
  .jump-group {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 12px 16px 6px;
  }
  .jump-item {
    display: block; width: 100%; text-align: left;
    background: transparent; color: var(--text-soft);
    border: none; padding: 8px 16px;
    font-family: var(--sans); font-size: 14px; font-weight: 400;
    cursor: pointer;
  }
  .jump-item:hover { background: var(--bg-elev-2); color: var(--accent); }
  .jump-item.current { color: var(--accent); font-weight: 500; }
  .jump-item .jump-id {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); margin-right: 10px;
  }

  .progress { display: flex; gap: 6px; }
  .progress-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--line-strong); transition: background 0.3s;
  }
  .progress-dot.active { background: var(--accent); transform: scale(1.3); }
  .progress-dot.done { background: var(--accent-soft); }

  /* ----- Main stage ----- */
  .stage {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 64px 96px;
    scroll-behavior: smooth;
  }
  .stage::-webkit-scrollbar { width: 8px; }
  .stage::-webkit-scrollbar-track { background: transparent; }
  .stage::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  .stage-inner {
    max-width: 1100px; margin: 0 auto;
  }

  /* ----- Bottom bar ----- */
  .bottombar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    padding: 18px 40px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .bottombar.hidden { display: none; }

  .nav-btn {
    background: transparent; color: var(--text-soft);
    border: 1px solid var(--line-strong);
    padding: 10px 24px; border-radius: 4px;
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    letter-spacing: 0.04em; cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--accent); border-color: var(--accent-soft); background: rgba(193,125,42,0.04); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-prev { justify-self: start; }
  .nav-next { justify-self: end; }
  .bottombar-center { display: flex; justify-content: center; gap: 14px; }

  .hmv-reminder {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px dashed var(--line);
    border-radius: 4px;
    cursor: pointer;
  }
  .hmv-reminder:hover { color: var(--accent); border-color: var(--accent-soft); }
  .hmv-reminder svg { stroke: currentColor; }

  /* ----- Typography ----- */
  .eyebrow {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); font-weight: 500;
    margin-bottom: 20px;
  }
  h1.stage-title {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
    max-width: 22ch;
  }
  h2.section-title {
    font-family: var(--serif);
    font-size: clamp(22px, 2.6vw, 30px);
    font-weight: 500;
    letter-spacing: -0.01em;
    margin: 48px 0 20px;
    color: var(--text);
  }
  h3.sub-title {
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 24px 0 10px;
    color: var(--text);
  }
  p.stage-body {
    font-family: var(--sans);
    font-size: 19px;
    line-height: 1.55;
    color: var(--text-soft);
    margin-bottom: 18px;
    max-width: 60ch;
  }
  p.stage-body strong { color: var(--text); font-weight: 600; }
  hr.section-rule {
    height: 1px; background: var(--line); border: 0;
    margin: 40px 0;
  }

  /* ----- Question cards (used in set-the-stage) ----- */
  .question-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 18px;
    margin: 32px 0;
  }
  .question-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px 24px;
  }
  .question-card-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 10px;
    letter-spacing: -0.005em;
  }
  .question-card-body {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-soft);
  }

  /* ----- HMV cards ----- */
  .hmv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin: 28px 0 12px;
  }
  .hmv-card {
    background: rgba(193,125,42,0.06);
    border: 1px solid var(--accent-soft);
    border-radius: 6px;
    padding: 20px 22px;
  }
  .hmv-axis {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .hmv-instruction {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.5;
  }

  /* ----- Prompt box ----- */
  .prompt-wrap {
    margin: 28px 0;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: var(--bg-elev-1);
    overflow: hidden;
  }
  .prompt-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px;
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--line);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .prompt-box {
    padding: 20px 22px;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-soft);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .copy-btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent-soft);
    padding: 4px 12px;
    border-radius: 3px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .copy-btn:hover { background: rgba(193,125,42,0.08); }
  .copy-btn.copied { color: var(--warning); border-color: rgba(232,181,58,0.3); }

  /* ----- Build checklist ----- */
  .build-list { list-style: none; padding: 0; margin: 24px 0; }
  .build-item {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 20px 22px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .build-item:hover { border-color: var(--accent-soft); }
  .build-item.checked { background: rgba(193,125,42,0.05); border-color: var(--accent-soft); }
  .build-checkbox {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border: 1.5px solid var(--line-strong);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
    transition: all 0.15s;
  }
  .build-item.checked .build-checkbox {
    background: var(--accent); border-color: var(--accent);
  }
  .build-checkbox svg { opacity: 0; }
  .build-item.checked .build-checkbox svg { opacity: 1; }
  .build-content { flex: 1; }
  .build-title {
    font-family: var(--sans); font-size: 16px; font-weight: 600;
    color: var(--text); margin-bottom: 6px;
  }
  .build-item.checked .build-title { color: var(--accent); }
  .build-instructions {
    font-size: 15px; line-height: 1.55; color: var(--text-soft);
  }

  .all-checked-banner {
    margin-top: 28px;
    padding: 22px 24px;
    background: rgba(193,125,42,0.1);
    border: 1px solid var(--accent-soft);
    border-radius: 6px;
    display: none;
    text-align: center;
  }
  .all-checked-banner.show { display: block; }

  /* ----- Output capture ----- */
  .output-capture-card {
    margin: 36px 0;
    padding: 28px 30px;
    background: rgba(193,125,42,0.08);
    border: 1px solid var(--accent-soft);
    border-radius: 8px;
  }
  .output-capture-eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }
  .output-capture-label {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 10px;
    color: var(--text);
  }
  .output-capture-instruction {
    font-size: 15.5px;
    color: var(--text-soft);
    line-height: 1.55;
  }

  /* ----- Buttons ----- */
  .button-row {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    margin-top: 24px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line-strong);
    padding: 14px 32px;
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent); color: #FFFFFF; border-color: var(--accent);
  }
  .btn-primary:hover { background: #A86A24; border-color: #A86A24; color: #FFFFFF; }
  .btn-ghost {
    background: transparent; color: var(--text-soft);
  }

  /* ----- Welcome screen ----- */
  .hero {
    text-align: center;
    padding: 80px 0 40px;
  }
  .hero-logo {
    width: 96px; height: auto;
    margin: 0 auto 28px;
    opacity: 0.95;
  }
  .hero-eyebrow {
    font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent); font-weight: 500;
    margin-bottom: 36px;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(72px, 12vw, 144px);
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 0.92;
    color: var(--text);
  }
  .hero-title.brand { letter-spacing: 0.04em; font-weight: 700; }
  .hero-rule {
    width: 64px; height: 1px; background: var(--accent); border: 0;
    margin: 40px auto;
  }
  .hero-meta {
    font-family: var(--serif);
    font-size: 20px;
    font-style: italic;
    color: var(--text-soft);
    font-weight: 300;
  }

  /* ----- Welcome variants (housekeeping, two-doors, journey-map) ----- */
  .wl-screen {
    padding: 24px 0;
  }
  .wl-eyebrow {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 28px;
  }
  .wl-title {
    font-family: var(--serif);
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 300;
    letter-spacing: -0.025em;
    line-height: 1.0;
    margin-bottom: 28px;
    max-width: 18ch;
  }
  .wl-title em { color: var(--accent); font-style: italic; font-weight: 400; }
  .wl-sub {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    line-height: 1.4;
    color: var(--text-soft);
    font-weight: 300;
    max-width: 36ch;
    margin-bottom: 32px;
  }

  /* ----- Journey wave ----- */
  .journey-wave-screen { padding-bottom: 60px; }
  .journey-wave-title { margin-bottom: 12px; }
  .journey-wave-sub { margin-bottom: 32px; }
  .journey-wave-wrap {
    margin: 32px 0;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg-elev-1);
    padding: 16px;
  }
  .journey-wave-svg { width: 100%; height: auto; display: block; }
  .journey-label-main {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 500;
    fill: var(--text);
    letter-spacing: -0.01em;
  }
  .journey-label-sub {
    font-family: var(--sans);
    font-size: 13px;
    fill: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .journey-bookend-label {
    font-family: var(--sans);
    font-size: 12px;
    fill: var(--accent);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .journey-wave-rule {
    height: 1px; background: var(--line); border: 0;
    margin: 32px 0 24px;
  }
  .journey-wave-footer {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--text-soft);
    font-style: italic;
    line-height: 1.5;
    max-width: 60ch;
  }

  /* ----- Portfolio hero (housekeeping) ----- */
  .portfolio-hero {
    margin: 32px 0;
    padding: 28px 30px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .portfolio-hero-eyebrow {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 14px;
  }
  .portfolio-hero-url {
    font-family: var(--mono);
    font-size: clamp(15px, 2vw, 20px);
    color: var(--text);
    word-break: break-all;
    letter-spacing: 0.01em;
  }
  .portfolio-hero-slot {
    color: var(--accent);
    background: rgba(193,125,42,0.08);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .portfolio-hero-note {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ----- Artifact strip ----- */
  .artifacts-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin: 24px 0;
  }
  .artifact-tile {
    padding: 18px 16px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .artifact-num {
    font-family: var(--mono); font-size: 11px; color: var(--accent);
    letter-spacing: 0.16em;
  }
  .artifact-name {
    font-family: var(--serif); font-size: 18px; font-weight: 500;
    margin-top: 6px; color: var(--text);
  }
  .artifact-desc {
    font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.5;
  }

  /* ----- Phase break ----- */
  .phase-break {
    text-align: center;
    padding: 100px 0;
  }
  .phase-break-eyebrow {
    font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 32px;
  }
  .phase-break-title {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 300;
    letter-spacing: -0.025em;
    line-height: 1.0;
    margin-bottom: 24px;
  }
  .phase-break-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--text-soft);
    font-weight: 300;
    max-width: 36ch;
    margin: 0 auto 40px;
    line-height: 1.4;
  }

  /* ----- Session start ----- */
  .session-start {
    padding: 40px 0;
  }
  .session-start-meta {
    display: flex; flex-wrap: wrap; gap: 24px;
    margin-top: 28px;
    padding: 18px 22px;
    background: var(--bg-elev-1);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .session-start-meta-item {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .session-start-meta-item strong {
    color: var(--text-soft);
    font-weight: 500;
    margin-right: 6px;
  }

  /* ----- Break screen ----- */
  .break-screen {
    text-align: center;
    padding: 100px 0;
  }
  .break-eyebrow {
    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 28px;
  }
  .break-timer {
    font-family: var(--mono);
    font-size: clamp(80px, 14vw, 160px);
    color: var(--text);
    letter-spacing: 0.04em;
    margin: 32px 0;
    font-weight: 400;
  }
  .break-note {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 18px;
  }

  /* ----- Login overlay ----- */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    width: 100%; max-width: 380px;
    padding: 48px 40px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg-elev-1);
    text-align: center;
  }
  .login-card .hero-logo {
    width: 64px; margin-bottom: 24px;
  }
  .login-card .login-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .login-card .login-sub {
    font-size: 13px; color: var(--text-muted);
    letter-spacing: 0.04em; margin-bottom: 32px;
  }
  .login-form { display: flex; flex-direction: column; gap: 12px; }
  .login-input {
    background: var(--bg);
    border: 1px solid var(--line-strong);
    padding: 12px 16px;
    border-radius: 4px;
    color: var(--text);
    font-family: var(--sans); font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-submit {
    background: var(--accent); color: #FFFFFF; border: none;
    padding: 12px; border-radius: 4px;
    font-family: var(--sans); font-size: 15px; font-weight: 500;
    letter-spacing: 0.04em; cursor: pointer; margin-top: 8px;
  }
  .login-submit:hover { background: #A86A24; }
  .login-error {
    color: var(--danger); font-size: 13px; margin-top: 12px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ----- Stage text paragraphs ----- */
  .stage-text { margin: 28px 0; }
  .stage-text p {
    font-size: 19px; line-height: 1.55; color: var(--text-soft);
    margin-bottom: 20px; max-width: 62ch;
  }

  /* ----- Responsive ----- */
  @media (max-width: 768px) {
    .stage { padding: 40px 24px; }
    .topbar, .bottombar { padding: 14px 20px; }
    .topbar { grid-template-columns: auto 1fr auto; gap: 12px; }
    .topbar-title { font-size: 16px; }
    .topbar-eyebrow { display: none; }
    .timer { font-size: 18px; padding: 4px 12px; min-width: 80px; }
    .jump-btn { padding: 5px 10px; font-size: 11px; }
    .bottombar { grid-template-columns: 1fr auto 1fr; }
    .nav-btn { padding: 8px 14px; font-size: 12px; }
    .progress { display: none; }
  }
</style>
</head>
<body>

<!-- ============================================================
     LOGIN OVERLAY
     ============================================================ -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card" id="login-card">
    <img class="hero-logo" src="logo.png" alt="Orange Caterpillar" onerror="this.style.display='none'">
    <div class="login-title">First Build</div>
    <div class="login-sub">Facilitator console</div>
    <form class="login-form" id="login-form" autocomplete="off">
      <input class="login-input" type="text" id="login-id" placeholder="ID" autocapitalize="off" autocorrect="off" spellcheck="false" required>
      <input class="login-input" type="password" id="login-pw" placeholder="Password" required>
      <button class="login-submit" type="submit" id="login-submit">Enter</button>
      <div class="login-error" id="login-error">Incorrect ID or password.</div>
    </form>
  </div>
</div>

<!-- ============================================================
     TOPBAR
     ============================================================ -->
<header class="topbar hidden" id="topbar">
  <div class="topbar-left">
    <img class="topbar-logo" src="logo.png" alt="" onerror="this.style.display='none'">
    <span class="topbar-eyebrow" id="topbar-eyebrow">First Build</span>
    <span class="topbar-title" id="topbar-title">Welcome</span>
    <span class="topbar-section" id="topbar-section"></span>
  </div>
  <div class="topbar-center">
    <div class="timer" id="timer" title="Click or press T to pause/resume">--:--</div>
  </div>
  <div class="topbar-right">
    <div class="jump-wrap" id="jump-wrap">
      <button class="jump-btn" id="jump-btn" title="Jump to a session (J)">
        <span id="jump-btn-label">Jump</span>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke-width="1.5"><path d="M2 4l3 3 3-3"/></svg>
      </button>
      <div class="jump-menu" id="jump-menu"></div>
    </div>
    <div class="progress" id="progress"></div>
  </div>
</header>

<!-- ============================================================
     MAIN STAGE
     ============================================================ -->
<main class="stage" id="stage">
  <div class="stage-inner" id="stage-inner"></div>
</main>

<!-- ============================================================
     BOTTOMBAR
     ============================================================ -->
<footer class="bottombar hidden" id="bottombar">
  <button class="nav-btn nav-prev" id="prev-btn">← Previous</button>
  <div class="bottombar-center">
    <div class="hmv-reminder" id="hmv-reminder" title="Press H to toggle">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/></svg>
      <span>Real person · Real problem · Demoable</span>
    </div>
  </div>
  <button class="nav-btn nav-next" id="next-btn">Next →</button>
</footer>

<!-- ============================================================
     APP LOGIC
     ============================================================ -->
<script>
(function () {
  'use strict';

  // ============================================================
  // CONFIG
  // ============================================================
  const LOGIN_ID = 'mufasa';
  const LOGIN_PW = 'Phantom@6869';
  const SESSIONS_URL = './sessions-school.json';
  const STORAGE_PREFIX = 'firstbuild-fac:';

  // ============================================================
  // STATE
  // ============================================================
  let DATA = null;
  let SCREENS = [];
  let currentScreenIdx = 0;
  let timerInterval = null;
  let timerStart = null;
  let timerElapsed = 0;
  let timerPaused = true;
  let timerSessionMinutes = 0;
  let checkedItems = {};

  // ============================================================
  // HELPERS
  // ============================================================
  function $(sel) { return document.querySelector(sel); }
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
  function paragraphsFromText(text) {
    if (!text) return '';
    return String(text).split(/\n\n+/).map(function (p) {
      return '<p>' + escapeHtml(p).replace(/\n/g, '<br>') + '</p>';
    }).join('');
  }
  function saveCheck(key, val) {
    try { localStorage.setItem(STORAGE_PREFIX + 'check:' + key, val ? '1' : '0'); } catch (e) {}
  }
  function loadCheck(key) {
    try { return localStorage.getItem(STORAGE_PREFIX + 'check:' + key) === '1'; } catch (e) { return false; }
  }

  // ============================================================
  // LOGIN
  // ============================================================
  function isLoggedIn() {
    try { return sessionStorage.getItem(STORAGE_PREFIX + 'auth') === '1'; } catch (e) { return false; }
  }
  function setLoggedIn() {
    try { sessionStorage.setItem(STORAGE_PREFIX + 'auth', '1'); } catch (e) {}
  }
  function handleLogin(e) {
    e.preventDefault();
    const id = $('#login-id').value.trim().toLowerCase();
    const pw = $('#login-pw').value;
    if (id === LOGIN_ID && pw === LOGIN_PW) {
      setLoggedIn();
      $('#login-overlay').classList.add('hidden');
      $('#topbar').classList.remove('hidden');
      $('#bottombar').classList.remove('hidden');
      boot();
    } else {
      $('#login-error').classList.add('show');
    }
  }

  // ============================================================
  // DATA LOAD
  // ============================================================
  async function loadSessions() {
    try {
      const res = await fetch(SESSIONS_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      DATA = await res.json();
      return true;
    } catch (err) {
      $('#stage-inner').innerHTML = '<div class="hero"><div class="hero-eyebrow">Error</div><h1 class="hero-title" style="font-size:48px">Could not load sessions.</h1><p class="stage-body" style="margin-top:24px">' + escapeHtml(err.message) + '</p></div>';
      return false;
    }
  }

  // ============================================================
  // BUILD SCREENS
  // ============================================================
  function buildScreens() {
    SCREENS = [];
    SCREENS.push({ type: 'welcome' });
    SCREENS.push({ type: 'housekeeping' });
    SCREENS.push({ type: 'artifacts' });
    SCREENS.push({ type: 'journey-map' });

    const sessions = DATA.sessions || [];
    let prevPhase = null;
    sessions.forEach(function (session) {
      // Phase transitions
      if (session.phase === 'office_hours' && prevPhase !== 'office_hours') {
        SCREENS.push({ type: 'phase-break', to: 'office_hours' });
      }
      if (session.phase === 'demo_day' && prevPhase !== 'demo_day') {
        SCREENS.push({ type: 'phase-break', to: 'demo_day' });
      }
      if (session.day === 2 && prevPhase === 'weekend' && session.id !== sessions[0].id) {
        // Day 2 morning marker (only once)
        const lastWeekendSession = sessions.filter(function (s) { return s.day === 1; }).pop();
        if (lastWeekendSession && session.id !== lastWeekendSession.id) {
          // already handled by session-start; skip explicit day2 marker
        }
      }

      SCREENS.push({ type: 'session-start', session: session });
      SCREENS.push({ type: 'stage-text', session: session });

      if ((session.questions || []).length > 0) {
        SCREENS.push({ type: 'questions', session: session });
      }
      if ((session.hmv || []).length > 0) {
        SCREENS.push({ type: 'hmv', session: session });
      }
      if ((session.prompts || []).length > 0) {
        session.prompts.forEach(function (p, idx) {
          SCREENS.push({ type: 'prompt', session: session, prompt: p, promptIdx: idx });
        });
      }
      if ((session.build || []).length > 0) {
        SCREENS.push({ type: 'build', session: session });
      }
      if ((session.test_output || []).length > 0) {
        SCREENS.push({ type: 'test-output', session: session });
      }
      if (session.output_capture) {
        SCREENS.push({ type: 'output-capture', session: session });
      }
      SCREENS.push({ type: 'session-end', session: session });

      if (session.break_after && session.break_duration_minutes > 0) {
        SCREENS.push({ type: 'break', session: session });
      }
      prevPhase = session.phase;
    });
  }

  // ============================================================
  // RENDERERS
  // ============================================================
  function renderWelcome() {
    return '<div class="hero">' +
      '<img class="hero-logo" src="logo.png" alt="Orange Caterpillar" onerror="this.style.display=\'none\'">' +
      '<div class="hero-eyebrow">Orange Caterpillar</div>' +
      '<h1 class="hero-title brand">FIRST<br>BUILD</h1>' +
      '<hr class="hero-rule">' +
      '<p class="hero-meta">Two days &middot; Three weeks &middot; One portfolio</p>' +
      '<div class="button-row" style="justify-content:center; margin-top: 56px;">' +
        '<button class="btn btn-primary" id="start-btn">Begin →</button>' +
      '</div>' +
    '</div>';
  }

  function renderHousekeeping() {
    return '<div class="wl-screen">' +
      '<div class="wl-eyebrow">Where you end up</div>' +
      '<h1 class="wl-title">One URL with <em>everything</em> you built.</h1>' +
      '<p class="wl-sub">Every Minifounder gets a personal portfolio page. Six artifacts. Plus a Demo Day recording.</p>' +
      '<div class="portfolio-hero">' +
        '<div class="portfolio-hero-eyebrow">Your portfolio URL</div>' +
        '<div class="portfolio-hero-url">justbuild.orangecaterpillar.com/<span class="portfolio-hero-slot">your-school</span>/<span class="portfolio-hero-slot">fb1</span>/<span class="portfolio-hero-slot">your-name</span></div>' +
        '<p class="portfolio-hero-note">Goes live on Demo Day. Yours for life.</p>' +
      '</div>' +
    '</div>';
  }

  function renderArtifacts() {
    const artifacts = [
      { num: '01', name: 'Ideation', desc: 'The one-page sheet that says who you are building for and what your First Build will do for them.' },
      { num: '02', name: 'AI App', desc: 'One HTML file. One AI call. Live at a real URL. Works on a phone.' },
      { num: '03', name: 'Website', desc: 'One-page Carrd site. Three sections. A button that opens your AI app.' },
      { num: '04', name: 'Audio', desc: 'Sixty seconds. Embedded on the website. Your voice or an AI voice telling visitors what the First Build does.' },
      { num: '05', name: 'Video', desc: 'Ninety seconds. Screen-recorded. You walking the visitor through one real example.' },
      { num: '06', name: 'Brochure', desc: 'One-page PDF. Linked from the website. Shareable on WhatsApp.' }
    ];
    return '<div class="wl-screen">' +
      '<div class="wl-eyebrow">Six things you make</div>' +
      '<h1 class="wl-title">Six artifacts. <em>All real. All yours.</em></h1>' +
      '<p class="wl-sub">Five of these are built across the weekend. The polish happens across the next three weeks. The Demo Day recording is the seventh thing.</p>' +
      '<div class="artifacts-strip">' +
        artifacts.map(function (a) {
          return '<div class="artifact-tile">' +
            '<div class="artifact-num">' + escapeHtml(a.num) + '</div>' +
            '<div class="artifact-name">' + escapeHtml(a.name) + '</div>' +
            '<div class="artifact-desc">' + escapeHtml(a.desc) + '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }

  function renderJourneyMap() {
    // Five stages of the Minifounder journey.
    // Wave alternates peak and trough.
    // Caterpillar at left (Day one), butterfly at right (Demo Day).
    return '<div class="wl-screen journey-wave-screen">' +
      '<div class="wl-eyebrow">First Build with AI</div>' +
      '<h1 class="wl-title journey-wave-title"><em>From an idea on a paper to a portfolio on the internet.</em></h1>' +
      '<p class="wl-sub journey-wave-sub"><em>Two days and three weeks of metamorphosis. Six real things made by you.</em></p>' +
      '<div class="journey-wave-wrap">' +
        '<svg class="journey-wave-svg" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" aria-label="Five-stage journey from caterpillar to butterfly">' +
          '<defs>' +
            '<radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">' +
              '<stop offset="0%" stop-color="rgba(193,125,42,0.55)"/>' +
              '<stop offset="60%" stop-color="rgba(193,125,42,0.18)"/>' +
              '<stop offset="100%" stop-color="rgba(193,125,42,0)"/>' +
            '</radialGradient>' +
          '</defs>' +
          '<path d="M 130 280 C 200 280, 240 200, 290 200 C 340 200, 370 200, 400 200 C 460 200, 480 380, 540 380 C 600 380, 620 200, 680 200 C 740 200, 760 200, 780 200 C 840 200, 860 380, 920 380 C 980 380, 1000 200, 1060 200 C 1090 200, 1110 240, 1130 280" fill="none" stroke="rgba(193,125,42,0.85)" stroke-width="3" stroke-linecap="round"/>' +
          // Node 1: Pick (peak)
          '<g class="journey-node">' +
            '<circle cx="345" cy="200" r="40" fill="url(#nodeGlow)"/>' +
            '<circle cx="345" cy="200" r="22" fill="#0A0A0A" stroke="rgba(193,125,42,0.6)" stroke-width="1"/>' +
            '<circle cx="345" cy="200" r="8" fill="#C17D2A"/>' +
          '</g>' +
          '<text x="345" y="105" text-anchor="middle" class="journey-label-main">Pick</text>' +
          '<text x="345" y="135" text-anchor="middle" class="journey-label-sub">Choose one idea, one person</text>' +
          // Node 2: Build (trough)
          '<g class="journey-node">' +
            '<circle cx="540" cy="380" r="40" fill="url(#nodeGlow)"/>' +
            '<circle cx="540" cy="380" r="22" fill="#0A0A0A" stroke="rgba(193,125,42,0.6)" stroke-width="1"/>' +
            '<circle cx="540" cy="380" r="8" fill="#C17D2A"/>' +
          '</g>' +
          '<text x="540" y="455" text-anchor="middle" class="journey-label-main">Build</text>' +
          '<text x="540" y="485" text-anchor="middle" class="journey-label-sub">AI app at the core</text>' +
          // Node 3: Launch (peak)
          '<g class="journey-node">' +
            '<circle cx="730" cy="200" r="40" fill="url(#nodeGlow)"/>' +
            '<circle cx="730" cy="200" r="22" fill="#0A0A0A" stroke="rgba(193,125,42,0.6)" stroke-width="1"/>' +
            '<circle cx="730" cy="200" r="8" fill="#C17D2A"/>' +
          '</g>' +
          '<text x="730" y="105" text-anchor="middle" class="journey-label-main">Launch</text>' +
          '<text x="730" y="135" text-anchor="middle" class="journey-label-sub">Website goes live</text>' +
          // Node 4: Polish (trough)
          '<g class="journey-node">' +
            '<circle cx="920" cy="380" r="40" fill="url(#nodeGlow)"/>' +
            '<circle cx="920" cy="380" r="22" fill="#0A0A0A" stroke="rgba(193,125,42,0.6)" stroke-width="1"/>' +
            '<circle cx="920" cy="380" r="8" fill="#C17D2A"/>' +
          '</g>' +
          '<text x="920" y="455" text-anchor="middle" class="journey-label-main">Polish</text>' +
          '<text x="920" y="485" text-anchor="middle" class="journey-label-sub">Audio &middot; video &middot; brochure</text>' +
          // Node 5: Share (peak)
          '<g class="journey-node">' +
            '<circle cx="1075" cy="200" r="40" fill="url(#nodeGlow)"/>' +
            '<circle cx="1075" cy="200" r="22" fill="#0A0A0A" stroke="rgba(193,125,42,0.6)" stroke-width="1"/>' +
            '<circle cx="1075" cy="200" r="8" fill="#C17D2A"/>' +
          '</g>' +
          '<text x="1075" y="105" text-anchor="middle" class="journey-label-main">Share</text>' +
          '<text x="1075" y="135" text-anchor="middle" class="journey-label-sub">Demo Day in front of parents</text>' +
          // Caterpillar (left)
          '<image href="caterpillar.png" x="20" y="240" width="160" height="120" preserveAspectRatio="xMidYMid meet" onerror="this.style.display=\'none\'"/>' +
          '<text x="100" y="395" text-anchor="middle" class="journey-bookend-label">Day one</text>' +
          // Butterfly (right)
          '<image href="butterfly.png" x="1080" y="200" width="170" height="170" preserveAspectRatio="xMidYMid meet" onerror="this.style.display=\'none\'"/>' +
          '<text x="1165" y="395" text-anchor="middle" class="journey-bookend-label">Demo Day</text>' +
        '</svg>' +
      '</div>' +
      '<hr class="journey-wave-rule">' +
      '<p class="journey-wave-footer">A Minifounder does not learn AI and then apply it. You build a real First Build for a real person, and the AI capability is what you pick up along the way.</p>' +
    '</div>';
  }

  function renderPhaseBreak(to) {
    if (to === 'office_hours') {
      return '<div class="phase-break">' +
        '<div class="phase-break-eyebrow">End of the weekend</div>' +
        '<h1 class="phase-break-title">Three weeks at home.</h1>' +
        '<p class="phase-break-sub">One hour of office hours every Saturday. WhatsApp for between-session unblocks. Demo Day in three weeks.</p>' +
      '</div>';
    }
    if (to === 'demo_day') {
      return '<div class="phase-break">' +
        '<div class="phase-break-eyebrow">Demo Day</div>' +
        '<h1 class="phase-break-title">The day you show your parents.</h1>' +
        '<p class="phase-break-sub">Three minutes per Minifounder. Recorded. The recording is yours for life.</p>' +
      '</div>';
    }
    return '';
  }

  function renderSessionStart(session) {
    return '<div class="session-start">' +
      '<div class="eyebrow">Session ' + escapeHtml(session.number) + ' &middot; ' + escapeHtml(session.stage || '') + '</div>' +
      '<h1 class="stage-title">' + escapeHtml(session.title) + '</h1>' +
      '<div class="session-start-meta">' +
        '<div class="session-start-meta-item"><strong>Time</strong>' + escapeHtml(session.start_time) + ' – ' + escapeHtml(session.end_time) + '</div>' +
        '<div class="session-start-meta-item"><strong>Length</strong>' + escapeHtml(String(session.duration_minutes)) + ' minutes</div>' +
        (session.day ? '<div class="session-start-meta-item"><strong>Day</strong>' + escapeHtml(String(session.day)) + '</div>' : '') +
        '<div class="session-start-meta-item"><strong>Phase</strong>' + escapeHtml(session.phase || '') + '</div>' +
      '</div>' +
      '<div class="button-row" style="margin-top: 48px;">' +
        '<button class="btn btn-primary" id="begin-btn">Begin Session →</button>' +
      '</div>' +
    '</div>';
  }

  function renderStageText(session) {
    return '<div class="eyebrow">Set the stage</div>' +
      '<h2 class="section-title">' + escapeHtml(session.title) + '</h2>' +
      '<div class="stage-text">' + paragraphsFromText(session.set_the_stage) + '</div>';
  }

  function renderQuestions(session) {
    const qs = session.questions || [];
    return '<div class="eyebrow">Sit with these</div>' +
      '<h2 class="section-title">Questions for the room</h2>' +
      '<div class="question-grid">' +
        qs.map(function (q) {
          return '<div class="question-card">' +
            '<div class="question-card-title">' + escapeHtml(q.title) + '</div>' +
            '<div class="question-card-body">' + escapeHtml(q.body) + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
  }

  function renderHmv(session) {
    const items = session.hmv || [];
    return '<div class="eyebrow">The three checks</div>' +
      '<h2 class="section-title">Real person &middot; Real problem &middot; Demoable</h2>' +
      '<p class="stage-body">Mild check, not a gate. If any of these feels wobbly, talk to the facilitator before you build further.</p>' +
      '<div class="hmv-grid">' +
        items.map(function (i) {
          return '<div class="hmv-card">' +
            '<div class="hmv-axis">' + escapeHtml(i.axis) + '</div>' +
            '<div class="hmv-instruction">' + escapeHtml(i.instruction) + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
  }

  function renderPrompt(session, prompt, promptIdx) {
    const key = session.id + ':prompt:' + promptIdx;
    return '<div class="eyebrow">A prompt to copy</div>' +
      '<h2 class="section-title">' + escapeHtml(prompt.title) + '</h2>' +
      '<p class="stage-body">Copy this. Paste it into Claude. Then customise where you see square brackets.</p>' +
      '<div class="prompt-wrap">' +
        '<div class="prompt-header">' +
          '<span>Prompt</span>' +
          '<button class="copy-btn" id="copy-btn-' + escapeHtml(String(promptIdx)) + '" data-prompt="' + encodeURIComponent(prompt.content) + '">Copy</button>' +
        '</div>' +
        '<div class="prompt-box">' + escapeHtml(prompt.content) + '</div>' +
      '</div>';
  }

  function renderBuild(session) {
    const items = session.build || [];
    const allChecked = items.every(function (_, i) {
      return loadCheck(session.id + ':build:' + i);
    });
    return '<div class="eyebrow">What to do this session</div>' +
      '<h2 class="section-title">Build steps</h2>' +
      '<ul class="build-list">' +
        items.map(function (item, idx) {
          const checked = loadCheck(session.id + ':build:' + idx);
          return '<li class="build-item ' + (checked ? 'checked' : '') + '" data-key="' + session.id + ':build:' + idx + '">' +
            '<div class="build-checkbox"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2"><polyline points="2.5 7 6 10.5 11.5 4"/></svg></div>' +
            '<div class="build-content">' +
              '<div class="build-title">' + escapeHtml(item.title) + '</div>' +
              '<div class="build-instructions">' + escapeHtml(item.instructions) + '</div>' +
            '</div>' +
          '</li>';
        }).join('') +
      '</ul>' +
      '<div class="all-checked-banner ' + (allChecked ? 'show' : '') + '" id="all-checked">' +
        '<p class="stage-body" style="margin: 0 0 16px;">All steps marked done. Move when the room is ready.</p>' +
        '<button class="btn btn-primary" id="advance-btn">Move to next →</button>' +
      '</div>';
  }

  function renderTestOutput(session) {
    const items = session.test_output || [];
    return '<div class="eyebrow">Test what you made</div>' +
      '<h2 class="section-title">Does it work for your person?</h2>' +
      '<div class="hmv-grid">' +
        items.map(function (i) {
          return '<div class="hmv-card">' +
            '<div class="hmv-axis">Check</div>' +
            '<div class="question-card-title" style="color:var(--text); font-size:16px; margin-bottom:8px;">' + escapeHtml(i.title) + '</div>' +
            '<div class="hmv-instruction">' + escapeHtml(i.instruction) + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
  }

  function renderOutputCapture(session) {
    const oc = session.output_capture;
    if (!oc) return '';
    return '<div class="output-capture-card">' +
      '<div class="output-capture-eyebrow">Save it to your portfolio</div>' +
      '<div class="output-capture-label">' + escapeHtml(oc.label) + '</div>' +
      '<div class="output-capture-instruction">' + escapeHtml(oc.instruction) + '</div>' +
    '</div>';
  }

  function renderSessionEnd(session) {
    const sessions = DATA.sessions || [];
    const idx = sessions.findIndex(function (s) { return s.id === session.id; });
    const isLast = idx === sessions.length - 1;
    return '<div class="eyebrow">End of session</div>' +
      '<h2 class="section-title">' + escapeHtml(session.title) + ' is done.</h2>' +
      '<p class="stage-body">' + (isLast ? 'You finished First Build. Look around the room.' : 'Stretch. Refill water. Then the next session.') + '</p>' +
      (!isLast ? '<div class="button-row" style="margin-top: 48px;"><button class="btn btn-ghost" id="continue-btn">' + (session.break_after ? 'Begin break' : 'Next session') + ' →</button></div>' : '');
  }

  function renderBreak(session) {
    const minutes = session.break_duration_minutes || 15;
    return '<div class="break-screen">' +
      '<div class="break-eyebrow">Break</div>' +
      '<h1 class="phase-break-title">Pause.</h1>' +
      '<div class="break-timer" id="break-display">' + String(minutes).padStart(2, '0') + ':00</div>' +
      '<p class="break-note">Water. Bathroom. Stretch. Come back at the timer.</p>' +
      '<div class="button-row" style="justify-content:center; margin-top: 32px;"><button class="btn btn-primary" id="skip-break-btn">Resume now →</button></div>' +
    '</div>';
  }

  // ============================================================
  // RENDER DISPATCHER
  // ============================================================
  function render() {
    const screen = SCREENS[currentScreenIdx];
    if (!screen) return;

    let html = '';
    switch (screen.type) {
      case 'welcome': html = renderWelcome(); break;
      case 'housekeeping': html = renderHousekeeping(); break;
      case 'artifacts': html = renderArtifacts(); break;
      case 'journey-map': html = renderJourneyMap(); break;
      case 'phase-break': html = renderPhaseBreak(screen.to); break;
      case 'session-start': html = renderSessionStart(screen.session); break;
      case 'stage-text': html = renderStageText(screen.session); break;
      case 'questions': html = renderQuestions(screen.session); break;
      case 'hmv': html = renderHmv(screen.session); break;
      case 'prompt': html = renderPrompt(screen.session, screen.prompt, screen.promptIdx); break;
      case 'build': html = renderBuild(screen.session); break;
      case 'test-output': html = renderTestOutput(screen.session); break;
      case 'output-capture': html = renderOutputCapture(screen.session); break;
      case 'session-end': html = renderSessionEnd(screen.session); break;
      case 'break': html = renderBreak(screen.session); break;
    }

    $('#stage-inner').innerHTML = html;
    $('#stage').scrollTop = 0;
    updateTopbar();
    updateProgress();
    wireScreenEvents();
    startSessionTimerIfNeeded();
  }

  // ============================================================
  // TOPBAR
  // ============================================================
  function updateTopbar() {
    const screen = SCREENS[currentScreenIdx];
    const eyebrow = $('#topbar-eyebrow');
    const title = $('#topbar-title');
    const section = $('#topbar-section');

    if (!screen.session) {
      eyebrow.textContent = 'First Build';
      const titles = {
        'welcome': 'Welcome',
        'housekeeping': 'Portfolio URL',
        'artifacts': 'What you make',
        'journey-map': 'The journey',
        'phase-break': screen.to === 'office_hours' ? 'Office hours' : 'Demo Day'
      };
      title.textContent = titles[screen.type] || '';
      section.textContent = '';
    } else {
      eyebrow.textContent = 'Session ' + screen.session.number;
      title.textContent = screen.session.title;
      const labels = {
        'session-start': 'Start',
        'stage-text': 'Set the stage',
        'questions': 'Questions',
        'hmv': 'The three checks',
        'prompt': 'Prompt',
        'build': 'Build',
        'test-output': 'Test',
        'output-capture': 'Capture',
        'session-end': 'End',
        'break': 'Break'
      };
      section.textContent = labels[screen.type] || '';
    }
  }

  function updateProgress() {
    const screen = SCREENS[currentScreenIdx];
    if (!screen.session) {
      $('#progress').innerHTML = '';
      return;
    }
    const sessionId = screen.session.id;
    const sessionScreens = SCREENS.filter(function (s) { return s.session && s.session.id === sessionId; });
    const indices = SCREENS.map(function (s, i) { return (s.session && s.session.id === sessionId) ? i : -1; }).filter(function (i) { return i !== -1; });
    const localIdx = indices.indexOf(currentScreenIdx);
    const total = sessionScreens.length;
    let dots = '';
    for (let i = 0; i < total; i++) {
      const cls = i < localIdx ? 'done' : (i === localIdx ? 'active' : '');
      dots += '<div class="progress-dot ' + cls + '"></div>';
    }
    $('#progress').innerHTML = dots;
  }

  // ============================================================
  // TIMER
  // ============================================================
  function startSessionTimerIfNeeded() {
    const screen = SCREENS[currentScreenIdx];
    if (screen.type === 'session-start' && screen.session) {
      timerSessionMinutes = screen.session.duration_minutes || 0;
      timerElapsed = 0;
      timerPaused = true;
      updateTimerDisplay();
    } else if (screen.type === 'break') {
      // break is its own countdown handled inline by wireBreakTimer
    }
  }
  function startTimer() {
    if (timerInterval) return;
    timerPaused = false;
    timerStart = Date.now() - timerElapsed * 1000;
    timerInterval = setInterval(function () {
      timerElapsed = Math.floor((Date.now() - timerStart) / 1000);
      updateTimerDisplay();
    }, 500);
  }
  function pauseTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    timerPaused = true;
    updateTimerDisplay();
  }
  function toggleTimer() {
    if (timerPaused) startTimer(); else pauseTimer();
  }
  function updateTimerDisplay() {
    const el = $('#timer');
    if (!el) return;
    const mins = Math.floor(timerElapsed / 60);
    const secs = timerElapsed % 60;
    el.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    el.classList.toggle('paused', timerPaused);
    el.classList.toggle('overrun', timerSessionMinutes > 0 && mins >= timerSessionMinutes);
  }

  // ============================================================
  // JUMP MENU
  // ============================================================
  function buildJumpMenu() {
    const menu = $('#jump-menu');
    let html = '';
    const grouped = {};
    SCREENS.forEach(function (s, i) {
      let group = 'Intro';
      if (s.session) group = 'Session ' + s.session.number + ' · ' + s.session.title;
      if (s.type === 'phase-break') group = '— Phase break —';
      if (!grouped[group]) grouped[group] = [];
      grouped[group].push({ s: s, i: i });
    });
    Object.keys(grouped).forEach(function (g) {
      html += '<div class="jump-group">' + escapeHtml(g) + '</div>';
      grouped[g].forEach(function (entry) {
        const cls = entry.i === currentScreenIdx ? 'jump-item current' : 'jump-item';
        const label = entry.s.type.replace(/-/g, ' ').replace(/^./, function (c) { return c.toUpperCase(); });
        html += '<button class="' + cls + '" data-idx="' + entry.i + '"><span class="jump-id">' + String(entry.i).padStart(2, '0') + '</span>' + escapeHtml(label) + '</button>';
      });
    });
    menu.innerHTML = html;
    menu.querySelectorAll('.jump-item').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = parseInt(btn.getAttribute('data-idx'), 10);
        currentScreenIdx = idx;
        $('#jump-menu').classList.remove('open');
        render();
      });
    });
  }
  function toggleJumpMenu() {
    buildJumpMenu();
    $('#jump-menu').classList.toggle('open');
  }

  // ============================================================
  // NAV
  // ============================================================
  function go(delta) {
    const newIdx = currentScreenIdx + delta;
    if (newIdx < 0 || newIdx >= SCREENS.length) return;
    currentScreenIdx = newIdx;
    render();
  }

  // ============================================================
  // WIRE SCREEN EVENTS
  // ============================================================
  function wireScreenEvents() {
    const startBtn = $('#start-btn');
    if (startBtn) startBtn.addEventListener('click', function () { go(1); });
    const beginBtn = $('#begin-btn');
    if (beginBtn) beginBtn.addEventListener('click', function () { startTimer(); go(1); });
    const continueBtn = $('#continue-btn');
    if (continueBtn) continueBtn.addEventListener('click', function () { go(1); });
    const advanceBtn = $('#advance-btn');
    if (advanceBtn) advanceBtn.addEventListener('click', function () { go(1); });

    // Copy buttons
    document.querySelectorAll('.copy-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const text = decodeURIComponent(btn.getAttribute('data-prompt') || '');
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        });
      });
    });

    // Build checklist
    document.querySelectorAll('.build-item').forEach(function (item) {
      item.addEventListener('click', function () {
        const key = item.getAttribute('data-key');
        const isChecked = item.classList.toggle('checked');
        saveCheck(key, isChecked);
        // refresh all-checked banner
        const allItems = document.querySelectorAll('.build-item');
        const all = Array.from(allItems).every(function (i) { return i.classList.contains('checked'); });
        const banner = $('#all-checked');
        if (banner) banner.classList.toggle('show', all);
      });
    });

    // Break timer
    const breakDisplay = $('#break-display');
    if (breakDisplay) {
      const screen = SCREENS[currentScreenIdx];
      let remaining = (screen.session.break_duration_minutes || 15) * 60;
      const tick = setInterval(function () {
        remaining--;
        if (remaining < 0) { clearInterval(tick); breakDisplay.textContent = '00:00'; return; }
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        breakDisplay.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }, 1000);
      const skipBtn = $('#skip-break-btn');
      if (skipBtn) skipBtn.addEventListener('click', function () { clearInterval(tick); go(1); });
    }
  }

  // ============================================================
  // KEYBOARD
  // ============================================================
  function onKey(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
    else if (e.key.toLowerCase() === 't') { toggleTimer(); }
    else if (e.key.toLowerCase() === 'j') { toggleJumpMenu(); }
  }

  // ============================================================
  // BOOT
  // ============================================================
  async function boot() {
    const ok = await loadSessions();
    if (!ok) return;
    buildScreens();
    currentScreenIdx = 0;
    render();
    $('#prev-btn').addEventListener('click', function () { go(-1); });
    $('#next-btn').addEventListener('click', function () { go(1); });
    $('#timer').addEventListener('click', toggleTimer);
    $('#jump-btn').addEventListener('click', toggleJumpMenu);
    document.addEventListener('keydown', onKey);
    // Click outside jump menu closes it
    document.addEventListener('click', function (e) {
      if (!$('#jump-wrap').contains(e.target)) {
        $('#jump-menu').classList.remove('open');
      }
    });
  }

  // ============================================================
  // INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function () {
    $('#login-form').addEventListener('submit', handleLogin);
    if (isLoggedIn()) {
      $('#login-overlay').classList.add('hidden');
      $('#topbar').classList.remove('hidden');
      $('#bottombar').classList.remove('hidden');
      boot();
    }
  });

})();
</script>

</body>
</html>
