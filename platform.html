<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Just Build  /  Facilitator Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Inter:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  /* ========================================
     Just Build  /  Facilitator Platform
     Dark mode. Optimised for projection.
     ======================================== */

  :root {
    --bg:            #0A0A0A;
    --bg-elev-1:    #141414;
    --bg-elev-2:    #1C1C1C;
    --line:          rgba(255,255,255,0.08);
    --line-strong:   rgba(255,255,255,0.16);
    --text:          #FFFFFF;
    --text-soft:     #C8C8C8;
    --text-muted:    #8A8A8A;
    --text-faint:    #5A5A5A;
    --accent:        #C17D2A;
    --accent-soft:   rgba(193, 125, 42, 0.18);
    --accent-glow:   rgba(193, 125, 42, 0.35);
    --warning:       #E8B53A;
    --danger:        #D7553A;
    --serif:         'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --sans:          'Inter', system-ui, -apple-system, sans-serif;
    --mono:          'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ----- Top bar ----- */
  .topbar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    z-index: 5;
  }
  .topbar.hidden { display: none; }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .topbar-logo {
    width: 30px;
    height: 30px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .topbar-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .topbar-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .topbar-section {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .topbar-center {
    display: flex;
    justify-content: center;
  }

  .timer {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    padding: 6px 18px;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease;
    min-width: 130px;
    text-align: center;
  }
  .timer:hover { border-color: var(--accent); }
  .timer.paused { color: var(--text-muted); border-style: dashed; }
  .timer.warning { color: var(--warning); border-color: rgba(232, 181, 58, 0.4); }
  .timer.danger { color: var(--danger); border-color: rgba(215, 85, 58, 0.5); }
  .timer.expired { animation: pulse 2s ease-in-out infinite; color: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  .topbar-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .progress {
    display: flex;
    gap: 4px;
  }
  .progress-dot {
    width: 18px;
    height: 3px;
    background: var(--line-strong);
    border-radius: 1px;
    transition: background 0.3s ease;
  }
  .progress-dot.done { background: var(--text-faint); }
  .progress-dot.active { background: var(--accent); }

  /* ----- Stage / main area ----- */
  .stage {
    flex: 1 1 auto;
    display: flex;
    padding: 56px 80px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .screen {
    width: 100%;
    max-width: 1100px;
    margin: auto;
    animation: fadeUp 0.42s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 22px;
  }

  /* ----- Welcome / session-start / session-end ----- */
  .hero {
    text-align: center;
    padding: 24px 0;
  }
  .hero-logo {
    display: block;
    width: 120px;
    height: auto;
    margin: 0 auto 32px;
    opacity: 0.98;
  }
  .hero-eyebrow {
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    font-weight: 500;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(64px, 9vw, 132px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .hero-title.brand {
    color: var(--accent);
    font-weight: 400;
  }
  .hero-sub {
    font-family: var(--serif);
    font-size: clamp(20px, 2.4vw, 32px);
    color: var(--text-soft);
    font-style: italic;
    font-weight: 300;
    letter-spacing: -0.005em;
    margin-bottom: 12px;
  }
  .hero-meta {
    color: var(--text-muted);
    font-size: 15px;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }
  .hero-rule {
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 40px auto;
    border: none;
  }
  .hero-rule.thin { width: 40px; opacity: 0.6; }

  .button-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  /* ----- Stage (set the stage) ----- */
  .stage-text {
    font-family: var(--serif);
    font-size: clamp(22px, 2.2vw, 30px);
    line-height: 1.5;
    color: var(--text);
    font-weight: 300;
    letter-spacing: -0.005em;
    max-width: 56ch;
  }
  .stage-text p {
    margin: 0 0 1.1em 0;
  }
  .stage-text p:last-child {
    margin-bottom: 0;
  }
  .facilitator-note {
    margin-top: 40px;
    padding-top: 22px;
    border-top: 1px dashed var(--line);
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
    letter-spacing: 0.01em;
    max-width: 56ch;
  }

  /* ----- Question ----- */
  .question-title {
    font-family: var(--serif);
    font-size: clamp(40px, 5.5vw, 76px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .question-body {
    font-size: clamp(18px, 1.6vw, 22px);
    color: var(--text-soft);
    line-height: 1.6;
    max-width: 56ch;
    margin-bottom: 28px;
  }

  /* ----- HMV ----- */
  .hmv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 32px;
  }
  .hmv-panel {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-top: 2px solid var(--accent);
    padding: 28px 24px;
    border-radius: 2px;
  }
  .hmv-name {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .hmv-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .hmv-list li {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.55;
    padding-left: 18px;
    position: relative;
  }
  .hmv-list li::before {
    content: "/";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 500;
  }
  @media (max-width: 1000px) {
    .hmv-grid { grid-template-columns: 1fr; gap: 16px; }
  }

  /* ----- Prompt ----- */
  .prompt-title {
    font-family: var(--serif);
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: 400;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }
  .prompt-tool {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-soft);
  }
  .prompt-tool::before {
    content: "USE";
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-weight: 600;
    padding-right: 10px;
    border-right: 1px solid var(--accent-line, rgba(193,125,42,0.35));
  }
  .prompt-tool strong {
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
  }
  .prompt-box {
    background: #050505;
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 28px 32px;
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-soft);
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 2px;
    margin-bottom: 18px;
    max-height: 48vh;
    overflow-y: auto;
  }
  .prompt-box::-webkit-scrollbar { width: 8px; }
  .prompt-box::-webkit-scrollbar-track { background: transparent; }
  .prompt-box::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    padding: 14px 28px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s ease;
  }
  .copy-btn:hover { background: #D08A33; transform: translateY(-1px); }
  .copy-btn.copied { background: #2C8A4F; pointer-events: none; }

  /* ----- Build ----- */
  .build-list {
    list-style: none;
    counter-reset: build;
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-bottom: 32px;
  }
  .build-item {
    counter-increment: build;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }
  .build-item:last-child { border-bottom: none; padding-bottom: 0; }
  .build-item::before {
    content: counter(build, decimal-leading-zero);
    font-family: var(--serif);
    font-size: 32px;
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
    padding-top: 4px;
  }
  .build-item h3 {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .build-item p {
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1.6;
  }

  /* ----- Test Output ----- */
  .test-intro {
    color: var(--text-soft);
    font-size: 17px;
    margin-bottom: 28px;
  }
  .test-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 32px;
  }
  .test-item {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 18px 22px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .test-item:hover { border-color: var(--line-strong); }
  .test-item.checked {
    background: rgba(193, 125, 42, 0.08);
    border-color: var(--accent);
  }
  .checkbox {
    flex: 0 0 24px;
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--text-muted);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.2s ease;
  }
  .test-item.checked .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .test-item.checked .checkbox svg { opacity: 1; }
  .test-content h4 {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text);
  }
  .test-content p {
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.55;
  }

  .all-checked-banner {
    display: none;
    text-align: center;
    padding: 28px;
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 2px;
    animation: fadeUp 0.4s ease;
  }
  .all-checked-banner.show { display: block; }

  /* ----- Break ----- */
  .break {
    text-align: center;
  }
  .break-timer {
    font-family: var(--mono);
    font-size: clamp(120px, 22vw, 280px);
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
  }
  .break-label {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    color: var(--text-soft);
    font-style: italic;
  }
  .break-next {
    color: var(--text-muted);
    margin-top: 16px;
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .break-over {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 96px);
    font-weight: 400;
  }

  /* ----- Buttons ----- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 36px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    border: none;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #FFFFFF;
  }
  .btn-primary:hover { background: #D08A33; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ----- Bottom bar ----- */
  .bottombar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    padding: 16px 40px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .bottombar.hidden { display: none; }

  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line-strong);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-prev { justify-self: start; }
  .nav-next { justify-self: end; }

  .hmv-reminder {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--serif);
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
  }
  .hmv-reminder .letter {
    color: var(--accent);
    font-weight: 500;
    font-style: normal;
    font-family: var(--sans);
    letter-spacing: 0.32em;
  }
  .hmv-reminder .full {
    color: var(--text-muted);
    transition: opacity 0.2s ease;
  }
  .hmv-reminder.collapsed .full { display: none; }

  .keyboard-hint {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    margin-top: 4px;
    text-align: center;
  }
  .keyboard-hint kbd {
    font-family: var(--mono);
    background: var(--bg-elev-1);
    padding: 1px 6px;
    border-radius: 2px;
    border: 1px solid var(--line);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ----- Loading / error ----- */
  .loading, .error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }
  .loading p, .error p {
    color: var(--text-muted);
    font-style: italic;
    font-family: var(--serif);
    font-size: 18px;
  }
  .error h2 {
    font-family: var(--serif);
    color: var(--danger);
    margin-bottom: 16px;
    font-weight: 400;
    font-size: 28px;
  }
  .error code {
    font-family: var(--mono);
    background: var(--bg-elev-1);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 13px;
    color: var(--accent);
  }

  /* ----- Responsive ----- */
  @media (max-width: 800px) {
    .topbar, .bottombar { padding: 14px 20px; }
    .stage { padding: 32px 24px; }
    .topbar { grid-template-columns: 1fr auto; gap: 16px; }
    .topbar-right { display: none; }
    .keyboard-hint { display: none; }
  }

  /* Subtle grain to add atmosphere on projection */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 1;
  }

  /* ========================================
     Login Gate
     ======================================== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-overlay.hidden { display: none; }

  .login-card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .login-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .login-title {
    font-family: var(--font-display);
    font-size: 56px;
    line-height: 0.95;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }
  .login-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 160ms ease, background 160ms ease;
  }
  .login-input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255,255,255,0.06);
  }
  .login-input::placeholder { color: rgba(255,255,255,0.3); }

  .login-logo {
    display: block;
    width: 96px;
    height: auto;
    margin: 0 auto 24px;
    opacity: 0.95;
  }

  .login-submit {
    margin-top: 8px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 14px 20px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 160ms ease, transform 160ms ease;
  }
  .login-submit:hover { opacity: 0.9; }
  .login-submit:active { transform: scale(0.98); }
  .login-submit:disabled { opacity: 0.5; cursor: wait; }

  .login-error {
    color: #E07B6E;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
    opacity: 0;
    transition: opacity 160ms ease;
  }
  .login-error.show { opacity: 1; }

  @keyframes login-shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

<body>

    </div>

<script>
/* ============================================
   Just Build  /  Facilitator Platform
   ============================================ */

let WORKSHOP = null;          // sessions.json content
let SESSIONS = [];            // sessions array
let SCREENS = [];             // flat array of all screens with metadata

let currentScreenIdx = 0;
let testsChecked = {};        // { sessionId: [bool, bool, ...] }
let hmvCollapsed = false;

let timer = {
  totalSeconds: 0,
  remainingSeconds: 0,
  running: false,
  paused: false,
  intervalId: null,
  sessionId: null,
};

let breakTimer = {
  remainingSeconds: 0,
  intervalId: null,
  finished: false,
};

const $ = (sel) => document.querySelector(sel);
const fmt = (s) => {
  const sign = s < 0 ? "-" : "";
  s = Math.abs(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${sign}${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
};

/* ----- Load sessions.json ----- */
async function loadSessions() {
  try {
    const res = await fetch("./sessions.json", { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    WORKSHOP = data.workshop;
    SESSIONS = data.sessions;
    buildScreenSequence();
    renderCurrent();
  } catch (err) {
    $("#stage").innerHTML = `
      <div class="error">
        <h2>Could not load sessions.json</h2>
        <p>Make sure <code>sessions.json</code> sits next to <code>platform.html</code>.</p>
        <p style="margin-top:16px; font-size:14px;">If you opened this file directly with a double-click, your browser blocks local fetches. Run a local server with <code>python3 -m http.server</code> in the same folder, then open <code>http://localhost:8000/platform.html</code>.</p>
        <p style="margin-top:24px; opacity:0.5; font-size:12px;">${err.message}</p>
      </div>`;
  }
}

/* ----- Build the flat screen sequence ----- */
function buildScreenSequence() {
  SCREENS = [];

  // Welcome
  SCREENS.push({ type: "welcome" });
  SCREENS.push({ type: "two-doors" });
  SCREENS.push({ type: "journey-map" });
  SCREENS.push({ type: "tools-landscape" });

  SESSIONS.forEach((session, idx) => {
    SCREENS.push({ type: "session-start", session });
    SCREENS.push({ type: "stage", session });

    (session.questions || []).forEach((q, qIdx) => {
      SCREENS.push({
        type: "question",
        session,
        question: q,
        questionIndex: qIdx,
        questionTotal: session.questions.length,
      });
    });

    if (session.hmv && session.hmv.length) {
      SCREENS.push({ type: "hmv", session });
    }

    (session.prompts || []).forEach((p, pIdx) => {
      SCREENS.push({
        type: "prompt",
        session,
        prompt: p,
        promptIndex: pIdx,
        promptTotal: session.prompts.length,
      });
    });

    if (session.build && session.build.length) {
      SCREENS.push({ type: "build", session });
    }

    if (session.test_output && session.test_output.length) {
      SCREENS.push({ type: "test-output", session });
    }

    SCREENS.push({ type: "session-end", session });

    if (session.break_after) {
      SCREENS.push({
        type: "break",
        afterSession: session,
        nextSession: SESSIONS[idx + 1] || null,
      });
    }
  });

  // Workshop complete (Day 2 close)
  SCREENS.push({ type: "workshop-complete" });
}

/* ----- Navigation ----- */
function next() {
  if (currentScreenIdx < SCREENS.length - 1) {
    currentScreenIdx++;
    renderCurrent();
  }
}
function prev() {
  if (currentScreenIdx > 0) {
    currentScreenIdx--;
    renderCurrent();
  }
}

/* ----- Render current screen ----- */
function renderCurrent() {
  const screen = SCREENS[currentScreenIdx];
  const stage = $("#stage");
  const topbar = $("#topbar");
  const bottombar = $("#bottombar");

  // Stop break timer if leaving break
  if (screen.type !== "break" && breakTimer.intervalId) {
    clearInterval(breakTimer.intervalId);
    breakTimer.intervalId = null;
  }

  // Top/bottom bars hidden on welcome-layer screens, break, and complete
  const isWelcomeLayer = screen.type === "welcome" || screen.type === "two-doors"
                       || screen.type === "journey-map" || screen.type === "tools-landscape";
  const noChrome = isWelcomeLayer || screen.type === "workshop-complete" || screen.type === "break";
  topbar.classList.toggle("hidden", noChrome);
  bottombar.classList.toggle("hidden", screen.type === "welcome");

  // Update topbar context
  if (screen.session) {
    $("#topbar-eyebrow").textContent = `Session ${screen.session.number}`;
    $("#topbar-title").textContent = screen.session.title;
    $("#topbar-section").textContent = sectionLabel(screen);
    updateProgress();
  }

  // Reset/start timer for sessions
  if (screen.session && screen.type === "session-start") {
    setupTimer(screen.session);
  } else if (isWelcomeLayer || screen.type === "workshop-complete") {
    stopTimer();
  }

  // Render content
  let html = "";
  switch (screen.type) {
    case "welcome":            html = renderWelcome(); break;
    case "two-doors":          html = renderTwoDoors(); break;
    case "journey-map":        html = renderJourneyMap(); break;
    case "tools-landscape":    html = renderToolsLandscape(); break;
    case "session-start":      html = renderSessionStart(screen.session); break;
    case "stage":              html = renderStage(screen.session); break;
    case "question":           html = renderQuestion(screen); break;
    case "hmv":                html = renderHMV(screen.session); break;
    case "prompt":             html = renderPrompt(screen); break;
    case "build":              html = renderBuild(screen.session); break;
    case "test-output":        html = renderTestOutput(screen.session); break;
    case "session-end":        html = renderSessionEnd(screen); break;
    case "break":              html = renderBreak(screen); break;
    case "workshop-complete":  html = renderWorkshopComplete(); break;
  }
  stage.innerHTML = `<div class="screen">${html}</div>`;

  // Wire up dynamic handlers per screen
  attachHandlers(screen);

  // Prev/next state
  $("#prev-btn").disabled = currentScreenIdx === 0;
  $("#next-btn").disabled = currentScreenIdx >= SCREENS.length - 1;
}

function sectionLabel(screen) {
  switch (screen.type) {
    case "session-start":  return "Begin";
    case "stage":          return "Set the Stage";
    case "question":       return `Question ${screen.questionIndex + 1} of ${screen.questionTotal}`;
    case "hmv":            return "HMV Techniques";
    case "prompt":         return screen.promptTotal > 1
                            ? `Prompt ${screen.promptIndex + 1} of ${screen.promptTotal}`
                            : "The Prompt";
    case "build":          return "Build";
    case "test-output":    return "Test Output";
    case "session-end":    return "Complete";
    default:               return "";
  }
}

function updateProgress() {
  const screen = SCREENS[currentScreenIdx];
  if (!screen.session) return;
  const sessionId = screen.session.id;
  const sessionScreens = SCREENS.filter(s => s.session && s.session.id === sessionId);
  const indices = SCREENS
    .map((s, i) => (s.session && s.session.id === sessionId) ? i : -1)
    .filter(i => i !== -1);
  const localIdx = indices.indexOf(currentScreenIdx);
  const total = sessionScreens.length;

  let dotsHtml = "";
  for (let i = 0; i < total; i++) {
    const cls = i < localIdx ? "done" : (i === localIdx ? "active" : "");
    dotsHtml += `<div class="progress-dot ${cls}"></div>`;
  }
  $("#progress").innerHTML = dotsHtml;
}

/* ============================================
   SCREEN RENDERERS
   ============================================ */

function renderWelcome() {
  return `
    <div class="hero">
      <img class="hero-logo" src="logo.png" alt="Orange Caterpillar" onerror="this.style.display='none'">
      <div class="hero-eyebrow">Orange Caterpillar</div>
      <h1 class="hero-title brand">JUST<br>BUILD</h1>
      <hr class="hero-rule">
      <p class="hero-sub">${WORKSHOP.subtitle || "AI Venture Building Workshop"}</p>
      <p class="hero-meta">Two days &middot; Four weeks &middot; One portfolio</p>
      <div class="button-row" style="margin-top: 56px;">
        <button class="btn btn-primary" id="start-btn">Begin →</button>
      </div>
    </div>
  `;
}

function renderTwoDoors() {
  return `
    <div class="wl-screen">
      <div class="wl-eyebrow">What you walk out with</div>
      <h1 class="wl-title">Two doors. One degree.</h1>
      <p class="wl-sub">Your degree opens one set of options. By Sunday afternoon, this workshop opens two more. The first is automatic. The second is yours if you want it.</p>

      <div class="doors-grid">
        <div class="door door-primary">
          <div class="door-tag">Door One <span class="door-dot">&middot;</span> Primary <span class="door-dot">&middot;</span> Job-ready</div>
          <h2 class="door-title">A working portfolio.</h2>
          <p class="door-lede">You walk in carrying proof, not promises. The recruiter who asks "show me what you can do with AI" has an answer waiting.</p>
          <ul class="door-list">
            <li>Six live builds in one portfolio.</li>
            <li>A 90-second demo you can run from your phone.</li>

          <ul class="door-list">
            <li>The option to keep building your venture.</li>

function renderJourneyMap() {
  const day1 = [
    { num: "01", title: "Ideation", note: "The problem you solve" },
    { num: "02", title: "Design", note: "The system prompt that runs it" },
    { num: "03", title: "AI App", note: "Live URL by 14:30" },
    { num: "04", title: "Website", note: "Marketing site by 15:45" },
    { num: "05", title: "Chatbot", note: "Embedded on your site" },
  ];
  const day2 = [
    { num: "06", title: "Audio", note: "60 seconds of your voice" },
    { num: "07", title: "Video", note: "90 seconds on LinkedIn" },
    { num: "08", title: "Agent", note: "Automation that runs alone" },
    { num: "09", title: "Validation", note: "One real conversation" },
    { num: "10", title: "Demo Day", note: "Stand and ship" },
  ];
  const renderCol = (label, items) => `

          <li class="journey-item">

              <span class="journey-title">${s.title}</span>
              <span class="journey-note">${s.note}</span>
            </span>
          </li>
        `).join("")}
      </ul>
    </div>
  `;
  return `
    <div class="wl-screen">
      <div class="wl-eyebrow">What you're about to build</div>
      <h1 class="wl-title">Six builds. One portfolio.</h1>
      <p class="wl-sub">Each session ships one piece. By Sunday afternoon, the pieces become a single thing you can show anyone.</p>

      <div class="journey-grid">
        ${renderCol("Day 1", day1)}

      <div class="journey-outcome">
        <div class="journey-arrow">↓</div>
        <p class="journey-outcome-label">Your portfolio</p>
        <p class="journey-outcome-url">justbuild.orangecaterpillar.com/your-college/c1/your-name</p>

  `;
}

function renderToolsLandscape() {
  // ★ marks tools we use this weekend
  const categories = [
    {
      name: "Chat & Reasoning",

      tools: [
        { name: "Claude", pick: true },

    },
    {
      name: "Audio & Video",
      use: "Giving your product a voice and showing it in action.",
      tools: [

        { name: "Loom", pick: true },
        { name: "Suno", pick: false },
        { name: "Runway", pick: false },
        { name: "HeyGen", pick: false },
      ],
    },
    {

function renderSessionStart(s) {
  const dayLabel = `Day ${s.day} &middot; ${s.start_time} to ${s.end_time} &middot; ${s.duration_minutes} minutes`;
  return `
    <div class="hero">

      <h1 class="hero-title">${escapeHtml(s.title)}</h1>

      <p class="hero-meta">${dayLabel}</p>

        <button class="btn btn-primary" id="begin-btn">Begin Session →</button>

}

function renderStage(s) {
  // Split on double-newline so paragraph breaks in set_the_stage render as <p>s
  const paragraphs = (s.set_the_stage || "")
    .split(/\n\n+/)
    .map(p => `<p>${escapeHtml(p.trim())}</p>`)
    .join("");
  return `
    <div class="label">Set the Stage</div>
    <div class="stage-text">${paragraphs}</div>
    <div class="facilitator-note">Read this aloud to the room. Speak slowly. Do not rush the opening.</div>
  `;
}

function renderQuestion(screen) {
  const q = screen.question;

    <div class="label">Question ${screen.questionIndex + 1} of ${screen.questionTotal}</div>
    <h2 class="question-title">${escapeHtml(q.title)}</h2>
    <p class="question-body">${escapeHtml(q.body)}</p>

}

function renderHMV(s) {

    <div class="hmv-panel">
      <div class="hmv-name">${escapeHtml(panel.dimension)}</div>
      <ul class="hmv-list">
        ${panel.techniques.map(t => `<li>${escapeHtml(t)}</li>`).join("")}

  return `
    <div class="label">HMV Techniques</div>

}

function renderPrompt(screen) {
  const p = screen.prompt;
  const counter = screen.promptTotal > 1 ? `Prompt ${screen.promptIndex + 1} of ${screen.promptTotal}` : "The Prompt";
  const toolLine = p.tool ? `<div class="prompt-tool"><strong>${escapeHtml(p.tool)}</strong></div>` : "";
  return `
    <div class="label">${counter}</div>
    <h2 class="prompt-title">${escapeHtml(p.title)}</h2>
    ${toolLine}
    <div class="prompt-box" id="prompt-box">${escapeHtml(p.content)}</div>
    <button class="copy-btn" id="copy-btn" data-prompt="${encodeURIComponent(p.content)}">
      Copy Prompt
    </button>
    ${p.facilitator_instruction ? `<div class="facilitator-note">${escapeHtml(p.facilitator_instruction)}</div>` : ""}

function renderBuild(s) {
  const items = (s.build || []).map(b => `
    <li class="build-item">
      <div>
        <h3>${escapeHtml(b.title)}</h3>
        <p>${escapeHtml(b.instructions)}</p>
      </div>
    </li>
  `).join("");
  return `
    <div class="label">Build</div>
    <ul class="build-list">${items}</ul>
    <div class="facilitator-note">Circulate during this time. Ask at every table. What did the model produce that surprised you? What did you change and why? What does your target user see at each touchpoint?</div>

}

function renderTestOutput(s) {
  const sessionId = s.id;
  if (!testsChecked[sessionId]) {
    testsChecked[sessionId] = (s.test_output || []).map(() => false);
  }
  const items = (s.test_output || []).map((t, i) => {
    const checked = testsChecked[sessionId][i];
    return `
      <li class="test-item ${checked ? "checked" : ""}" data-idx="${i}" data-session="${sessionId}">
        <div class="checkbox">
          <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,8 7,12 13,4"></polyline>
          </svg>
        </div>
        <div class="test-content">
          <h4>${escapeHtml(t.title)}</h4>
          <p>${escapeHtml(t.description)}</p>
        </div>
      </li>
    `;
  }).join("");
  const allChecked = testsChecked[sessionId].every(Boolean);
  const testCount = (s.test_output || []).length;
  const numWord = testCount === 1 ? "One question" : `${testCount} questions`;
  const allWord = testCount === 1 ? "It must" : "All must";
  return `
    <div class="label">Test Output</div>
    <p class="test-intro">${numWord}. ${allWord} be yes before moving to the next session.</p>
    <ul class="test-list">${items}</ul>
    <div class="all-checked-banner ${allChecked ? "show" : ""}" id="all-checked">
      <button class="btn btn-primary" id="advance-btn">Move to next session →</button>
    </div>
  `;
}

function renderSessionEnd(screen) {
  const s = screen.session;
  const isLastSession = SESSIONS.indexOf(s) === SESSIONS.length - 1;
  const breakInfo = s.break_after ? `<p class="hero-meta">${s.break_label || "Break"} &middot; ${s.break_duration_minutes} minutes next</p>` : "";
  return `
    <div class="hero">
      <div class="hero-eyebrow">Complete</div>
      <h1 class="hero-title" style="font-size: clamp(48px, 7vw, 96px);">Session ${String(s.number).padStart(2, "0")}<br><span style="font-style: italic; font-weight: 300;">complete</span></h1>
      <hr class="hero-rule">
      <p class="hero-sub">${escapeHtml(s.title)}</p>
      ${breakInfo}
      ${!isLastSession ? `<div class="button-row" style="margin-top: 48px;"><button class="btn btn-ghost" id="continue-btn">${s.break_after ? "Begin break" : "Next session"} →</button></div>` : ""}
    </div>
  `;
}

function renderBreak(screen) {
  const after = screen.afterSession;
  const next = screen.nextSession;
  const duration = after.break_duration_minutes;
  const label = after.break_label || "Break";
  // Initialise break timer on first render
  if (breakTimer.intervalId === null && !breakTimer.finished) {
    breakTimer.remainingSeconds = duration * 60;
    breakTimer.finished = false;
    startBreakTimer();
  }
  const minsRemaining = Math.floor(breakTimer.remainingSeconds / 60);
  const secsRemaining = breakTimer.remainingSeconds % 60;

  if (breakTimer.finished) {
    return `
      <div class="break">
        <h1 class="break-over">Break over.</h1>
        <p class="break-next" style="margin-top: 32px;">Click anywhere or press Next to continue${next ? ` to <strong style="color: var(--accent);">${escapeHtml(next.title)}</strong>` : ""}.</p>
      </div>
    `;
  }
  return `
    <div class="break">
      <p class="hero-eyebrow" style="margin-bottom: 24px;">${escapeHtml(label)}</p>
      <div class="break-timer" id="break-display">${String(minsRemaining).padStart(2, "0")}:${String(secsRemaining).padStart(2, "0")}</div>
      <p class="break-label">${escapeHtml(label)} time</p>
      ${next ? `<p class="break-next">After the break, then <strong style="color: var(--accent);">${escapeHtml(next.title)}</strong></p>` : ""}
      ${after.break_note ? `<p class="break-next" style="margin-top: 32px; font-style: italic; max-width: 56ch; margin-left: auto; margin-right: auto;">${escapeHtml(after.break_note)}</p>` : ""}
    </div>
  `;
}

/* ============================================
   HANDLERS
   ============================================ */

function attachHandlers(screen) {
  // Welcome
  const startBtn = $("#start-btn");
  if (startBtn) startBtn.onclick = next;

  // Session start
  const beginBtn = $("#begin-btn");
  if (beginBtn) beginBtn.onclick = () => {
    startTimer();
    next();
  };

  // Continue from session-end
  const continueBtn = $("#continue-btn");
  if (continueBtn) continueBtn.onclick = next;

  // Copy prompt
  const copyBtn = $("#copy-btn");
  if (copyBtn) copyBtn.onclick = async () => {
    const text = decodeURIComponent(copyBtn.dataset.prompt);
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied ✓";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = "Copy Prompt";
        copyBtn.classList.remove("copied");
      }, 2000);
    } catch (err) {
      // Fallback: select the prompt box
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents($("#prompt-box"));
      sel.removeAllRanges();
      sel.addRange(range);
      copyBtn.textContent = "Selected. Press Cmd/Ctrl+C";
      setTimeout(() => { copyBtn.textContent = "Copy Prompt"; }, 3000);
    }
  };

  // Test output checkboxes
  document.querySelectorAll(".test-item").forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx, 10);
      const sid = parseInt(el.dataset.session, 10);
      testsChecked[sid][idx] = !testsChecked[sid][idx];
      el.classList.toggle("checked", testsChecked[sid][idx]);
      const allDone = testsChecked[sid].every(Boolean);
      const banner = $("#all-checked");
      if (banner) banner.classList.toggle("show", allDone);
    };
  });
  const advanceBtn = $("#advance-btn");
  if (advanceBtn) advanceBtn.onclick = next;

  // Break. Click anywhere when over.
  if (screen && screen.type === "break" && breakTimer.finished) {
    document.body.onclick = (e) => {
      if (e.target.closest(".bottombar")) return;
      breakTimer.finished = false;
      document.body.onclick = null;
      next();
    };
  } else {
    document.body.onclick = null;
  }
}

/* ============================================
   TIMER
   ============================================ */

function setupTimer(session) {
  stopTimer();
  timer.totalSeconds = session.duration_minutes * 60;
  timer.remainingSeconds = timer.totalSeconds;
  timer.sessionId = session.id;
  timer.running = false;
  timer.paused = false;
  updateTimerDisplay();
}

function startTimer() {
  if (timer.running) return;
  timer.running = true;
  timer.paused = false;
  timer.intervalId = setInterval(tickTimer, 1000);
  updateTimerDisplay();
}

function pauseTimer() {
  if (!timer.running) return;
  timer.paused = !timer.paused;
  updateTimerDisplay();
}

function stopTimer() {
  if (timer.intervalId) clearInterval(timer.intervalId);
  timer.intervalId = null;
  timer.running = false;
  timer.paused = false;
  $("#timer").textContent = "--:--";
  $("#timer").className = "timer";
}

function tickTimer() {
  if (timer.paused) return;
  timer.remainingSeconds--;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = $("#timer");
  if (!timer.running && !timer.totalSeconds) {
    el.textContent = "--:--";
    el.className = "timer";
    return;
  }
  el.textContent = fmt(timer.remainingSeconds);
  el.className = "timer";
  if (timer.paused) el.classList.add("paused");
  if (timer.remainingSeconds <= 0) el.classList.add("expired");
  else if (timer.remainingSeconds <= 5 * 60) el.classList.add("danger");
  else if (timer.remainingSeconds <= 10 * 60) el.classList.add("warning");
}

/* ----- Break timer ----- */
function startBreakTimer() {
  if (breakTimer.intervalId) clearInterval(breakTimer.intervalId);
  breakTimer.intervalId = setInterval(() => {
    breakTimer.remainingSeconds--;
    const display = $("#break-display");
    if (display) {
      const m = Math.floor(breakTimer.remainingSeconds / 60);
      const s = breakTimer.remainingSeconds % 60;
      display.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }
    if (breakTimer.remainingSeconds <= 0) {
      clearInterval(breakTimer.intervalId);
      breakTimer.intervalId = null;
      breakTimer.finished = true;
      playChime();
      renderCurrent();
    }
  }, 1000);
}

function playChime() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const playTone = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "sine";
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    playTone(880, 0, 0.6);    // A5
    playTone(1318, 0.18, 0.7); // E6
    setTimeout(() => ctx.close(), 1500);
  } catch (e) { /* silent */ }
}

/* ============================================
   KEYBOARD SHORTCUTS
   ============================================ */

document.addEventListener("keydown", (e) => {
  // Don't intercept when typing in inputs
  if (e.target.matches("input, textarea, [contenteditable]")) return;

  switch (e.key) {
    case "ArrowRight":
    case " ":
      e.preventDefault();
      next();
      break;
    case "ArrowLeft":
      e.preventDefault();
      prev();
      break;
    case "t": case "T":
      e.preventDefault();
      pauseTimer();
      break;
    case "f": case "F":
      e.preventDefault();
      toggleFullscreen();
      break;
    case "h": case "H":
      e.preventDefault();
      toggleHMV();
      break;
  }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

function toggleHMV() {
  hmvCollapsed = !hmvCollapsed;
  $("#hmv-reminder").classList.toggle("collapsed", hmvCollapsed);
}

$("#hmv-reminder").addEventListener("click", toggleHMV);

/* Timer click to pause/resume */
$("#timer").addEventListener("click", pauseTimer);

/* Prev/Next buttons */
$("#prev-btn").addEventListener("click", prev);
$("#next-btn").addEventListener("click", next);

/* ============================================
   UTILS
   ============================================ */

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* ============================================
   AUTH GATE
   ============================================ */
/*
  Hardcoded credentials are stored as SHA-256 hashes below.
  This is a soft gate. The JS file is publicly readable, so a
  determined visitor can still extract the hashes and brute-force.
  For real security, move to Render-level Basic Auth.

  TO SET CREDENTIALS:
  1. Open a browser console anywhere and run:
       crypto.subtle.digest("SHA-256", new TextEncoder().encode("YOUR_VALUE"))
         .then(b => console.log(Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,"0")).join("")));
  2. Paste the resulting hex string into AUTH_ID_HASH or AUTH_PW_HASH.

  Defaults below are for "admin" / "change-me". REPLACE BEFORE DEPLOY.
*/
const AUTH_ID_HASH = "de83276e6b45237548b7d6c990b6fe6fd55de68a725e9ddeaf35666f7d93c475";
const AUTH_PW_HASH = "f181008ea04c7c3d9734a4b9d87e48df67970972a43641bb0608b0e1e91c6c1b";
const AUTH_SESSION_KEY = "jb-platform-auth";

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function dismissLogin() {
  $("#login-overlay").classList.add("hidden");
  loadSessions();
}

async function tryLogin(id, pw) {
  const [idHash, pwHash] = await Promise.all([sha256Hex(id), sha256Hex(pw)]);
  return idHash === AUTH_ID_HASH && pwHash === AUTH_PW_HASH;
}

function initAuth() {
  // Already authenticated this session?
  try {
    if (sessionStorage.getItem(AUTH_SESSION_KEY) === "1") {
      dismissLogin();
      return;
    }
  } catch (_) { /* sessionStorage may be unavailable; fall through to form */ }

  const form = $("#login-form");
  const errEl = $("#login-error");
  const card = $("#login-card");
  const submit = $("#login-submit");
  const idInput = $("#login-id");
  const pwInput = $("#login-pw");

  // Focus the ID field on load
  setTimeout(() => idInput.focus(), 50);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = idInput.value.trim();
    const pw = pwInput.value;
    if (!id || !pw) return;

    submit.disabled = true;
    errEl.classList.remove("show");

    const ok = await tryLogin(id, pw);
    submit.disabled = false;

    if (ok) {
      try { sessionStorage.setItem(AUTH_SESSION_KEY, "1"); } catch (_) {}
      dismissLogin();
    } else {
      errEl.classList.add("show");
      card.classList.remove("shake");
      // Force reflow so the animation re-triggers
      void card.offsetWidth;
      card.classList.add("shake");
      pwInput.value = "";
      pwInput.focus();
    }
  });
}

initAuth();
