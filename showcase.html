<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Just Build · Showcase</title>
<meta name="description" content="Real products built by Just Build participants. Live URLs. Two days. By Orange Caterpillar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&family=Caveat:wght@600;700&family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&family=Marcellus&family=Mulish:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,500&family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F0E8; --bg-soft:#EDE6D9; --line:rgba(26,26,26,.10); --line-strong:rgba(26,26,26,.20);
    --text:#1A1A1A; --text-soft:#4A4A4A; --text-muted:#888; --accent:#C17D2A;
    --sans:'Inter',system-ui,sans-serif; --serif:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(rgba(26,26,26,.018) 1px,transparent 1px);background-size:3px 3px;z-index:0}
  .container{max-width:1240px;margin:0 auto;padding:0 32px;position:relative;z-index:1}

  .brand-strip{padding:28px 0 0}
  .brand-mark{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:500;text-decoration:none}
  .brand-mark:hover{opacity:.7}

  .hero{padding:56px 0 60px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:0;width:380px;height:340px;border-radius:50%;
    background:radial-gradient(circle at 28% 30%,rgba(255,138,91,.20),transparent 60%),radial-gradient(circle at 72% 55%,rgba(91,140,62,.16),transparent 60%),radial-gradient(circle at 50% 85%,rgba(181,34,59,.13),transparent 60%);
    filter:blur(22px);pointer-events:none;z-index:0}
  .hero>*{position:relative;z-index:1}
  .hero-eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:30px}
  .hero h1{font-family:var(--serif);font-size:clamp(46px,7vw,100px);font-weight:300;line-height:.96;letter-spacing:-.035em;margin-bottom:28px;max-width:18ch}
  .hero h1 em{font-style:italic;color:var(--accent);font-weight:400}
  .hero-sub{font-family:var(--serif);font-size:clamp(19px,2.1vw,27px);color:var(--text-soft);font-weight:300;font-style:italic;max-width:38ch;line-height:1.4}
  .hero-rule{width:56px;height:1px;background:var(--accent);border:none;margin:36px 0 0}

  .filters{display:flex;align-items:center;flex-wrap:wrap;gap:12px;padding:30px 0;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;background:rgba(245,240,232,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .filter-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);margin-right:12px;font-weight:500}
  .filter-btn{padding:8px 18px;background:transparent;color:var(--text-soft);border:1px solid var(--line);font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.04em;cursor:pointer;border-radius:999px;transition:all .18s}
  .filter-btn:hover{border-color:var(--text);color:var(--text)}
  .filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .filter-count{margin-left:auto;font-size:13px;color:var(--text-muted)}

  /* ---------- WALL ---------- */
  .wall{padding:50px 0 96px;display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  @media(max-width:980px){.wall{grid-template-columns:repeat(2,1fr);gap:20px}}
  @media(max-width:640px){.wall{grid-template-columns:1fr;padding:40px 0 64px}}

  /* base card */
  .card{position:relative;overflow:hidden;border-radius:10px;padding:30px 28px 26px;min-height:332px;
    display:flex;flex-direction:column;gap:13px;text-decoration:none;isolation:isolate;
    border:1px solid var(--line);transition:transform .3s cubic-bezier(.2,.7,.3,1),box-shadow .3s;
    animation:cardIn .55s cubic-bezier(.2,.7,.2,1) backwards}
  .card-bg{position:absolute;inset:0;z-index:-2}
  .card-deco{position:absolute;top:20px;right:20px;z-index:1;line-height:0}
  .card-rail{display:none}
  .card:hover{transform:translateY(-6px)}
  .card-top{display:flex;flex-direction:column;gap:5px;padding-right:64px}
  .card-cohort{font-size:10px;letter-spacing:.24em;text-transform:uppercase;font-weight:700}
  .card-kind{font-size:12px;font-weight:700;letter-spacing:.02em}
  .card-name{font-size:38px;line-height:1.02;margin-top:4px}
  .card-participant{font-size:13px;font-weight:500;letter-spacing:.01em}
  .card-description{font-size:14.5px;line-height:1.5;flex-grow:1}
  .card-rule{height:1px;width:40px;margin-top:2px}
  .card-cta{display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
  .card-cta svg{transition:transform .2s}
  .card:hover .card-cta svg{transform:translate(3px,-3px)}
  @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.10s}.card:nth-child(3){animation-delay:.16s}
  .card:nth-child(4){animation-delay:.22s}.card:nth-child(5){animation-delay:.28s}.card:nth-child(6){animation-delay:.34s}
  .card:nth-child(n+7){animation-delay:.4s}

  /* default fallback theme */
  .t-default .card-bg{background:#fff}
  .t-default .card-cohort,.t-default .card-cta{color:var(--accent)}
  .t-default .card-name{font-family:var(--serif);color:var(--text)}
  .t-default .card-kind{color:var(--text-muted)}
  .t-default .card-participant{color:var(--text-muted)}.t-default .card-participant strong{color:var(--text-soft)}
  .t-default .card-description{color:var(--text-soft)}
  .t-default .card-rule{background:var(--accent)}

  /* ---------- PALLU · oxblood + antique gold ---------- */
  .t-pallu{border-color:rgba(232,195,107,.28)}
  .t-pallu .card-bg{background:radial-gradient(120% 80% at 82% -10%,rgba(232,195,107,.18),transparent 58%),linear-gradient(160deg,#5C121E,#3A0B12)}
  .t-pallu::before{content:"";position:absolute;inset:0;z-index:-1;opacity:.11;background-image:radial-gradient(circle,#E8C36B 1.1px,transparent 1.3px);background-size:21px 21px}
  .t-pallu .card-cohort{color:#E8C36B}
  .t-pallu .card-kind{color:#D9A1A8;font-family:'Jost'}
  .t-pallu .card-name{font-family:'Cormorant Garamond';font-weight:600;color:#EBD9A6;font-size:46px;letter-spacing:.01em}
  .t-pallu .card-participant{color:#CF969D;font-family:'Jost'}.t-pallu .card-participant strong{color:#EBD9A6;font-weight:500}
  .t-pallu .card-description{color:#E6CCC4;font-family:'Jost';font-weight:400}
  .t-pallu .card-rule{background:#E8C36B;width:54px;height:2px}
  .t-pallu .card-cta{color:#E8C36B;font-family:'Jost';font-weight:600}
  .t-pallu:hover{box-shadow:0 28px 58px -24px rgba(120,20,32,.85)}

  /* ---------- CRUMBS · after-hours bakery ---------- */
  .t-crumbs{border-color:rgba(224,163,58,.22)}
  .t-crumbs .card-bg{background:radial-gradient(85% 70% at 16% -5%,rgba(231,170,66,.26),transparent 55%),linear-gradient(165deg,#2D1C12,#160C07)}
  .t-crumbs .card-cohort{color:#E8AE45}
  .t-crumbs .card-kind{color:#C49A6B;font-family:'DM Sans'}
  .t-crumbs .card-name{font-family:'DM Serif Display';color:#F6E7CF;font-size:42px}
  .t-crumbs .card-participant{color:#B59777;font-family:'DM Sans'}.t-crumbs .card-participant strong{color:#F2D8A8;font-weight:500}
  .t-crumbs .card-description{color:#D6BD9C;font-family:'DM Sans'}
  .t-crumbs .card-rule{background:#E0A33A;width:46px}
  .t-crumbs .card-cta{color:#EBC982;font-family:'DM Sans';font-weight:700}
  .t-crumbs:hover{box-shadow:0 28px 58px -24px rgba(40,22,10,.95)}
  .t-crumbs .chalk{font-family:'Caveat';font-weight:700;font-size:23px;color:#EBC982;transform:rotate(-7deg);display:inline-block;opacity:.92}

  /* ---------- TROT · sunny meadow ---------- */
  .t-trot{border-color:rgba(255,138,91,.28);border-radius:22px}
  .t-trot .card-bg{background:linear-gradient(165deg,#C2E8F8 0%,#DFF2DD 56%,#FFFDF6 100%)}
  .t-trot .card-cohort{color:#E07A45}
  .t-trot .card-kind{color:#3F7C92;font-family:'Nunito';font-weight:800}
  .t-trot .card-name{font-family:'Fredoka';font-weight:600;color:#2C5468;font-size:44px}
  .t-trot .card-participant{color:#5B7D8A;font-family:'Nunito';font-weight:700}.t-trot .card-participant strong{color:#2C5468}
  .t-trot .card-description{color:#4D6B75;font-family:'Nunito';font-weight:600}
  .t-trot .card-rule{background:#FF8A5B;width:46px;height:3px;border-radius:2px}
  .t-trot .card-cta{color:#E07A45;font-family:'Fredoka';font-weight:600;letter-spacing:.1em}
  .t-trot:hover{box-shadow:0 28px 56px -22px rgba(110,180,205,.75)}

  /* ---------- ZEVAR · blush + gold ---------- */
  .t-zevar{border-color:rgba(201,162,75,.4)}
  .t-zevar .card-bg{background:linear-gradient(170deg,#FDF2F4,#FBE7EB)}
  .t-zevar::before{content:"";position:absolute;inset:9px;z-index:-1;border:1px solid rgba(201,162,75,.5);border-radius:6px}
  .t-zevar .card-cohort{color:#B5223B}
  .t-zevar .card-kind{color:#B0883A;font-family:'Mulish';font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:10.5px}
  .t-zevar .card-name{font-family:'Marcellus';color:#5A2230;font-size:42px}
  .t-zevar .card-participant{color:#9C6B76;font-family:'Mulish'}.t-zevar .card-participant strong{color:#5A2230;font-weight:800}
  .t-zevar .card-description{color:#8A5E69;font-family:'Mulish'}
  .t-zevar .card-rule{background:linear-gradient(90deg,#C9A24B,#B5223B);width:52px;height:2px}
  .t-zevar .card-cta{color:#B5223B;font-family:'Mulish';font-weight:800}
  .t-zevar:hover{box-shadow:0 26px 56px -24px rgba(181,34,59,.42)}

  /* ---------- DAILY DABBA · dashboard rail ---------- */
  .t-daily-dabba{border-color:rgba(43,33,28,.14);padding-left:76px}
  .t-daily-dabba .card-bg{background:#FBF7F0}
  .t-daily-dabba .card-rail{display:flex;position:absolute;left:0;top:0;bottom:0;width:54px;background:linear-gradient(180deg,#312419,#221913);flex-direction:column;align-items:center;padding-top:22px;gap:13px;z-index:2}
  .t-daily-dabba .card-rail .logo{width:26px;height:26px;border-radius:9px;background:linear-gradient(145deg,#E5533A,#F2A93B);box-shadow:0 4px 10px -4px rgba(229,83,58,.8)}
  .t-daily-dabba .card-rail .nav{width:18px;height:5px;border-radius:3px;background:rgba(255,255,255,.16)}
  .t-daily-dabba .card-rail .nav.on{background:#F2A93B;width:24px}
  .t-daily-dabba .card-cohort{color:#E5533A}
  .t-daily-dabba .card-kind{color:#9A7D52;font-family:'Inter';font-weight:600}
  .t-daily-dabba .card-name{font-family:'Space Grotesk';font-weight:600;color:#2E231D;font-size:38px;letter-spacing:-.02em}
  .t-daily-dabba .card-participant{color:#8A7D6E;font-family:'Inter'}.t-daily-dabba .card-participant strong{color:#2E231D;font-weight:600}
  .t-daily-dabba .card-description{color:#6B5F52;font-family:'Inter'}
  .t-daily-dabba .card-rule{background:#E5533A;width:42px}
  .t-daily-dabba .card-cta{color:#E5533A;font-family:'Space Grotesk';font-weight:600}
  .t-daily-dabba:hover{box-shadow:0 26px 52px -24px rgba(229,83,58,.42)}

  /* ---------- A TREE FOR YOU · editorial paper ---------- */
  .t-a-tree-for-you{border-color:rgba(91,140,62,.22)}
  .t-a-tree-for-you .card-bg{background:radial-gradient(100% 70% at 100% 0,rgba(232,146,58,.14),transparent 55%),linear-gradient(165deg,#FAF6EA,#F2F0DB)}
  .t-a-tree-for-you .card-cohort{color:#5B8C3E}
  .t-a-tree-for-you .card-kind{color:#9A7B3A;font-family:'Hanken Grotesk';font-weight:700}
  .t-a-tree-for-you .card-name{font-family:'Fraunces';font-weight:560;color:#2F3D22;font-size:40px;letter-spacing:-.01em}
  .t-a-tree-for-you .card-participant{color:#7D8163;font-family:'Hanken Grotesk'}.t-a-tree-for-you .card-participant strong{color:#2F3D22;font-weight:600}
  .t-a-tree-for-you .card-description{color:#5F6347;font-family:'Hanken Grotesk'}
  .t-a-tree-for-you .card-rule{background:#E8923A;width:46px}
  .t-a-tree-for-you .card-cta{color:#5B8C3E;font-family:'Hanken Grotesk';font-weight:700}
  .t-a-tree-for-you:hover{box-shadow:0 26px 52px -24px rgba(91,140,62,.48)}

  /* ---------- folder card + artefact pills ---------- */
  .card[role="button"]{cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:left;font:inherit;width:100%}
  .card[role="button"]:focus-visible{outline:2px solid var(--taccent,var(--accent));outline-offset:3px}
  .card-arte{display:flex;flex-wrap:wrap;gap:7px;margin-top:-2px}
  .card-arte span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:999px;border:1px solid var(--taccent,var(--accent));color:var(--taccent,var(--accent));opacity:.9}
  .card-cta svg{transition:transform .2s}
  .card:hover .card-cta svg{transform:translateY(-2px)}

  /* ---------- folder modal ---------- */
  .modal-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;
    background:rgba(26,26,26,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
  .modal-overlay.open{display:flex;animation:overlayIn .2s ease}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  .modal-panel{--taccent:var(--accent);position:relative;width:100%;max-width:620px;max-height:88vh;overflow:auto;
    background:#FBF7EF;border:1px solid var(--line);border-radius:16px;box-shadow:0 40px 90px -30px rgba(0,0,0,.65);
    animation:panelIn .26s cubic-bezier(.2,.7,.2,1)}
  @keyframes panelIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
  .modal-panel::before{content:"";display:block;height:6px;background:var(--taccent);border-radius:16px 16px 0 0}
  .modal-close{position:absolute;top:14px;right:16px;width:34px;height:34px;border:none;border-radius:50%;
    background:rgba(26,26,26,.06);color:var(--text-soft);font-size:22px;line-height:1;cursor:pointer;transition:.18s;z-index:2}
  .modal-close:hover{background:rgba(26,26,26,.13);color:var(--text)}
  .modal-inner{padding:34px 34px 32px}
  .modal-kind{font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--taccent);margin-bottom:8px}
  .modal-name{font-family:var(--serif);font-size:clamp(28px,4vw,36px);font-weight:300;letter-spacing:-.02em;line-height:1.05;margin-bottom:12px}
  .modal-desc{font-size:15px;color:var(--text-soft);line-height:1.55;margin-bottom:26px}
  .arte-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .arte{display:flex;align-items:center;gap:14px;padding:15px 16px;border:1px solid var(--line);border-radius:11px;background:#fff;
    font-family:var(--sans);text-align:left;width:100%}
  button.arte{cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s}
  button.arte:hover{border-color:var(--taccent);transform:translateY(-2px);box-shadow:0 14px 28px -18px rgba(0,0,0,.5)}
  button.arte:focus-visible{outline:2px solid var(--taccent);outline-offset:2px}
  .arte-icon{width:40px;height:40px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(26,26,26,.05);color:var(--taccent)}
  .arte-text{display:flex;flex-direction:column;gap:2px;min-width:0}
  .arte-label{font-weight:700;font-size:14px;color:var(--text)}
  .arte-status{font-size:11.5px;letter-spacing:.04em;color:var(--text-muted)}
  .arte.is-soon{opacity:.5}
  .arte.is-soon .arte-icon{color:var(--text-muted)}
  .modal-back{border:none;background:none;color:var(--taccent);font-family:var(--sans);font-size:13px;font-weight:700;
    letter-spacing:.04em;cursor:pointer;padding:0;margin-bottom:14px}
  .modal-back:hover{opacity:.7}
  .modal-video{width:100%;border-radius:11px;background:#000;max-height:62vh;display:block}
  @media(max-width:560px){.arte-grid{grid-template-columns:1fr}.modal-inner{padding:28px 22px 26px}}

  /* states */
  .loading-state,.error-state{padding:80px 32px;text-align:center;color:var(--text-muted);font-family:var(--serif);font-style:italic;font-size:18px}
  .error-state code{font-family:'SF Mono',Menlo,monospace;background:var(--bg-soft);padding:2px 8px;border-radius:2px;font-size:14px;font-style:normal;color:var(--accent)}
  .placeholder{padding:96px 0;text-align:center;border:1px dashed var(--line-strong);border-radius:4px;background:rgba(193,125,42,.08);margin:50px 0 96px}
  .placeholder-eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:20px}
  .placeholder h2{font-family:var(--serif);font-size:clamp(30px,4.5vw,52px);font-weight:400;margin-bottom:14px;letter-spacing:-.02em}
  .placeholder p{color:var(--text-soft);font-family:var(--serif);font-style:italic;font-size:18px;max-width:40ch;margin:0 auto}

  footer{padding:48px 0 64px;border-top:1px solid var(--line);text-align:center;color:var(--text-muted);font-size:14px}
  footer a{color:var(--text-soft);text-decoration:none;border-bottom:1px solid var(--line);transition:.18s}
  footer a:hover{color:var(--accent);border-color:var(--accent)}
  .footer-rule{width:32px;height:1px;background:var(--accent);margin:0 auto 24px;border:none}

  @media(max-width:640px){.container{padding:0 22px}.hero{padding:40px 0 44px}.filters{padding:22px 0}}
</style>
</head>
<body>
<div class="container">
  <div class="brand-strip"><a href="https://justbuild.orangecaterpillar.com" class="brand-mark">Just Build &middot; by Orange Caterpillar</a></div>

  <section class="hero">
    <div class="hero-eyebrow">The Showcase</div>
    <h1 id="hero-title">What Just Build participants <em>built</em>.</h1>
    <p class="hero-sub" id="hero-sub">Real products. Real people. Built in two days.</p>
    <hr class="hero-rule">
  </section>

  <section class="filters" id="filters">
    <span class="filter-label">Cohort</span>
    <button class="filter-btn active" data-cohort="all">All</button>
    <span class="filter-count" id="filter-count"></span>
  </section>

  <section id="content"><div class="loading-state">Loading the wall…</div></section>

  <footer><hr class="footer-rule">Built at Just Build, by <a href="https://justbuild.orangecaterpillar.com">Orange Caterpillar</a>.</footer>
</div>

<div class="modal-overlay" id="folder-modal" aria-hidden="true">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-name">
    <button class="modal-close" id="modal-close" aria-label="Close folder">&times;</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let DATA=null, activeCohort="all";

/* per-app card themes: palette & fonts live in CSS (.t-<slug>); JS supplies the kicker + corner motif */
const THEMES={
  "pallu":{kind:"Handloom saree house", accent:"#C79A2E",
    deco:`<svg width="44" height="44" viewBox="0 0 44 44" fill="none" stroke="#E8C36B" stroke-width="1.4" opacity=".85"><path d="M29 6c8 4 9 16 1 21S10 30 9 22c-.7-5 3.5-9 8-8 2.8.7 4.3 4 2.4 6.4"/><circle cx="20.5" cy="21" r="2" fill="#E8C36B" stroke="none"/></svg>`},
  "crumbs":{kind:"After-hours bakery", accent:"#E0A33A",
    deco:`<span class="chalk">fresh daily</span>`},
  "trot":{kind:"Dog walking, on demand", accent:"#E07A45",
    deco:`<svg width="60" height="48" viewBox="0 0 60 48"><g stroke="#F7C843" stroke-width="2" stroke-linecap="round"><line x1="48" y1="1" x2="48" y2="5"/><line x1="59" y1="13" x2="55" y2="13"/><line x1="40" y1="5" x2="42.5" y2="7.5"/><line x1="56" y1="5" x2="53.5" y2="7.5"/></g><circle cx="48" cy="14" r="8.5" fill="#FBCB3E"/><g fill="#FF8A5B" opacity=".9"><g transform="translate(6,28)"><circle cx="6" cy="9" r="3.5"/><circle cx="1.4" cy="3" r="1.9"/><circle cx="6" cy="1" r="1.9"/><circle cx="10.6" cy="3" r="1.9"/></g><g transform="translate(26,33) scale(.78)"><circle cx="6" cy="9" r="3.5"/><circle cx="1.4" cy="3" r="1.9"/><circle cx="6" cy="1" r="1.9"/><circle cx="10.6" cy="3" r="1.9"/></g></g></svg>`},
  "zevar":{kind:"Fine jewellery", accent:"#B5223B",
    deco:`<svg width="46" height="44" viewBox="0 0 46 44" fill="#C9A24B"><path d="M31 3l2.3 7.1L40 12.4l-7 2.3L31 22l-2.3-7.3-7-2.3 7-2.3z"/><path d="M14 21l1.5 4.5L20 27l-4.5 1.6L14 33l-1.5-4.4L8 27l4.5-1.5z" opacity=".8"/></svg>`},
  "daily-dabba":{kind:"Tiffin subscription", accent:"#E5533A", deco:``},
  "a-tree-for-you":{kind:"Rent a fruit tree", accent:"#5B8C3E",
    deco:`<svg width="80" height="22" viewBox="0 0 80 22"><circle cx="10" cy="11" r="9.5" fill="#5B8C3E"/><text x="10" y="14.5" font-family="'Hanken Grotesk',sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">1</text><line x1="20" y1="11" x2="30" y2="11" stroke="#C9BD97" stroke-width="2"/><circle cx="37" cy="11" r="6.5" fill="none" stroke="#C9BD97" stroke-width="2"/><line x1="44" y1="11" x2="54" y2="11" stroke="#C9BD97" stroke-width="2"/><circle cx="61" cy="11" r="6.5" fill="none" stroke="#C9BD97" stroke-width="2"/></svg>`}
};
const slugify=s=>String(s||"default").toLowerCase().replace(/[^a-z0-9-]/g,"")||"default";

async function loadShowcase(){
  try{
    const res=await fetch("./showcase.json",{cache:"no-cache"});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA=await res.json();
    buildFilters(); render();
  }catch(err){
    document.getElementById("content").innerHTML=`<div class="error-state"><p>Could not load <code>showcase.json</code>.</p><p style="margin-top:12px;font-size:14px;opacity:.7">${escapeHtml(err.message)}</p></div>`;
  }
}

function buildFilters(){
  const builds=DATA.builds||[];
  const cohorts=[...new Set(builds.map(b=>b.cohort_number))].sort((a,b)=>a-b);
  const bar=document.getElementById("filters");
  bar.querySelectorAll(".filter-btn[data-cohort]:not([data-cohort='all'])").forEach(b=>b.remove());
  const countSpan=bar.querySelector(".filter-count");
  cohorts.forEach(c=>{const btn=document.createElement("button");btn.className="filter-btn";btn.dataset.cohort=c;btn.textContent=`Cohort ${c}`;bar.insertBefore(btn,countSpan);});
  bar.querySelectorAll(".filter-btn").forEach(btn=>{btn.addEventListener("click",()=>{activeCohort=btn.dataset.cohort;bar.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b===btn));render();});});
  bar.style.display=builds.length===0?"none":"flex";
}

function render(){
  const builds=DATA.builds||[];
  const filtered=activeCohort==="all"?builds:builds.filter(b=>String(b.cohort_number)===String(activeCohort));
  const content=document.getElementById("content");
  const countSpan=document.getElementById("filter-count");
  countSpan.textContent=filtered.length===1?"1 build":`${filtered.length} builds`;

  if(builds.length===0){content.innerHTML=`<div class="placeholder"><div class="placeholder-eyebrow">In Progress</div><h2>Something is being built here.</h2><p>After the first demo day this wall fills with real products. Check back soon.</p></div>`;return;}
  if(filtered.length===0){content.innerHTML=`<div class="placeholder"><div class="placeholder-eyebrow">Empty</div><h2>No builds in this cohort yet.</h2><p>Try a different cohort, or come back after the next demo day.</p></div>`;return;}

  /* newest cohort first, then explicit order, then name */
  const sorted=[...filtered].sort((a,b)=>{
    if(a.cohort_number!==b.cohort_number) return b.cohort_number-a.cohort_number;
    const ao=a.order??999, bo=b.order??999;
    if(ao!==bo) return ao-bo;
    return (a.product_name||"").localeCompare(b.product_name||"");
  });

  content.innerHTML=`<div class="wall">${sorted.map(cardHtml).join("")}</div>`;
}

function cardHtml(b){
  const slug=slugify(b.slug||b.product_name);
  const theme=THEMES[slug]||{kind:"Just Build product",deco:"",accent:"var(--accent)"};
  const cls=THEMES[slug]?("t-"+slug):"t-default";
  const accent=theme.accent||"var(--accent)";
  const loc=b.cohort_location?" &middot; "+escapeHtml(b.cohort_location):"";
  /* preview the artefacts that actually exist (app always, video where present) */
  const have=[];
  if(b.url) have.push("App");
  if(b.video) have.push("Video");
  if(b.website) have.push("Website");
  if(b.brochure) have.push("Brochure");
  if(b.pitch) have.push("Pitch");
  const pills=have.map(p=>`<span>${p}</span>`).join("");
  return `<div class="card ${cls}" role="button" tabindex="0" data-slug="${escapeAttr(slug)}" style="--taccent:${accent}" aria-label="Open the ${escapeAttr(b.product_name)} folder">
    <div class="card-bg"></div>
    <div class="card-rail"><div class="logo"></div><div class="nav on"></div><div class="nav"></div><div class="nav"></div><div class="nav"></div></div>
    <div class="card-deco">${theme.deco||""}</div>
    <div class="card-top">
      <span class="card-cohort">Cohort ${escapeHtml(String(b.cohort_number))}${loc}</span>
      <span class="card-kind">${escapeHtml(theme.kind)}</span>
    </div>
    <h3 class="card-name">${escapeHtml(b.product_name)}</h3>
    <div class="card-arte">${pills}</div>
    <p class="card-description">${escapeHtml(b.description)}</p>
    <div class="card-rule"></div>
    <span class="card-cta">Open folder
      <svg width="14" height="13" viewBox="0 0 14 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"><path d="M1 3.2c0-.7.5-1.2 1.2-1.2h2.7l1.3 1.5h4.6c.7 0 1.2.5 1.2 1.2V10c0 .7-.5 1.2-1.2 1.2H2.2C1.5 11.2 1 10.7 1 10z"/></svg>
    </span>
  </div>`;
}

function escapeHtml(s){if(s==null)return "";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function escapeAttr(s){return escapeHtml(s);}

/* ---------- Folder modal ---------- */
const ART_TYPES=[
  {key:"url",     label:"App",           verb:"Open live app", kind:"link",
    icon:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="2.5" y="3" width="15" height="14" rx="2"/><path d="M2.5 7h15"/><circle cx="5" cy="5" r=".6" fill="currentColor"/></svg>`},
  {key:"video",   label:"Product Video", verb:"Watch",         kind:"video",
    icon:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><circle cx="10" cy="10" r="7.5"/><path d="M8.2 7.2 13 10l-4.8 2.8z" fill="currentColor" stroke="none"/></svg>`},
  {key:"website", label:"Website",       verb:"Visit site",    kind:"link",
    icon:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><circle cx="10" cy="10" r="7.5"/><path d="M2.5 10h15M10 2.5c2.2 2 2.2 13 0 15M10 2.5c-2.2 2-2.2 13 0 15"/></svg>`},
  {key:"brochure",label:"Brochure",      verb:"Open PDF",      kind:"link",
    icon:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M5 2.5h6l4 4V17a.5.5 0 0 1-.5.5h-9A.5.5 0 0 1 5 17z"/><path d="M11 2.5V6.5h4M7.5 11h5M7.5 13.5h5"/></svg>`},
  {key:"pitch",   label:"Pitch deck",    verb:"Open PDF",      kind:"link",
    icon:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3.5" width="14" height="9" rx="1.5"/><path d="M10 12.5v3M7.5 17.5l2.5-2 2.5 2"/><path d="M6.5 9.5l2-2 2 1.5 3-3.5"/></svg>`}
];

function openFolder(slug){
  const b=(DATA&&DATA.builds||[]).find(x=>slugify(x.slug||x.product_name)===slug);
  if(!b) return;
  const accent=(THEMES[slug]||{}).accent||"var(--accent)";
  document.querySelector("#folder-modal .modal-panel").style.setProperty("--taccent",accent);
  renderFolderBody(b,slug);
  const m=document.getElementById("folder-modal");
  m.classList.add("open"); m.setAttribute("aria-hidden","false");
  const c=document.getElementById("modal-close"); if(c) c.focus();
}

function renderFolderBody(b,slug){
  const kind=(THEMES[slug]||{}).kind||"Just Build product";
  const tiles=ART_TYPES.map(t=>{
    const val=b[t.key];
    if(val){
      return `<button class="arte is-live" data-action="${t.kind}" data-url="${escapeAttr(val)}">
        <span class="arte-icon">${t.icon}</span>
        <span class="arte-text"><span class="arte-label">${t.label}</span><span class="arte-status">${t.verb}</span></span>
      </button>`;
    }
    return `<div class="arte is-soon" aria-disabled="true">
      <span class="arte-icon">${t.icon}</span>
      <span class="arte-text"><span class="arte-label">${t.label}</span><span class="arte-status">Coming soon</span></span>
    </div>`;
  }).join("");
  document.getElementById("modal-body").innerHTML=`<div class="modal-inner">
    <div class="modal-kind">${escapeHtml(kind)}</div>
    <h2 class="modal-name" id="modal-name">${escapeHtml(b.product_name)}</h2>
    <p class="modal-desc">${escapeHtml(b.description)}</p>
    <div class="arte-grid">${tiles}</div>
  </div>`;
  document.querySelectorAll("#modal-body .arte.is-live").forEach(el=>{
    el.addEventListener("click",()=>{
      if(el.dataset.action==="video") showVideo(b,slug,el.dataset.url);
      else window.open(el.dataset.url,"_blank","noopener");
    });
  });
}

function showVideo(b,slug,url){
  const kind=(THEMES[slug]||{}).kind||"";
  document.getElementById("modal-body").innerHTML=`<div class="modal-inner">
    <button class="modal-back" id="modal-back">&#8249; Back to folder</button>
    <div class="modal-kind">${escapeHtml(kind)}</div>
    <h2 class="modal-name">${escapeHtml(b.product_name)} &middot; Product video</h2>
    <video class="modal-video" src="${escapeAttr(url)}" controls autoplay playsinline></video>
  </div>`;
  document.getElementById("modal-back").addEventListener("click",()=>renderFolderBody(b,slug));
}

function closeFolder(){
  const m=document.getElementById("folder-modal");
  const v=m.querySelector("video"); if(v) v.pause();
  m.classList.remove("open"); m.setAttribute("aria-hidden","true");
}

function wireFolderModal(){
  const content=document.getElementById("content");
  content.addEventListener("click",e=>{const card=e.target.closest(".card[data-slug]"); if(card) openFolder(card.dataset.slug);});
  content.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===" "){const card=e.target.closest(".card[data-slug]"); if(card){e.preventDefault(); openFolder(card.dataset.slug);}}
  });
  const m=document.getElementById("folder-modal");
  document.getElementById("modal-close").addEventListener("click",closeFolder);
  m.addEventListener("click",e=>{if(e.target===m) closeFolder();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape"&&m.classList.contains("open")) closeFolder();});
}
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",wireFolderModal);
}else{
  wireFolderModal();
}

loadShowcase();
</script>

</body>
</html>
