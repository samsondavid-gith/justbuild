<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Tree for You · Helper</title>
<meta name="description" content="Ask anything about adopting a fruit tree.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1F2A17;--ink-soft:#51614A;--cream:#F6F4E9;--cream2:#EBEAD3;--paper:#fff;
   --line:rgba(31,42,23,.14);--accent:#E07B3C;--accent2:#C5631F;--amber:#EBA63A;
   --disp:'Fraunces',Georgia,serif;--sans:'Hanken Grotesk',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:radial-gradient(120% 80% at 80% -10%,rgba(235,166,58,.20),var(--cream) 55%);
   min-height:100svh;display:flex;align-items:center;justify-content:center;padding:18px}
  .chat{width:100%;max-width:540px;height:min(86svh,760px);background:var(--paper);border:1px solid var(--line);
   border-radius:22px;box-shadow:0 40px 90px -50px rgba(40,25,12,.55);display:flex;flex-direction:column;overflow:hidden}
  .chat-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:var(--cream)}
  .who{display:flex;align-items:center;gap:11px}
  .who .dot{width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,#5C8A38,#EBA63A);flex:none;box-shadow:0 6px 14px -6px rgba(0,0,0,.3)}
  .who .nm{font-family:var(--disp);font-weight:600;font-size:18px;line-height:1}
  .who .st{font-size:12px;color:var(--ink-soft);margin-top:3px}
  .head-cta{text-decoration:none;font-size:12.5px;font-weight:700;color:#fff;background:var(--accent);padding:8px 14px;border-radius:999px;white-space:nowrap}
  .thread{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:82%;padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.5}
  .msg.bot{align-self:flex-start;background:var(--cream2);color:var(--ink);border-bottom-left-radius:5px}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
  .chip{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:13px;font-weight:600;
   padding:8px 13px;border-radius:999px;cursor:pointer;transition:.16s}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .bar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:var(--cream)}
  .bar input{flex:1;border:1px solid var(--line);border-radius:999px;padding:11px 16px;font-family:var(--sans);font-size:14px;background:var(--paper);color:var(--ink);outline:none}
  .bar input:focus{border-color:var(--accent)}
  .bar button{border:0;background:var(--accent);color:#fff;font-family:var(--sans);font-weight:700;font-size:14px;padding:0 18px;border-radius:999px;cursor:pointer}
  .bar button:hover{background:var(--accent2)}
  .foot-note{text-align:center;font-size:11px;color:var(--ink-soft);padding:0 0 10px;background:var(--cream)}
  .foot-note a{color:var(--accent)}
</style>
</head>
<body>
  <div class="chat">
    <div class="chat-head">
      <div class="who"><span class="dot"></span><div><div class="nm">A Tree for You</div><div class="st">Usually replies instantly</div></div></div>
      <a class="head-cta" href="app.html">See the trees</a>
    </div>
    <div class="thread" id="thread"></div>
    <div class="chips" id="chips"></div>
    <form class="bar" id="bar"><input id="inp" placeholder="Type your question..." autocomplete="off" aria-label="Your question"><button type="submit">Send</button></form>
    <div class="foot-note">A Just Build venture. For live prices and to order, <a href="app.html">open the app</a>.</div>
  </div>
<script>
  var FAQ=[{"keys": ["really", "mine", "my tree", "own", "tagged", "name"], "a": "Yes, it is really yours. A real tree on a real farm, tagged with your name for the whole season."}, {"keys": ["fruit", "mango", "guava", "what can", "variety", "kind", "which"], "a": "It depends on the season and the farm. Mango, guava, sweet lime, pomegranate and more show up through the year. The app shows what is available now."}, {"keys": ["small", "harvest", "less", "fail", "bad", "amount", "yield"], "a": "Nature varies, and we are honest about it. If a tree does badly through no fault of yours, we make it right."}, {"keys": ["ship", "deliver", "pack", "where", "reach", "india"], "a": "We hand pick at ripeness, pack it to travel well, and ship to your door across most of India."}, {"keys": ["gift", "present", "someone"], "a": "Yes. Adopt a tree in someone's name and the harvest goes to them, with a note from you."}, {"keys": ["update", "photo", "see", "grow", "progress"], "a": "You get photo updates as your tree wakes up, blossoms and fills with fruit."}, {"keys": ["price", "cost", "much", "rate", "plan", "season", "year"], "a": "Live prices and what is in season are in the app, always up to date. Tap See the trees to view them."}, {"keys": ["start", "begin", "adopt", "sign", "join", "how do i"], "a": "Easy. Tap See the trees, pick a tree, and it is yours for the season."}];
  var CHIPS=["Is it really my tree?", "Which fruits?", "Can I gift a tree?", "How do I start?", "Prices?"];
  var GREETING="Hi! I am the A Tree for You helper. Ask me anything about adopting a tree, or tap a question below.";
  var FALLBACK="I am not sure about that one yet. Try one of the questions below, or open the app to see everything.";
  var thread=document.getElementById("thread"), chipBox=document.getElementById("chips");
  function add(text,who){var d=document.createElement("div");d.className="msg "+who;d.textContent=text;thread.appendChild(d);thread.scrollTop=thread.scrollHeight;}
  function answer(q){
    var s=q.toLowerCase();
    for(var i=0;i<FAQ.length;i++){for(var k=0;k<FAQ[i].keys.length;k++){if(s.indexOf(FAQ[i].keys[k])>-1){return FAQ[i].a;}}}
    return FALLBACK;
  }
  function ask(q){add(q,"user");setTimeout(function(){add(answer(q),"bot");},260);}
  function renderChips(){chipBox.innerHTML="";CHIPS.forEach(function(c){var b=document.createElement("button");b.className="chip";b.type="button";b.textContent=c;b.addEventListener("click",function(){ask(c);});chipBox.appendChild(b);});}
  document.getElementById("bar").addEventListener("submit",function(e){e.preventDefault();var inp=document.getElementById("inp");var v=inp.value.trim();if(!v)return;ask(v);inp.value="";});
  add(GREETING,"bot");renderChips();
</script>
</body>
</html>
