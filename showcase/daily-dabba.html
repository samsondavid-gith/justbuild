<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dabba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F1EB; --canvas:#F4F1EB; --card:#FFFFFF; --sidebar:#231512; --sidebar-2:#2E1C17;
    --ink:#23150F; --muted:#8B7B70; --line:#ECE3D9; --line-2:#F4EDE5;
    --saffron:#EFA02B; --tomato:#DC4A2A; --tomato-d:#BE3B1D; --veg:#3E8E5A; --nonveg:#CB4A2C;
    --shadow:0 1px 2px rgba(60,30,15,.04),0 14px 34px -18px rgba(60,30,15,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5}
  .disp{font-family:"Space Grotesk",sans-serif;letter-spacing:-.01em}
  img{display:block}
  button{font-family:inherit;cursor:pointer}
  .cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

  .app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}

  /* ---------- sidebar ---------- */
  .sidebar{background:var(--sidebar);color:#fff;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh}
  .logo{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
  .logo .mark{width:38px;height:38px;border-radius:11px;background:var(--saffron);display:grid;place-items:center;flex:none}
  .logo .nm{font-family:"Space Grotesk";font-weight:700;font-size:19px;line-height:1}
  .logo .tg{font-size:10.5px;color:rgba(255,255,255,.5);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
  .nav{display:flex;flex-direction:column;gap:4px}
  .navlbl{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:6px 12px;font-weight:600}
  .navitem{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;border:0;background:transparent;
    color:rgba(255,255,255,.66);font-size:14.5px;font-weight:500;text-align:left;width:100%;transition:.16s;position:relative}
  .navitem svg{width:20px;height:20px;flex:none}
  .navitem:hover{background:rgba(255,255,255,.06);color:#fff}
  .navitem.on{background:var(--sidebar-2);color:#fff}
  .navitem.on::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:99px;background:var(--saffron)}
  .navitem .badge{margin-left:auto;background:var(--tomato);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:99px;display:grid;place-items:center;padding:0 5px}
  .side-foot{margin-top:auto}
  .deliver{background:var(--sidebar-2);border-radius:14px;padding:13px 14px;margin-bottom:12px}
  .deliver .dl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45)}
  .deliver .da{font-size:13.5px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:7px}
  .deliver svg{width:13px;height:13px;flex:none}
  .userbox{display:flex;align-items:center;gap:11px;padding:4px 4px}
  .userbox .av{width:36px;height:36px;border-radius:50%;background:var(--saffron);color:#231512;display:grid;place-items:center;font-weight:700;font-family:"Space Grotesk"}
  .userbox .un{font-size:13.5px;font-weight:600}
  .userbox .ue{font-size:11.5px;color:rgba(255,255,255,.5)}

  /* ---------- main ---------- */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(244,241,235,.88);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:20px 34px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px}
  .topbar h1{font-family:"Space Grotesk";font-weight:700;font-size:26px;line-height:1.05}
  .topbar .sub{color:var(--muted);font-size:14px;margin-top:3px}
  .content{padding:28px 34px 70px;flex:1}

  /* segmented control */
  .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px}
  .seg button{border:0;background:transparent;font-weight:600;font-size:13.5px;color:var(--muted);padding:8px 16px;border-radius:9px;transition:.16s}
  .seg button.on{background:var(--ink);color:#fff}
  .seg.veg button.on{background:var(--veg)}

  /* menu grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:20px}
  .meal{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:.18s;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column}
  .meal:hover{transform:translateY(-3px);box-shadow:0 20px 44px -20px rgba(60,30,15,.3)}
  .meal .pic{height:168px;position:relative;display:grid;place-items:center;background:#F3EBE1;overflow:hidden}
  .meal .pic svg{width:74px;height:74px}
  .vtag{position:absolute;top:11px;left:11px;z-index:2;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.94);
    padding:5px 9px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .vtag .vm{width:11px;height:11px;border-radius:3px;border:1.5px solid;display:grid;place-items:center}
  .vtag .vm::after{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
  .vtag.veg{color:var(--veg)} .vtag.nonveg{color:var(--nonveg)}
  .meal .mb{padding:15px 16px 16px;display:flex;flex-direction:column;flex:1}
  .meal h3{font-family:"Space Grotesk";font-weight:600;font-size:17.5px;line-height:1.12}
  .meal .cui{font-size:12.5px;color:var(--muted);margin-top:3px}
  .meal .mfoot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1px solid var(--line-2)}
  .meal .pr{font-family:"Space Grotesk";font-weight:700;font-size:18px}
  .meal .pr span{font-family:"Inter";font-size:11.5px;color:var(--muted);font-weight:500}
  .meal .cfg{font-size:13px;font-weight:600;color:var(--tomato)}

  /* drawer */
  .drawer-bd{position:fixed;inset:0;background:rgba(35,21,15,.42);opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .drawer-bd.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:92vw;background:var(--canvas);z-index:61;
    transform:translateX(102%);transition:transform .32s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;box-shadow:-30px 0 60px -30px rgba(0,0,0,.5)}
  .drawer.show{transform:translateX(0)}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--line)}
  .dhead .t{font-family:"Space Grotesk";font-weight:600;font-size:15px}
  .dclose{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:17px;color:var(--muted);display:grid;place-items:center}
  .dclose:hover{border-color:var(--tomato);color:var(--tomato)}
  .dscroll{overflow-y:auto;padding:22px 24px;flex:1}
  .dhero{height:200px;border-radius:18px;overflow:hidden;position:relative;display:grid;place-items:center;background:#F3EBE1;margin-bottom:16px}
  .dhero svg{width:100px;height:100px}
  .drawer h2{font-family:"Space Grotesk";font-weight:700;font-size:24px;line-height:1.06}
  .tagrow{display:flex;gap:7px;flex-wrap:wrap;margin:11px 0 14px}
  .tag{font-size:11.5px;font-weight:600;background:#fff;border:1px solid var(--line);color:#6f5d50;padding:5px 11px;border-radius:99px}
  .tag.veg{background:#E7F2EB;border-color:#CFE6D8;color:var(--veg)} .tag.nonveg{background:#FBE7E0;border-color:#F2D2C6;color:var(--nonveg)}
  .desc{font-size:14px;color:#5e4e44;line-height:1.6}
  .ssec{font-family:"Space Grotesk";font-weight:600;font-size:14px;margin:22px 0 10px}
  .plan-cards{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .plan{border:1.5px solid var(--line);background:#fff;border-radius:15px;padding:14px;text-align:left;transition:.16s;position:relative}
  .plan:hover{border-color:#E5C9A8}
  .plan.on{border-color:var(--tomato);background:#FFF4F0}
  .plan .pn{font-family:"Space Grotesk";font-weight:600;font-size:15px}
  .plan .pm{font-size:11.5px;color:var(--muted);margin:3px 0 9px;min-height:30px}
  .plan .pp{font-family:"Space Grotesk";font-weight:700;font-size:19px;color:var(--tomato)}
  .plan .save{position:absolute;top:-9px;right:11px;background:var(--veg);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}
  .addon{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:13px;margin-bottom:9px;background:#fff;font-size:14px;font-weight:500;transition:.15s}
  .addon:hover{border-color:#E5C9A8}
  .addon.on{border-color:var(--tomato);background:#FFF4F0}
  .addon .box{width:21px;height:21px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;font-size:13px}
  .addon.on .box{background:var(--tomato);border-color:var(--tomato)}
  .addon .ap{margin-left:auto;font-weight:700;color:var(--muted)}
  .dfoot{padding:16px 24px;border-top:1px solid var(--line);display:flex;align-items:center;gap:16px;background:#fff}
  .dfoot .tt{font-size:12px;color:var(--muted);font-weight:600}
  .dfoot .tt b{display:block;font-family:"Space Grotesk";font-weight:700;font-size:23px;color:var(--ink)}

  .btn{border:0;border-radius:13px;font-weight:600;font-size:14.5px;padding:13px 22px;transition:.16s}
  .btn-primary{background:var(--tomato);color:#fff}
  .btn-primary:hover{background:var(--tomato-d)}
  .btn-primary:disabled{background:#E6D7C9;color:#A2917F;cursor:not-allowed}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-dark:hover{background:#000}
  .btn-flex{flex:1}
  .btn-wide{width:100%}

  /* bag */
  .baglay{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start}
  .bag-item{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:13px;position:relative;box-shadow:var(--shadow)}
  .bag-item .bi{width:74px;height:74px;border-radius:13px;overflow:hidden;position:relative;display:grid;place-items:center;background:#F3EBE1;flex:none}
  .bag-item .bi svg{width:46px;height:46px}
  .bag-item h4{font-family:"Space Grotesk";font-weight:600;font-size:16px}
  .bag-item .bs{font-size:12.5px;color:var(--muted);margin-top:3px}
  .bag-item .bp{font-family:"Space Grotesk";font-weight:700;margin-top:7px;font-size:16px}
  .bag-item .rm{position:absolute;top:12px;right:13px;border:0;background:none;color:var(--muted);font-size:16px;line-height:1}
  .bag-item .rm:hover{color:var(--tomato)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
  .panel h3{font-family:"Space Grotesk";font-weight:600;font-size:16px;margin-bottom:14px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;font:inherit;font-size:14px;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#FFFBF7;color:var(--ink)}
  .field input:focus{outline:0;border-color:var(--tomato)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .summary{position:sticky;top:96px}
  .sumrow{display:flex;justify-content:space-between;font-size:13.5px;color:var(--muted);margin:10px 0}
  .sumrow b{color:var(--ink);font-weight:600}
  .sumtot{display:flex;justify-content:space-between;align-items:baseline;margin:14px 0;padding-top:14px;border-top:1px dashed var(--line)}
  .sumtot .big{font-family:"Space Grotesk";font-weight:700;font-size:26px;color:var(--tomato)}
  .mock{font-size:12px;color:var(--muted);text-align:center;margin-top:11px}

  /* orders */
  .ord{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .ord-top{display:flex;gap:14px;align-items:center}
  .ord-img{width:60px;height:60px;border-radius:13px;overflow:hidden;position:relative;display:grid;place-items:center;background:#F3EBE1;flex:none}
  .ord-img svg{width:38px;height:38px}
  .ord h4{font-family:"Space Grotesk";font-weight:600;font-size:17px}
  .ord .os{font-size:13px;color:var(--muted);margin-top:2px}
  .ord .ostat{margin-left:auto;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:99px;background:#FFF1E0;color:#B5731A;white-space:nowrap}
  .ord .ostat.del{background:#E7F2EB;color:var(--veg)}
  .tl{display:flex;margin:20px 4px 6px}
  .tl .s{flex:1;text-align:center;position:relative;font-size:12px;color:var(--muted)}
  .tl .s::before{content:"";position:absolute;top:9px;left:-50%;width:100%;height:2px;background:var(--line)}
  .tl .s:first-child::before{display:none}
  .tl .d{width:19px;height:19px;border-radius:50%;background:#fff;border:2px solid var(--line);margin:0 auto 8px;position:relative;z-index:1}
  .tl .s.done .d{background:var(--veg);border-color:var(--veg)} .tl .s.done::before{background:var(--veg)}
  .tl .s.now .d{background:var(--saffron);border-color:var(--saffron);box-shadow:0 0 0 5px rgba(239,160,43,.22)}
  .tl .s.done,.tl .s.now{color:var(--ink);font-weight:600}
  .ord-foot{display:flex;align-items:center;gap:12px;background:#FBF3EA;border:1px solid var(--line-2);border-radius:13px;padding:12px 15px;margin-top:16px;font-size:13.5px;color:#6f5d50}
  .ord-foot b{color:var(--ink)}
  .ord-foot .btn{margin-left:auto;padding:9px 16px;font-size:13px}

  .banner{display:flex;align-items:center;gap:11px;background:linear-gradient(100deg,#FFF1E0,#FFE7D7);
    border:1px solid #F3D9BD;border-radius:15px;padding:14px 18px;margin-bottom:20px;font-size:14px;font-weight:500;color:#7a3d18}
  .empty{text-align:center;padding:70px 24px;color:var(--muted)}
  .empty .em{font-size:50px;margin-bottom:14px}
  .empty h3{font-family:"Space Grotesk";font-weight:600;font-size:20px;color:var(--ink);margin-bottom:6px}

  .toast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,16px);opacity:0;pointer-events:none;
    background:var(--ink);color:#fff;font-weight:600;font-size:14px;padding:13px 22px;border-radius:13px;transition:.28s;z-index:80;box-shadow:0 14px 30px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  @media(max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:static;height:auto;flex-direction:row;align-items:center;gap:8px;padding:12px 16px;flex-wrap:wrap}
    .logo{padding:0;margin-right:auto}
    .nav{flex-direction:row}.navlbl{display:none}.side-foot{display:none}
    .baglay{grid-template-columns:1fr}.summary{position:static}
    .topbar,.content{padding-left:18px;padding-right:18px}
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="mark"><svg viewBox="0 0 32 32" width="22" height="22"><circle cx="16" cy="16" r="13" fill="#231512"/><circle cx="11" cy="13" r="3.4" fill="#3E8E5A"/><circle cx="21" cy="13" r="3.4" fill="#DC4A2A"/><circle cx="16" cy="20" r="3.8" fill="#fff"/></svg></div>
      <div><div class="nm">Daily Dabba</div><div class="tg">Home-cooked</div></div>
    </div>
    <div class="navlbl">Order</div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="deliver">
        <div class="dl">Deliver to</div>
        <div class="da"><svg viewBox="0 0 24 24" fill="none" stroke="#EFA02B" stroke-width="2"><path d="M12 21s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/></svg> Indiranagar, Bengaluru</div>
      </div>
      <div class="userbox"><div class="av">V</div><div><div class="un">Vaibhav S.</div><div class="ue">vaibhav@dabba.in</div></div></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="drawer-bd" id="drawerbd" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>

<script>
const FOOD={
  veg:{svg:`<svg viewBox="0 0 64 64"><circle cx="32" cy="34" r="24" fill="#FBF3E0" stroke="#b48f3e" stroke-width="2"/><circle cx="24" cy="27" r="7" fill="#7a9b4e"/><circle cx="40" cy="27" r="7" fill="#d98b3a"/><circle cx="32" cy="43" r="8" fill="#b9712b"/><circle cx="32" cy="34" r="4" fill="#e8c879"/></svg>`},
  nonveg:{svg:`<svg viewBox="0 0 64 64"><circle cx="32" cy="34" r="24" fill="#FBF3E0" stroke="#a4502f" stroke-width="2"/><circle cx="24" cy="27" r="7" fill="#b33a26"/><circle cx="40" cy="27" r="7" fill="#d98b3a"/><circle cx="32" cy="43" r="8" fill="#8a3320"/><circle cx="32" cy="34" r="4" fill="#e8c879"/></svg>`}
};
const B="https://commons.wikimedia.org/wiki/Special:FilePath/";
const ITEMS=[
  {id:"m1",name:"North Indian Thali",type:"veg",cuisine:"North Indian",portion:"Serves 1",spice:"Medium",perMeal:130,img:B+"Delicious_North_Indian_Thali.jpg?width=900",
    desc:"Dal, a seasonal sabzi, rice, three rotis, salad and a sweet — the classic comforting North Indian spread."},
  {id:"m2",name:"South Indian Meals",type:"veg",cuisine:"South Indian",portion:"Serves 1",spice:"Mild",perMeal:110,img:B+"Tamil_Nadu_thali.jpg?width=900",
    desc:"Sambar, rasam, two poriyals, curd, rice and pappadam on a banana leaf — light, wholesome, everyday."},
  {id:"m3",name:"Gujarati Thali",type:"veg",cuisine:"Gujarati",portion:"Serves 1",spice:"Mild-sweet",perMeal:120,img:B+"Gujarati_thali.jpg?width=900",
    desc:"Shaak, dal, kadhi, rotli, rice and farsan with a gentle sweetness — a perfectly balanced Gujarati plate."},
  {id:"m4",name:"Homestyle Veg Thali",type:"veg",cuisine:"Homestyle",portion:"Serves 1",spice:"Medium",perMeal:100,img:B+"Indian_Veg_Thali.JPG?width=900",
    desc:"Simple ghar-ka-khana — one dal, one sabzi, rice, hot rotis and pickle. Honest everyday food."},
  {id:"m5",name:"Rajasthani Thali",type:"veg",cuisine:"Rajasthani",portion:"Serves 1",spice:"Spicy",perMeal:125,img:B+"Kutchi_thali.JPG?width=900",
    desc:"Gatte ki sabzi, dal, bajra roti, rice and a dollop of ghee — hearty flavours of the desert."},
  {id:"m6",name:"Hyderabadi Chicken Biryani",type:"nonveg",cuisine:"Hyderabadi",portion:"Serves 1",spice:"Spicy",perMeal:190,img:B+"Chicken_Hyderabadi_Biryani.JPG?width=900",
    desc:"Fragrant dum biryani with tender chicken, raita and salan — our weekend-style indulgence."},
  {id:"m7",name:"Bengali Fish Thali",type:"nonveg",cuisine:"Bengali",portion:"Serves 1",spice:"Medium",perMeal:170,img:B+"Bengali_fish_curry.jpg?width=900",
    desc:"Rice with macher jhol, a fish fry and dal — a true Bengali lunch, light and soulful."},
  {id:"m8",name:"Egg Curry & Parota",type:"nonveg",cuisine:"Home-style",portion:"Serves 1",spice:"Medium",perMeal:140,img:B+"Malabar_Parota_and_egg_curry.JPG?width=900",
    desc:"Flaky parotas with a spiced egg curry and salad — a satisfying everyday non-veg meal."}
];
const ADDONS=[{id:"roti",label:"Extra 2 rotis every meal",price:250},{id:"sweet",label:"A daily sweet",price:350},{id:"salad",label:"Salad & curd add-on",price:200}];
const MONTH_MEALS=26, WEEK_MEALS=6, MONTH_OFF=0.85;
const GROW=["Cooking","Packed","On the way","Delivered"];

let screen="menu", filter="all", orderFilter="all";
let bag=[];
let drawerItem=null, drawerCfg={plan:"weekly",addons:[]};
let justOrdered=null;
let subs=[
  {item:ITEMS[0],plan:"weekly",addons:[],stage:2,total:130*WEEK_MEALS},
  {item:ITEMS[5],plan:"monthly",addons:["sweet"],stage:3,total:Math.round(190*MONTH_MEALS*MONTH_OFF)+350}
];

const $=s=>document.querySelector(s);
const money=n=>"₹"+n.toLocaleString("en-IN");
const visual=it=>FOOD[it.type].svg+(it.img?`<img class="cover" src="${it.img}" alt="${it.name}" onerror="this.remove()">`:"");
const planPrice=(it,plan)=>plan==="monthly"?Math.round(it.perMeal*MONTH_MEALS*MONTH_OFF):it.perMeal*WEEK_MEALS;
const addonSum=ids=>ADDONS.filter(a=>ids.includes(a.id)).reduce((s,a)=>s+a.price,0);
const cfgTotal=()=>planPrice(drawerItem,drawerCfg.plan)+addonSum(drawerCfg.addons);
const bagTotal=()=>bag.reduce((s,b)=>s+b.total,0);

const ICONS={
  menu:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>`,
  bag:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>`,
  orders:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`
};
const PAGE={menu:{t:"This week's kitchen",s:"Browse home-cooked meals and start a tiffin subscription."},
  bag:{t:"Your bag",s:"Review your plan and confirm delivery."},
  orders:{t:"Your tiffins",s:"Track every subscription from the kitchen to your door."}};

function renderShell(){
  const tabs=[["menu","Menu"],["bag","Bag"],["orders","Orders"]];
  $("#nav").innerHTML=tabs.map(([k,l])=>{
    const badge=k==="bag"&&bag.length?`<span class="badge">${bag.length}</span>`:"";
    return `<button class="navitem ${screen===k?'on':''}" onclick="go('${k}')">${ICONS[k]}<span>${l}</span>${badge}</button>`;
  }).join("");
  let right="";
  if(screen==="menu"){
    const cats=[["all","All"],["veg","Veg"],["nonveg","Non-veg"]];
    right=`<div class="seg ${filter==='veg'?'veg':''}">${cats.map(([k,l])=>`<button class="${filter===k?'on':''}" onclick="setFilter('${k}')">${l}</button>`).join("")}</div>`;
  }
  $("#topbar").innerHTML=`<div><h1>${PAGE[screen].t}</h1><div class="sub">${PAGE[screen].s}</div></div>${right}`;
  if(screen==="menu")renderMenu();
  if(screen==="bag")renderBag();
  if(screen==="orders")renderOrders();
}
function go(s){screen=s;window.scrollTo({top:0,behavior:"smooth"});renderShell();}

/* ----- menu ----- */
function renderMenu(){
  const list=ITEMS.filter(it=>filter==="all"||it.type===filter);
  $("#content").innerHTML=`<div class="grid">${list.map(it=>`
    <div class="meal" onclick="openDrawer('${it.id}')">
      <div class="pic"><span class="vtag ${it.type}"><span class="vm"></span>${it.type==='veg'?'Veg':'Non-veg'}</span>${visual(it)}</div>
      <div class="mb"><h3>${it.name}</h3><div class="cui">${it.cuisine} · ${it.spice} spice</div>
        <div class="mfoot"><span class="pr">${money(it.perMeal)} <span>/meal</span></span><span class="cfg">Configure →</span></div></div>
    </div>`).join("")}</div>`;
}
function setFilter(f){filter=f;renderShell();}

/* ----- drawer ----- */
function openDrawer(id){
  drawerItem=ITEMS.find(it=>it.id===id);drawerCfg={plan:"weekly",addons:[]};
  renderDrawer();$("#drawer").classList.add("show");$("#drawerbd").classList.add("show");
}
function renderDrawer(){
  const it=drawerItem;
  $("#drawer").innerHTML=`
    <div class="dhead"><span class="t">Configure subscription</span><button class="dclose" onclick="closeDrawer()">✕</button></div>
    <div class="dscroll">
      <div class="dhero">${visual(it)}</div>
      <h2>${it.name}</h2>
      <div class="tagrow"><span class="tag ${it.type}">${it.type==='veg'?'Veg':'Non-veg'}</span>
        <span class="tag">${it.cuisine}</span><span class="tag">${it.spice} spice</span><span class="tag">${it.portion}</span></div>
      <p class="desc">${it.desc}</p>
      <div class="ssec">Choose your plan</div><div class="plan-cards" id="plans"></div>
      <div class="ssec">Add-ons</div><div id="addons"></div>
    </div>
    <div class="dfoot"><div class="tt">Total<b id="dTotal"></b></div>
      <button class="btn btn-primary btn-flex" onclick="addToBag()">Add to bag</button></div>`;
  renderPlans();renderAddons();updateDrawerTotal();
}
function renderPlans(){
  const it=drawerItem;
  const card=(k,name,meals,save)=>`<button class="plan ${drawerCfg.plan===k?'on':''}" onclick="setPlan('${k}')">
    ${save?'<span class="save">Save 15%</span>':''}<div class="pn">${name}</div><div class="pm">${meals}</div><div class="pp">${money(planPrice(it,k))}</div></button>`;
  $("#plans").innerHTML=card("weekly","Weekly",WEEK_MEALS+" tiffins this week",false)+card("monthly","Monthly",MONTH_MEALS+" tiffins a month",true);
}
function setPlan(k){drawerCfg.plan=k;renderPlans();updateDrawerTotal();}
function renderAddons(){
  $("#addons").innerHTML=ADDONS.map(a=>{const on=drawerCfg.addons.includes(a.id);
    return `<div class="addon ${on?'on':''}" onclick="toggleAddon('${a.id}')"><span class="box">${on?'✓':''}</span>${a.label}<span class="ap">+${money(a.price)}</span></div>`;}).join("");
}
function toggleAddon(id){drawerCfg.addons=drawerCfg.addons.includes(id)?drawerCfg.addons.filter(x=>x!==id):[...drawerCfg.addons,id];renderAddons();updateDrawerTotal();}
function updateDrawerTotal(){const e=$("#dTotal");if(e)e.textContent=money(cfgTotal());}
function closeDrawer(){$("#drawer").classList.remove("show");$("#drawerbd").classList.remove("show");}
function addToBag(){bag.push({item:drawerItem,plan:drawerCfg.plan,addons:[...drawerCfg.addons],total:cfgTotal()});closeDrawer();toast(drawerItem.name+" added to bag");renderShell();}

/* ----- bag ----- */
function renderBag(){
  if(!bag.length){$("#content").innerHTML=`<div class="empty"><div class="em">🍱</div><h3>Your bag is empty</h3>
    <p>Pick a meal from the menu to start a tiffin subscription.</p>
    <button class="btn btn-primary" style="margin-top:18px" onclick="go('menu')">Browse the menu</button></div>`;return;}
  const items=bag.map((b,i)=>{
    const adds=b.addons.length?ADDONS.filter(a=>b.addons.includes(a.id)).map(a=>a.label).join(", "):"No add-ons";
    return `<div class="bag-item"><button class="rm" onclick="removeBag(${i})">✕</button>
      <div class="bi">${visual(b.item)}</div>
      <div><h4>${b.item.name}</h4>
        <div class="bs">${b.plan==="monthly"?"Monthly · "+MONTH_MEALS+" tiffins":"Weekly · "+WEEK_MEALS+" tiffins"}</div>
        <div class="bs">${adds}</div><div class="bp">${money(b.total)}</div></div></div>`;}).join("");
  const lines=bag.map(b=>`<div class="sumrow"><span>${b.item.name} · ${b.plan==="monthly"?"Monthly":"Weekly"}</span><b>${money(b.total)}</b></div>`).join("");
  $("#content").innerHTML=`<div class="baglay">
    <div>
      ${items}
      <div class="panel"><h3>Delivery details</h3>
        <div class="two"><div class="field"><label>First name</label><input value="Vaibhav"></div>
          <div class="field"><label>Last name</label><input value="Suryavanshi"></div></div>
        <div class="field"><label>Phone</label><input value="+91 98861 40031"></div>
        <div class="field" style="margin-bottom:0"><label>Delivery address</label><input value="Flat 4B, 12th Main, Indiranagar, Bengaluru 560038"></div></div>
      <div class="panel" style="margin-bottom:0"><h3>Payment</h3>
        <div class="two"><div class="field"><label>Card number</label><input placeholder="4242 4242 4242 4242"></div>
          <div class="field"><label>Expiry / CVC</label><input placeholder="04/27 · 123"></div></div></div>
    </div>
    <div class="panel summary"><h3>Order summary</h3>
      ${lines}
      <div class="sumtot"><span style="font-weight:600">Total</span><span class="big">${money(bagTotal())}</span></div>
      <button class="btn btn-primary btn-wide" onclick="placeOrder()">Confirm &amp; pay ${money(bagTotal())}</button>
      <div class="mock">🔒 Demo checkout — no real payment is taken.</div></div>
  </div>`;
}
function removeBag(i){bag.splice(i,1);renderShell();}
function placeOrder(){
  bag.forEach(b=>subs.unshift({item:b.item,plan:b.plan,addons:[...b.addons],stage:0,total:b.total}));
  justOrdered=bag.length===1?bag[0].item.name:bag.length+" subscriptions";
  bag=[];orderFilter="all";go("orders");
}

/* ----- orders ----- */
function renderOrders(){
  const banner=justOrdered?`<div class="banner">🎉 <span>Your <b>${justOrdered}</b> ${justOrdered.includes("subscription")?"are":"subscription is"} live — today's tiffin is already in the kitchen.</span></div>`:"";
  justOrdered=null;
  if(!subs.length){$("#content").innerHTML=`<div class="empty"><div class="em">🍱</div><h3>No tiffins yet</h3><p>Your active subscriptions will show here.</p></div>`;return;}
  const cats=[["all","All"],["0","Cooking"],["1","Packed"],["2","On the way"],["3","Delivered"]];
  const list=orderFilter==="all"?subs:subs.filter(s=>s.stage===+orderFilter);
  const cards=list.length?list.map(s=>{
    const i=subs.indexOf(s),done=s.stage>=3;
    const tl=GROW.map((g,gi)=>`<div class="s ${gi<s.stage?'done':gi===s.stage?'now':''}"><div class="d"></div>${g}</div>`).join("");
    const foot=done?`<div class="ord-foot">✅ <span><b>Delivered.</b> Order #DD${1000+i} — enjoy your meal. Next tiffin tomorrow.</span></div>`
      :`<div class="ord-foot"><span>Today's tiffin is <b>${GROW[s.stage].toLowerCase()}</b>.</span><button class="btn btn-dark" onclick="advance(${i})">Advance →</button></div>`;
    return `<div class="ord"><div class="ord-top"><div class="ord-img">${visual(s.item)}</div>
      <div><h4>${s.item.name}</h4><div class="os">${s.item.cuisine} · ${s.plan==="monthly"?"Monthly":"Weekly"} · ${money(s.total)}</div></div>
      <span class="ostat ${done?'del':''}">${done?'Delivered':GROW[s.stage]}</span></div>
      <div class="tl">${tl}</div>${foot}</div>`;
  }).join(""):`<div class="empty" style="padding:50px"><p>No tiffins in this stage right now.</p></div>`;
  $("#content").innerHTML=banner+`<div class="seg" style="margin-bottom:22px">${cats.map(([k,l])=>`<button class="${orderFilter===k?'on':''}" onclick="setOrderFilter('${k}')">${l}</button>`).join("")}</div>`+cards;
}
function setOrderFilter(k){orderFilter=k;renderOrders();}
function advance(i){if(subs[i].stage<3){subs[i].stage++;renderOrders();}}

/* ----- toast ----- */
let toastT;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2000);}

renderShell();
</script>
</body>
</html>
