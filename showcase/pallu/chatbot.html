<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pallu . Ask us</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Mukta:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FBF3E4;--cream2:#F4E7CE;--paper:#FFFBF2;--maroon:#7A1F2B;--maroon2:#9E2A38;--marigold:#D89A1E;--gold:#C79A2E;
 --ink:#2C1A12;--soft:#6E5A48;--mut:#9A876F;--line:rgba(122,31,43,.18);}
body{font-family:'Mukta',sans-serif;background:var(--cream2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink);font-weight:300}
.panel{width:100%;max-width:440px;height:min(660px,92vh);background:var(--cream);border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 70px -28px rgba(122,31,43,.5)}
.top{padding:18px 22px;display:flex;align-items:center;gap:13px;background:var(--maroon);color:var(--cream)}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--marigold),var(--gold));display:grid;place-items:center;flex:none;font-family:'Marcellus';font-size:21px;color:#3a0f17}
.top h1{font-family:'Marcellus';font-size:20px;letter-spacing:.24em;padding-left:.24em}
.top .st{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--marigold);margin-top:3px}
.thread{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:84%;padding:12px 15px;border-radius:14px;font-size:14.5px;line-height:1.55;animation:pop .26s ease}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bot{align-self:flex-start;background:var(--paper);color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:4px}
.me{align-self:flex-end;background:var(--maroon);color:var(--cream);border-bottom-right-radius:4px;font-weight:400}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
.chip{border:1px solid var(--line);background:var(--paper);color:var(--maroon);font-size:12.5px;padding:8px 13px;border-radius:18px;cursor:pointer;transition:.15s;font-family:inherit;font-weight:500}
.chip:hover{background:var(--maroon);color:var(--cream);border-color:var(--maroon)}
.bar{display:flex;gap:9px;padding:14px 16px;border-top:1px solid var(--line);background:var(--paper)}
.bar input{flex:1;background:var(--cream);border:1px solid var(--line);border-radius:22px;padding:12px 16px;font-size:14px;font-family:inherit;outline:none;color:var(--ink)}
.bar input::placeholder{color:var(--mut)} .bar input:focus{border-color:var(--maroon)}
.bar button{border:none;background:var(--maroon);color:var(--cream);font-weight:600;letter-spacing:.04em;border-radius:22px;padding:0 20px;cursor:pointer;font-family:inherit;font-size:13.5px}
.foot{text-align:center;font-size:12.5px;color:var(--mut);padding:0 0 13px}
.foot a{color:var(--maroon);text-decoration:none;font-weight:600}
</style></head><body>
<div class="panel">
 <div class="top"><div class="avatar">P</div><div><h1>PALLU</h1><div class="st">Ask about our sarees</div></div></div>
 <div class="thread" id="thread"></div>
 <div class="chips" id="chips"></div>
 <div class="bar"><input id="inp" placeholder="Ask about weaves, price, blouse fit..." autocomplete="off"><button id="send">Send</button></div>
 <div class="foot">Ready to begin? <a href="app.html">Start your saree</a></div>
</div>
<script>
var FAQ=[{"q": ["real handloom", "powerloom", "authentic", "genuine", "fake", "handloom or", "is it real", "pure handloom"], "a": "Every Pallu saree names its weave and its region and is bought direct from the weaving cluster. We never sell powerloom as handloom. If a saree is not pure handloom, we say so."}, {"q": ["price", "cost", "how much", "calculat", "breakup", "break up", "gst", "tax", "itemised"], "a": "Every saree shows a live, itemised price: the saree, the drape, the blouse tailoring and GST, each on its own line. We also show what share of the cost reaches the weaver."}, {"q": ["blouse", "stitch", "tailor", "measure", "fit", "fitting", "size"], "a": "Yes. Send your measurements with a simple guide and we stitch a made-to-measure blouse to go with your saree. If the fit is not right, the first alteration is free."}, {"q": ["weave", "weaves", "cotton", "silk", "linen", "chanderi", "kanjeevaram", "mulmul", "fabric", "material"], "a": "We weave in cotton (mulmul, everyday), silk (Kanjeevaram, occasion), linen (Bhagalpur, breezy) and Chanderi (light and glossy). Each names its region and shows its full price."}, {"q": ["drape", "pleat", "pre-stitch", "prestitch", "ready to wear", "draping", "wear"], "a": "You can choose a classic drape, a Bengali drape, or a modern pre-stitched drape, so the saree is ready the way you like to wear it."}, {"q": ["weaver", "artisan", "fair", "fairly paid", "direct", "cluster"], "a": "We buy direct from weaving clusters, cutting out middlemen, and show what share of each saree goes to the weaver. The maker is paid fairly, not squeezed."}, {"q": ["return", "refund", "alteration", "exchange"], "a": "The first blouse alteration is free if the fit is off. Returns and exchanges follow our policy, confirmed on each order."}, {"q": ["deliver", "delivery", "ship", "how long", "time", "when"], "a": "Made-to-measure orders are stitched and shipped within a few days. The exact timeline is shown when you place your order."}], CHIPS=["Is it real handloom?", "How is the price calculated?", "Can you stitch the blouse?", "What weaves do you have?", "Is the weaver paid fairly?"], GREET="Namaste, welcome to Pallu. Ask me about our weaves, the live price breakup, blouse tailoring, drapes or our weavers.", FALL="I can help with our weaves, the price breakup, blouse tailoring, drapes, weaver fair pay or delivery. To see every saree with its full price, tap Start your saree below.";
var thread=document.getElementById("thread"), chips=document.getElementById("chips"), inp=document.getElementById("inp");
function add(t,who){var d=document.createElement("div");d.className="msg "+who;d.textContent=t;thread.appendChild(d);thread.scrollTop=thread.scrollHeight;}
function answer(q){var s=q.toLowerCase(),best=null,sc=0;
 for(var i=0;i<FAQ.length;i++){var n=0;for(var j=0;j<FAQ[i].q.length;j++){if(s.indexOf(FAQ[i].q[j])>-1)n++;}if(n>sc){sc=n;best=FAQ[i];}}
 return sc>0?best.a:FALL;}
function ask(q){add(q,"me");setTimeout(function(){add(answer(q),"bot");},260);}
document.getElementById("send").addEventListener("click",function(){var v=inp.value.trim();if(v){ask(v);inp.value="";}});
inp.addEventListener("keydown",function(e){if(e.key==="Enter"){var v=inp.value.trim();if(v){ask(v);inp.value="";}}});
CHIPS.forEach(function(c){var b=document.createElement("button");b.className="chip";b.textContent=c;b.addEventListener("click",function(){ask(c);});chips.appendChild(b);});
add(GREET,"bot");
</script></body></html>
