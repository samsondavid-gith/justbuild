<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zevar . Ask us</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--void:#0E0B0C;--char:#1C1517;--panel:#241B1D;--ivory:#F4ECDE;--soft:#C7B9A6;--mut:#8E8073;
 --gold:#C9A24B;--gold2:#E7CE8C;--line:rgba(201,162,75,.28);}
body{font-family:'Jost',sans-serif;background:radial-gradient(120% 90% at 50% 0%,#241a14,#0B0809 60%);min-height:100vh;
 display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ivory)}
.panel{width:100%;max-width:440px;height:min(660px,92vh);background:var(--void);border:1px solid var(--line);border-radius:6px;overflow:hidden;
 display:flex;flex-direction:column;box-shadow:0 30px 80px -28px rgba(0,0,0,.8)}
.top{padding:20px 22px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--line);background:var(--char)}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));display:grid;place-items:center;flex:none;
 font-family:'Cormorant Garamond';font-weight:600;font-size:22px;color:#231704}
.top h1{font-family:'Cormorant Garamond';font-weight:600;font-size:21px;letter-spacing:.22em;padding-left:.22em}
.top .st{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-top:3px}
.thread{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:84%;padding:12px 15px;border-radius:14px;font-size:14.5px;line-height:1.55;animation:pop .26s ease;font-weight:300}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bot{align-self:flex-start;background:var(--panel);color:var(--ivory);border:1px solid var(--line);border-bottom-left-radius:4px}
.me{align-self:flex-end;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#231704;border-bottom-right-radius:4px;font-weight:400}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
.chip{border:1px solid var(--line);background:transparent;color:var(--gold);font-size:12px;letter-spacing:.04em;
 padding:8px 13px;border-radius:18px;cursor:pointer;transition:.15s;font-family:inherit}
.chip:hover{background:var(--gold);color:#231704}
.bar{display:flex;gap:9px;padding:14px 16px;border-top:1px solid var(--line);background:var(--char)}
.bar input{flex:1;background:var(--void);border:1px solid var(--line);border-radius:22px;padding:12px 16px;font-size:14px;font-family:inherit;outline:none;color:var(--ivory)}
.bar input::placeholder{color:var(--mut)}
.bar input:focus{border-color:var(--gold)}
.bar button{border:none;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#231704;font-weight:500;letter-spacing:.06em;
 border-radius:22px;padding:0 20px;cursor:pointer;font-family:inherit;font-size:13px;text-transform:uppercase}
.foot{text-align:center;font-size:12px;color:var(--mut);padding:0 0 13px;letter-spacing:.04em}
.foot a{color:var(--gold);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;font-size:11px}
</style></head><body>
<div class="panel">
 <div class="top"><div class="avatar">Z</div><div><h1>ZEVAR</h1><div class="st">Ask about our pieces</div></div></div>
 <div class="thread" id="thread"></div>
 <div class="chips" id="chips"></div>
 <div class="bar"><input id="inp" placeholder="Ask about hallmarks, price, buyback..." autocomplete="off"><button id="send">Send</button></div>
 <div class="foot">Ready to browse? <a href="app.html">View the collection</a></div>
</div>
<script>
var FAQ=[{"q": ["hallmark", "bis", "huid", "purity", "pure", "real gold", "authentic", "karat", "carat gold", "22k", "18k"], "a": "Every gold piece is BIS hallmarked and carries a unique HUID code laser-engraved on it. You can verify that code independently, so purity is never just our word. We offer 22K and 18K, clearly marked."}, {"q": ["diamond", "igi", "certified", "certificate", "grading", "clarity", "cut", "colour"], "a": "Every diamond, natural or lab-grown, ships with its IGI certificate stating the exact cut, colour, clarity and carat. No vague grades."}, {"q": ["price", "cost", "how much", "calculat", "breakup", "break up", "rate", "gst", "tax"], "a": "Every piece shows a live, itemised breakup: gold weight times the current gold rate, the making charge, the stone value and GST. The gold rate updates live, so you always see exactly what you pay for."}, {"q": ["making", "making charge", "labour", "wastage"], "a": "The making charge is shown upfront as a clear percentage on every piece, never buried in the total. You see it before you decide."}, {"q": ["buyback", "buy back", "resale", "exchange", "return", "sell back"], "a": "Yes, lifetime buyback. Bring any Zevar piece back at any time and exchange it at fair, transparent value based on the day's gold rate. Hallmarked gold keeps its worth."}, {"q": ["lab", "lab grown", "lab-grown", "lgd", "grown diamond"], "a": "We offer IGI certified lab-grown diamonds too. They are 40 to 60 percent cheaper than natural, with the same certificate and brilliance, a modern, lighter-ticket choice."}, {"q": ["viewing", "visit", "try", "see in person", "appointment", "book"], "a": "You can book a viewing to see pieces in person, or browse the full collection with live prices in the app. Tap View the collection below."}, {"q": ["deliver", "delivery", "ship", "insured"], "a": "High-value pieces are delivered insured and securely, or you can collect after a viewing. Details are confirmed on each order."}], CHIPS=["Is it hallmarked?", "Are the diamonds certified?", "How is the price calculated?", "Do you offer buyback?", "What about lab-grown?"], GREET="Welcome to Zevar. Ask me anything about hallmarking, certificates, our live price breakup, making charges or lifetime buyback.", FALL="I can help with hallmarking, certificates, pricing, making charges, buyback or booking a viewing. For the full range and live prices, tap View the collection below.";
var thread=document.getElementById("thread"), chips=document.getElementById("chips"), inp=document.getElementById("inp");
function add(t,who){var d=document.createElement("div");d.className="msg "+who;d.textContent=t;thread.appendChild(d);thread.scrollTop=thread.scrollHeight;}
function answer(q){var s=q.toLowerCase(),best=null,sc=0;
 for(var i=0;i<FAQ.length;i++){var n=0;for(var j=0;j<FAQ[i].q.length;j++){if(s.indexOf(FAQ[i].q[j])>-1)n++;}if(n>sc){sc=n;best=FAQ[i];}}
 return sc>0?best.a:FALL;}
function ask(q){add(q,"me");setTimeout(function(){add(answer(q),"bot");},260);}
document.getElementById("send").addEventListener("click",function(){var v=inp.value.trim();if(v){ask(v);inp.value="";}});
inp.addEventListener("keydown",function(e){if(e.key==="Enter"){var v=inp.value.trim();if(v){ask(v);inp.value="";}}});
CHIPS.forEach(function(c){var b=document.createElement("button");b.className="chip";b.textContent=c;b.addEventListener("click",function(){ask(c);});chips.appendChild(b);});
add(GREET,"bot");
</script></body></html>
